// ─────────────── 영업 모듈 ───────────────
const ORDER_STATUS_LABEL={
  UNPAID:'미입금',
  UNPAID_PROOF:'미입금:입금증필요',
  PAID:'입금완료',
  // 레거시 (예전 데이터 표시용 — 새 입력 시는 사용 안 함)
  IN_PROGRESS:'입금중', PARTIAL:'일부납부', CANCELLED:'취소',
};
// 새/수정 시 선택 가능한 3개 상태 (요청)
const ORDER_STATUS_LIST=['UNPAID','UNPAID_PROOF','PAID'];
const CARRIER_LIST=['SK','KT','LGU'];
const fmtKRW=(n)=>'₩'+(Number(n||0)).toLocaleString('ko-KR');

async function loadSalesContext(page, force){
  const tasks = [];
  // vendor 마스터 한 번만
  if (!State.salesVendorsLoaded || force){
    tasks.push(api('/api/sales/vendors').then(v=>{
      State.salesVendors = v.vendors || []; State.salesVendorsLoaded = true;
    }).catch(()=>{}));
  }
  if (page==='sales-orders'){
    const ym=State.salesYm || todayYm(); State.salesYm=ym;
    if (force || State.salesOrdersLoadedYm !== ym){
      const url = ym === 'ALL' ? '/api/sales/orders' : `/api/sales/orders?ym=${ym}`;
      tasks.push(api(url).then(r=>{
        State.salesOrders = r.orders || []; State.salesOrdersLoadedYm = ym;
      }));
    }
  } else if (page==='sales-tm'){
    const ym=State.salesYm || todayYm(); State.salesYm=ym;
    const cutoff=State.salesCutoff || (new Date().toISOString().slice(0,10));
    State.salesCutoff=cutoff;
    const key = `${ym}|${cutoff}`;
    if (force || State.salesTmLoadedKey !== key){
      tasks.push(api(`/api/sales/tm-summary?ym=${ym}&cutoff=${cutoff}`).then(r=>{
        State.salesTmRows = r.rows || [];
        State.salesPeriod = r.period;
        State.salesTmElapsed = r.elapsedWorkdays || 0;
        State.salesTmRemaining = r.remainingWorkdays || 0;
        State.salesTmTotal = r.totalWorkdays || 0;
        State.salesTmLoadedKey = key;
      }));
      // 오늘의 TM 일별 입력값도 같이 (모달/패널에서 사용)
      tasks.push(api(`/api/sales/tm-daily?ym=${ym}`).then(d=>{
        const today = new Date().toISOString().slice(0,10);
        const map = {};
        (d.rows || []).forEach(r=>{
          if (String(r.work_date).slice(0,10) === today){
            map[r.user_id] = { db_count: r.db_count, is_off: r.is_off };
          }
        });
        State.salesTmTodayMap = map;
      }).catch(()=>{}));
    }
  } else if (page==='sales-tm-daily'){
    const d = State.salesTmDailyDate || (new Date().toISOString().slice(0,10));
    State.salesTmDailyDate = d;
    const ymKey = d.slice(0,7);
    if (force || State.salesTmDailyLoadedYm !== ymKey){
      tasks.push(api(`/api/sales/tm-daily?ym=${ymKey}`).then(r=>{
        State.salesTmDailyRows = r.rows || [];
        State.salesTmDailyLoadedYm = ymKey;
      }));
    }
  } else if (page==='sales-vendor'){
    const d=State.salesDate || (new Date().toISOString().slice(0,10));
    State.salesDate=d;
    if (force || State.salesVendorLoadedDate !== d){
      tasks.push(api(`/api/sales/vendor-daily?date=${d}`).then(r=>{
        State.salesVendorRows = r.vendors || [];
        State.salesDayMeta = r.meta || { recontact_completed: 0, note: null };
        State.salesMonthlyRecontact = r.monthlyRecontact || 0;
        State.salesDayClosingTotal   = r.dayClosingTotal   || 0;
        State.salesMonthClosingTotal = r.monthClosingTotal || 0;
        State.salesMonthVendorCompletedTotal = r.monthVendorCompletedTotal || 0;
        State.salesVendorLoadedDate = d;
      }));
    }
  }
  if (tasks.length) await Promise.all(tasks);
}

// 클릭 즉시 렌더 + 백그라운드 페치
async function navTo(key){
  State.page=key;
  State.selectedPersonId=null;
  // 캐시 미적재 페이지면 로딩 상태 표시
  const needsSalesLoad = key && key.startsWith('sales-') && (
    (key==='sales-orders' && State.salesOrdersLoadedYm !== (State.salesYm||todayYm())) ||
    (key==='sales-tm'     && State.salesTmLoadedKey   !== `${State.salesYm||todayYm()}|${State.salesCutoff||new Date().toISOString().slice(0,10)}`) ||
    (key==='sales-tm-daily' && State.salesTmDailyLoadedYm !== (State.salesTmDailyDate||new Date().toISOString().slice(0,10)).slice(0,7)) ||
    (key==='sales-vendor' && State.salesVendorLoadedDate !== (State.salesDate||new Date().toISOString().slice(0,10)))
  );
  const needsClosingLoad = (key==='my-closing' && State.myClosingLoadedYm !== (State.salesYm||todayYm()));
  if (needsSalesLoad || needsClosingLoad) State.loadingPage = key;
  renderApp();
  if (key && key.startsWith('sales-')){
    try{ await loadSalesContext(key); }
    catch(e){ console.error(e); showToast('데이터 로드 실패: '+e.message); }
    if (State.page===key){ State.loadingPage=null; renderApp(); } else { State.loadingPage=null; }
  } else if (key==='my-closing'){
    try{ await loadMyClosing(); }
    catch(e){ console.error(e); }
    if (State.page===key){ State.loadingPage=null; renderApp(); } else { State.loadingPage=null; }
  }
}

// ─────── 요청 4: PB 내역 표 ───────
function renderSalesOrders(){
  const me=State.user;
  const isPriv=me.role==='admin'||me.role==='manager';
  const wrap=h('div');
  // 로딩 인디케이터 (첫 진입 시)
  if (State.loadingPage==='sales-orders' && State.salesOrdersLoadedYm===null){
    return h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'),
      h('div',null,'PB 내역 로딩 중…'));
  }

  // 툴바
  const ymI=h('input',{type:'month',value:State.salesYm||todayYm()});
  ymI.addEventListener('change',async()=>{
    State.salesYm=ymI.value || todayYm();
    State.salesOrdersLoadedYm=null;
    State.loadingPage='sales-orders';
    renderApp();
    await loadSalesContext('sales-orders');
    State.loadingPage=null; renderApp();
  });
  const filterStatus=h('select',null,
    h('option',{value:'ALL'},'전체 상태'),
    ...ORDER_STATUS_LIST.map(s=>h('option',{value:s},ORDER_STATUS_LABEL[s]))
  );
  filterStatus.value=State.salesOrdersFilter.status;
  filterStatus.addEventListener('change',()=>{State.salesOrdersFilter.status=filterStatus.value;renderApp();});

  const filterTm=h('select',null,
    h('option',{value:'ALL'},'전체 TM'),
    ...State.users.map(u=>h('option',{value:String(u.id)},u.name))
  );
  filterTm.value=State.salesOrdersFilter.tm;
  filterTm.addEventListener('change',()=>{State.salesOrdersFilter.tm=filterTm.value;renderApp();});

  const filterVendor=h('select',null,
    h('option',{value:'ALL'},'전체 유입처'),
    ...State.salesVendors.filter(v=>v.active).map(v=>h('option',{value:String(v.id)}, `${v.code}${v.parent_label?' · '+v.parent_label:''}`))
  );
  filterVendor.value=State.salesOrdersFilter.vendor;
  filterVendor.addEventListener('change',()=>{State.salesOrdersFilter.vendor=filterVendor.value;renderApp();});

  const searchI=h('input',{type:'text',placeholder:'고객명·전화·메모 검색',value:State.salesOrdersFilter.q});
  searchI.addEventListener('input',()=>{State.salesOrdersFilter.q=searchI.value;debouncedRedraw();});
  let debounceT; function debouncedRedraw(){ clearTimeout(debounceT); debounceT=setTimeout(()=>renderApp(),200); }

  const addBtn=h('button',{class:'add-row-btn',onClick:()=>addNewOrder()},'＋ 새 PB');

  // 빠른 날짜 필터 + 기간 범위 (대표가 자주 쓰는 프리셋)
  const fmtYmdLocal=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  async function applyDateRange(ym, from, to){
    State.salesYm = ym;
    State.salesOrdersFilter.dateFrom = from || '';
    State.salesOrdersFilter.dateTo   = to   || '';
    State.salesOrdersLoadedYm = null;
    State.loadingPage = 'sales-orders';
    renderApp();
    await loadSalesContext('sales-orders');
    State.loadingPage = null;
    renderApp();
  }
  function quickBtn(label, onClick, active){
    return h('button',{class:'btn'+(active?' btn-primary':''), style:'padding:6px 12px;font-size:12px',
      onClick}, label);
  }
  const today=new Date();
  const todayYmd=fmtYmdLocal(today);
  const ydt=new Date(today); ydt.setDate(ydt.getDate()-1);
  const yesterdayYmd=fmtYmdLocal(ydt);
  const thisYm = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const prevMonthDate=new Date(today.getFullYear(), today.getMonth()-1, 1);
  const prevYm=`${prevMonthDate.getFullYear()}-${String(prevMonthDate.getMonth()+1).padStart(2,'0')}`;
  const threeMonthsBack=new Date(today); threeMonthsBack.setMonth(threeMonthsBack.getMonth()-3);
  const threeMonthsBackYmd=fmtYmdLocal(threeMonthsBack);

  const dfFilter=State.salesOrdersFilter;
  const curYm=State.salesYm||thisYm;
  const isToday = curYm===thisYm && dfFilter.dateFrom===todayYmd && dfFilter.dateTo===todayYmd;
  const isYday  = dfFilter.dateFrom===yesterdayYmd && dfFilter.dateTo===yesterdayYmd;
  const isThisM = curYm===thisYm && !dfFilter.dateFrom && !dfFilter.dateTo;
  const isPrevM = curYm===prevYm && !dfFilter.dateFrom && !dfFilter.dateTo;
  const is3M    = curYm==='ALL' && dfFilter.dateFrom===threeMonthsBackYmd && dfFilter.dateTo===todayYmd;
  const isAll   = curYm==='ALL' && !dfFilter.dateFrom && !dfFilter.dateTo;

  const fromI=h('input',{type:'date',value:dfFilter.dateFrom||'',style:'width:140px'});
  const toI=h('input',{type:'date',value:dfFilter.dateTo||'',style:'width:140px'});
  fromI.addEventListener('change',()=>{ State.salesOrdersFilter.dateFrom=fromI.value; renderApp(); });
  toI.addEventListener('change',()=>{ State.salesOrdersFilter.dateTo=toI.value; renderApp(); });

  const quickBar=h('div',{class:'sales-toolbar',style:'gap:6px;flex-wrap:wrap'},
    h('span',{class:'label'},'빠른 날짜'),
    quickBtn('오늘',              ()=>applyDateRange(thisYm,  todayYmd,         todayYmd),         isToday),
    quickBtn('어제',              ()=>applyDateRange(thisYm,  yesterdayYmd,     yesterdayYmd),     isYday),
    quickBtn('당월',              ()=>applyDateRange(thisYm,  '',               ''),               isThisM),
    quickBtn('전월',              ()=>applyDateRange(prevYm,  '',               ''),               isPrevM),
    quickBtn('3개월치',()=>applyDateRange('ALL',   threeMonthsBackYmd, todayYmd),       is3M),
    quickBtn('전체',              ()=>applyDateRange('ALL',   '',               ''),               isAll),
    h('span',{class:'label',style:'margin-left:8px'},'기간'),
    fromI, h('span',null,'~'), toI,
  );
  wrap.append(quickBar);

  const toolbar=h('div',{class:'sales-toolbar'},
    h('span',{class:'label'},'월'), ymI,
    filterStatus,
    h('div',{style:'flex:1;min-width:160px'}, searchI),
    addBtn   // 직원도 본인 PB 추가 가능 (server: tm_user_id = me.id 자동)
  );
  wrap.append(toolbar);

  // 중복 검출 — 동일 전화번호로 2건 이상이면 중복 의심
  const phoneCount={};
  State.salesOrders.forEach(o=>{
    const ph = String(o.customer_phone||'').replace(/[^0-9]/g,'');
    if (ph.length>=8) phoneCount[ph] = (phoneCount[ph]||0)+1;
  });
  const dupPhones = new Set(Object.keys(phoneCount).filter(k=>phoneCount[k]>1));
  function isDupRow(r){
    const ph = String(r.customer_phone||'').replace(/[^0-9]/g,'');
    return ph.length>=8 && dupPhones.has(ph);
  }

  // 중복 의심 배너 — 전화번호 동일 PB 2건 이상
  if (dupPhones.size > 0){
    const dupBanner = h('div',{
      style:'display:flex;align-items:center;gap:10px;padding:11px 16px;margin:0 0 10px;background:#fef3c7;border:1px solid #fcd34d;border-radius:9px;font-size:13px;color:#7c2d12'
    },
      h('span',{style:'font-size:16px'},'⚠'),
      h('div',{style:'flex:1'},
        h('div',{style:'font-weight:700'}, `중복 의심 PB ${dupPhones.size}건 (전화번호 동일)`),
        h('div',{style:'font-size:11.5px;color:#92400e;margin-top:2px'},
          '동일 고객에게 중복 입금되지 않도록 ☢ 표시된 행을 확인하세요')),
    );
    wrap.append(dupBanner);
  }

  // 필터 적용
  let rows=State.salesOrders.slice();
  const f=State.salesOrdersFilter;
  if (f.status!=='ALL') rows=rows.filter(r=>r.status===f.status);
  if (f.tm!=='ALL') rows=rows.filter(r=>String(r.tm_user_id)===f.tm);
  if (f.vendor!=='ALL') rows=rows.filter(r=>String(r.vendor_id)===f.vendor);
  if (f.dateFrom) rows=rows.filter(r=>String(r.consult_date||'').slice(0,10)>=f.dateFrom);
  if (f.dateTo)   rows=rows.filter(r=>String(r.consult_date||'').slice(0,10)<=f.dateTo);
  if (f.q.trim()){
    const q=f.q.trim().toLowerCase();
    rows=rows.filter(r=>
      (r.customer_name||'').toLowerCase().includes(q) ||
      (r.customer_phone||'').includes(q) ||
      (r.note||'').toLowerCase().includes(q)
    );
  }

  // 표 — 유입처 컬럼 제거 (요청)
  const cols=[
    {k:'tm_user_id',label:'TM',type:'tm',w:80},
    {k:'consult_date',label:'상담일',type:'date',w:96},
    {k:'customer_name',label:'고객명',type:'text',w:90},
    {k:'customer_phone',label:'전화번호',type:'text',w:120},
    {k:'carrier',label:'통신사',type:'carrier',w:60},
    {k:'amount',label:'금액',type:'amount',w:90},
    {k:'payment_bank',label:'은행',type:'text',w:80},
    {k:'payment_account',label:'계좌',type:'text',w:130},
    {k:'payment_date',label:'입금일',type:'date',w:96},
    {k:'status',label:'상태',type:'status',w:100},
    {k:'note',label:'메모',type:'text',w:160},
  ];
  const thead=h('thead',null,h('tr',null,
    ...cols.map(c=>h('th',{style:`width:${c.w}px`},c.label)),
    h('th',{style:'width:80px'},'')   // 수정/삭제 액션 컬럼
  ));
  const tbody=h('tbody');
  if (!rows.length){
    tbody.append(h('tr',null,
      h('td',{colspan:cols.length+1,style:'padding:40px;text-align:center;color:var(--text-soft)'},
        State.salesOrders.length?'필터에 맞는 내역이 없습니다':'아직 PB 내역이 없습니다 · 우측 상단 ＋ 버튼으로 추가')));
  }
  for (const r of rows){
    const canEditThis = isPriv || r.tm_user_id === State.user.id;
    const isDup = isDupRow(r);
    // 시트(행) 자체는 클릭해도 아무 동작 없음 — 수정은 행 끝 ✎ 버튼으로만
    const tr=h('tr',{
      class:`row-status-${r.status}`+(isDup?' row-dup':''),
      style: isDup?'background:#fff7ed':'',
      title: isDup?'⚠ 중복 의심 — 동일 전화번호 PB가 있음':'',
    });
    for (const c of cols){
      const td=h('td');
      const cell=h('div',{class:'cell'});
      td.append(cell);
      // 고객명 컬럼에 ☢ 뱃지 추가
      if (isDup && c.k==='customer_name'){
        cell.append(h('span',{
          style:'display:inline-block;margin-right:5px;color:#c2410c;font-weight:800;cursor:help',
          title:'동일 전화번호로 다른 PB가 존재함'
        },'☢'));
      }
      cell.append(renderOrderCell(c, r[c.k], r));
      tr.append(td);
    }
    if (isPriv){
      const editBtn = h('button',{class:'btn',style:'padding:4px 8px;font-size:11px;margin-right:4px',
        title:'수정',
        onClick:(e)=>{ e.stopPropagation(); if (canEditThis) openOrderModal(r); }
      },'✎');
      const delBtn = h('button',{class:'btn btn-danger',style:'padding:4px 8px;font-size:11px',
        title:'삭제',
        onClick:async(e)=>{e.stopPropagation();
          if(!confirm('이 PB 내역을 삭제하시겠습니까?')) return;
          try{
            await api(`/api/sales/orders?id=${r.id}`,{method:'DELETE'});
            State.salesOrders=State.salesOrders.filter(o=>o.id!==r.id);
            renderApp(); showToast('삭제됨');
          }catch(e){ alert(e.message); }
        }
      },'×');
      const td=h('td',null,h('div',{class:'cell',style:'justify-content:center;padding:10px 6px;display:flex;gap:0'},
        editBtn, delBtn));
      tr.append(td);
    } else if (canEditThis) {
      // 직원이 본인 PB 수정 (admin 외)
      const editBtn = h('button',{class:'btn',style:'padding:4px 8px;font-size:11px',
        title:'수정',
        onClick:(e)=>{ e.stopPropagation(); openOrderModal(r); }
      },'✎');
      const td=h('td',null,h('div',{class:'cell',style:'justify-content:center;padding:10px 6px'},editBtn));
      tr.append(td);
    }
    tbody.append(tr);
  }

  const tableWrap=h('div',{class:'orders-wrap',style:'overflow:auto'},
    h('table',{class:'orders-table'}, thead, tbody)
  );
  wrap.append(tableWrap);
  return wrap;
}

function renderOrderCell(col, val, row){
  if (col.type==='tm') return h('span',null, row.tm_name||'—');
  if (col.type==='vendor'){
    if (!row.vendor_id) return h('span',{style:'color:var(--text-soft)'},'—');
    return h('span',{class:'chip',style:`background:${(row.vendor_color||'#9b9a97')}20;color:${row.vendor_color||'#5b5750'};font-size:11px;padding:2px 7px;border-radius:5px;font-weight:700`}, row.vendor_code||'?');
  }
  if (col.type==='carrier'){
    if (!val) return h('span',{style:'color:var(--text-soft)'},'—');
    return h('span',{class:`carrier-${val}`}, val);
  }
  if (col.type==='status'){
    return h('span',{class:`st-chip st-${val}`}, ORDER_STATUS_LABEL[val]||val);
  }
  if (col.type==='amount'){
    return h('span',{style:'font-variant-numeric:tabular-nums;font-weight:600'}, val?fmtKRW(val):'—');
  }
  if (col.type==='date'){
    return h('span',null, val? String(val).slice(0,10):'—');
  }
  return h('span',null, val||'—');
}

function startEditCell(td, cell, col, row, isPriv){
  if (!isPriv && row.tm_user_id !== State.user.id) return;
  if (cell.classList.contains('editing')) return;
  cell.classList.add('editing');
  let input;
  const finish=async(commit, newVal)=>{
    cell.classList.remove('editing');
    cell.innerHTML='';
    if (!commit){
      cell.append(renderOrderCell(col, row[col.k], row));
      return;
    }
    // 저장
    try{
      const body={...row, [col.k]: newVal};
      // status는 ALL_STATUS, vendor_id/tm_user_id는 number
      if (col.k==='vendor_id') body.vendor_id = newVal?Number(newVal):null;
      if (col.k==='tm_user_id') body.tm_user_id = newVal?Number(newVal):null;
      if (col.k==='amount') body.amount = Number(String(newVal).replace(/[^\d]/g,''))||0;
      const r=await api('/api/sales/orders',{method:'POST',body});
      Object.assign(row, r.order);
      // 표 행 색상 업데이트 (status 변경 시)
      const tr=cell.closest('tr');
      if (tr) tr.className = `row-status-${row.status}`;
      cell.append(renderOrderCell(col, row[col.k], row));
      showToast('저장됨');
    }catch(e){
      cell.append(renderOrderCell(col, row[col.k], row));
      alert(e.message);
    }
  };
  if (col.type==='status'){
    input=h('select',null, ...ORDER_STATUS_LIST.map(s=>h('option',{value:s},ORDER_STATUS_LABEL[s])));
    input.value=row[col.k]||'UNPAID';
    input.addEventListener('change',()=>finish(true, input.value));
    input.addEventListener('blur',()=>finish(false));
  } else if (col.type==='carrier'){
    input=h('select',null, h('option',{value:''},'—'), ...CARRIER_LIST.map(c=>h('option',{value:c},c)));
    input.value=row[col.k]||'';
    input.addEventListener('change',()=>finish(true, input.value));
    input.addEventListener('blur',()=>finish(false));
  } else if (col.type==='tm'){
    input=h('select',null, h('option',{value:''},'—'), ...State.users.map(u=>h('option',{value:String(u.id)},u.name)));
    input.value=row.tm_user_id?String(row.tm_user_id):'';
    input.addEventListener('change',()=>finish(true, input.value));
    input.addEventListener('blur',()=>finish(false));
  } else if (col.type==='vendor'){
    input=h('select',null, h('option',{value:''},'—'),
      ...State.salesVendors.filter(v=>v.active).map(v=>h('option',{value:String(v.id)},`${v.code}${v.parent_label?' · '+v.parent_label:''}`)));
    input.value=row.vendor_id?String(row.vendor_id):'';
    input.addEventListener('change',()=>finish(true, input.value));
    input.addEventListener('blur',()=>finish(false));
  } else if (col.type==='date'){
    input=h('input',{type:'date',value:row[col.k]?String(row[col.k]).slice(0,10):''});
    input.addEventListener('change',()=>finish(true, input.value||null));
    input.addEventListener('blur',()=>finish(false));
  } else if (col.type==='amount'){
    input=h('input',{type:'text',value:row[col.k]?String(row[col.k]):'',inputmode:'numeric',placeholder:'0'});
    input.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ input.blur(); }});
    input.addEventListener('blur',()=>finish(true, input.value));
  } else {
    input=h('input',{type:'text',value:row[col.k]||''});
    input.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ input.blur(); } if(e.key==='Escape'){ finish(false); }});
    input.addEventListener('blur',()=>finish(true, input.value));
  }
  cell.append(input);
  setTimeout(()=>{ try{ input.focus(); if(input.select)input.select(); }catch(_){} },10);
}

function addNewOrder(){ openOrderModal(null); }

// PB 입력/수정 모달 — 시트 직접 편집 대신 팝업으로 입력
function openOrderModal(existingOrder){
  const me = State.user;
  const isPriv = me.role==='admin' || me.role==='manager';
  const isNew = !existingOrder;
  const o = existingOrder || {
    consult_date: new Date().toISOString().slice(0,10),
    status: 'UNPAID', amount: 0,
    tm_user_id: isPriv ? null : me.id,
  };

  const overlay = h('div', {
    style:'position:fixed;inset:0;background:rgba(15,15,15,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto',
    onClick:(e)=>{ if(e.target===overlay) overlay.remove(); }
  });

  const inputStyle = 'width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:13.5px;background:#fcfcfb;outline:none';
  const labelStyle = 'font-size:11.5px;font-weight:600;color:var(--text-soft);margin-bottom:5px;letter-spacing:.01em';
  const field=(label, input, hint)=>h('div',{style:'display:flex;flex-direction:column'},
    h('div',{style:labelStyle}, label),
    input,
    hint?h('div',{style:'font-size:10.5px;color:var(--text-soft);margin-top:3px'},hint):null
  );

  const tmSel = h('select',{style:inputStyle},
    h('option',{value:''},'— 선택 —'),
    ...State.users.map(u=>h('option',{value:String(u.id)}, u.name))
  );
  tmSel.value = o.tm_user_id ? String(o.tm_user_id) : (isPriv?'':String(me.id));
  if (!isPriv) tmSel.disabled = true;

  const dateI    = h('input',{type:'date',value:o.consult_date?String(o.consult_date).slice(0,10):'',style:inputStyle});
  const nameI    = h('input',{type:'text',value:o.customer_name||'',placeholder:'예: 홍길동',style:inputStyle});
  const phoneI   = h('input',{type:'tel',value:o.customer_phone||'',placeholder:'예: 010-1234-5678',style:inputStyle});

  // 동일 전화번호 PB 경고
  const dupWarn = h('div',{style:'margin-top:6px;font-size:11.5px;color:#c2410c;line-height:1.5;display:none'});
  function checkDup(){
    const ph = String(phoneI.value||'').replace(/[^0-9]/g,'');
    if (ph.length < 8) { dupWarn.style.display='none'; dupWarn.innerHTML=''; return; }
    const matches = (State.salesOrders||[]).filter(x=>{
      if (existingOrder && x.id===existingOrder.id) return false;
      const xph = String(x.customer_phone||'').replace(/[^0-9]/g,'');
      return xph === ph;
    });
    if (!matches.length){ dupWarn.style.display='none'; dupWarn.innerHTML=''; return; }
    dupWarn.style.display='block';
    dupWarn.innerHTML = `⚠ <b>중복 의심</b> — 이 전화번호로 ${matches.length}건의 PB가 이미 존재합니다 (중복 입금 주의):<br>`
      + matches.slice(0,5).map(m=>{
          const date=String(m.consult_date||'').slice(0,10);
          const amt = m.amount?` · ₩${Number(m.amount).toLocaleString('ko-KR')}`:'';
          const st = ORDER_STATUS_LABEL[m.status]||m.status;
          return `&nbsp;&nbsp;· ${date} · ${m.customer_name||'(이름없음)'} · ${st}${amt}`;
        }).join('<br>')
      + (matches.length>5?`<br>&nbsp;&nbsp;… 외 ${matches.length-5}건`:'');
  }
  phoneI.addEventListener('input', checkDup);
  phoneI.addEventListener('blur', checkDup);
  // 모달 열릴 때 한 번 체크
  setTimeout(checkDup, 100);

  const carrierSel = h('select',{style:inputStyle},
    h('option',{value:''},'— 선택 —'),
    ...CARRIER_LIST.map(c=>h('option',{value:c}, c))
  );
  carrierSel.value = o.carrier || '';

  const amountI  = h('input',{type:'number',value:o.amount||0,min:0,step:1000,placeholder:'0',style:inputStyle+';font-variant-numeric:tabular-nums'});
  const bankI    = h('input',{type:'text',value:o.payment_bank||'',placeholder:'예: 국민/신한/우리',style:inputStyle});
  const accountI = h('input',{type:'text',value:o.payment_account||'',placeholder:'계좌번호',style:inputStyle});
  const payDateI = h('input',{type:'date',value:o.payment_date?String(o.payment_date).slice(0,10):'',style:inputStyle});

  const statusSel = h('select',{style:inputStyle},
    ...ORDER_STATUS_LIST.map(s=>h('option',{value:s}, ORDER_STATUS_LABEL[s]))
  );
  statusSel.value = (ORDER_STATUS_LIST.includes(o.status) ? o.status : 'UNPAID');

  const noteI   = h('textarea',{rows:3,placeholder:'특이사항/메모',
    style:inputStyle+';resize:vertical;font-family:inherit;min-height:74px'}, o.note||'');

  const saveBtn   = h('button',{class:'btn btn-primary',style:'padding:10px 18px;font-weight:700;min-width:90px'}, isNew?'추가':'저장');
  const cancelBtn = h('button',{class:'btn',style:'padding:10px 18px'}, '취소');
  const deleteBtn = (!isNew && isPriv)
    ? h('button',{class:'btn btn-danger',style:'padding:10px 16px'}, '삭제')
    : null;

  async function submit(){
    const body = {
      id: existingOrder?.id,
      tm_user_id:     tmSel.value ? Number(tmSel.value) : null,
      consult_date:   dateI.value || null,
      customer_name:  nameI.value.trim() || null,
      customer_phone: phoneI.value.trim() || null,
      carrier:        carrierSel.value || null,
      vendor_id:      existingOrder?.vendor_id || null,
      amount:         Number(amountI.value) || 0,
      payment_bank:   bankI.value.trim() || null,
      payment_account:accountI.value.trim() || null,
      payment_date:   payDateI.value || null,
      status:         statusSel.value || 'UNPAID',
      note:           noteI.value.trim() || null,
    };
    saveBtn.disabled = true; saveBtn.textContent = '저장 중…';
    try{
      const r = await api('/api/sales/orders',{method:'POST',body});
      if (isNew) State.salesOrders.unshift(r.order);
      else {
        const idx = State.salesOrders.findIndex(x=>x.id===existingOrder.id);
        if (idx>=0) State.salesOrders[idx] = r.order;
      }
      renderApp();
      showToast(isNew?'추가됨':'저장됨');
      overlay.remove();
    }catch(e){
      saveBtn.disabled = false; saveBtn.textContent = isNew?'추가':'저장';
      alert(e.message);
    }
  }
  saveBtn.addEventListener('click', submit);
  cancelBtn.addEventListener('click', ()=>overlay.remove());
  if (deleteBtn) deleteBtn.addEventListener('click', async()=>{
    if (!confirm('이 PB 내역을 삭제하시겠습니까?')) return;
    try{
      await api(`/api/sales/orders?id=${existingOrder.id}`,{method:'DELETE'});
      State.salesOrders = State.salesOrders.filter(x=>x.id!==existingOrder.id);
      renderApp(); showToast('삭제됨'); overlay.remove();
    }catch(e){ alert(e.message); }
  });

  const card = h('div',{style:'background:#fff;border-radius:14px;width:600px;max-width:96vw;max-height:92vh;overflow:auto;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(15,15,15,.18)'},
    h('div',{style:'padding:18px 22px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between'},
      h('div',{style:'font-weight:700;font-size:16px'}, isNew?'＋ 새 PB 입력':'PB 수정'),
      h('div',{style:'font-size:11px;color:var(--text-soft)'}, isNew?'고객 정보를 입력하세요':'#'+(existingOrder?.id||''))
    ),
    h('div',{style:'padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px'},
      field('TM (담당자)', tmSel, !isPriv?'본인으로 자동 설정':null),
      field('상담일', dateI),
      field('고객명', nameI),
      field('전화번호', h('div',null, phoneI, dupWarn)),
      field('통신사', carrierSel),
      field('상태', statusSel),
      field('금액 (원)', amountI),
      field('입금일', payDateI),
      field('입금 은행', bankI),
      field('계좌번호', accountI),
    ),
    h('div',{style:'padding:0 22px 18px'}, field('메모', noteI)),
    h('div',{style:'padding:14px 22px;border-top:1px solid var(--border-soft);display:flex;gap:8px;align-items:center;background:#fafaf8'},
      deleteBtn,
      h('div',{style:'flex:1'}),
      cancelBtn, saveBtn,
    )
  );
  overlay.append(card);
  document.body.append(overlay);
  setTimeout(()=>{ try{ nameI.focus(); }catch(_){} }, 50);
  // ESC 닫기
  const onKey=(e)=>{ if(e.key==='Escape'){ overlay.remove(); document.removeEventListener('keydown',onKey); } };
  document.addEventListener('keydown', onKey);
}

// ─────── 요청 2: TM 마감 보고 ───────
function renderSalesTM(){
  const me=State.user;
  const isPriv=me.role==='admin'||me.role==='manager';
  const wrap=h('div');
  if (State.loadingPage==='sales-tm' && State.salesTmLoadedKey===null){
    return h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'),
      h('div',null,'TM 마감 데이터 로딩 중…'));
  }

  // 선택된 월(ym)의 첫일/말일 — cutoff 입력 범위 제한용
  const currentYm = State.salesYm || todayYm();
  const [_yY,_mM] = currentYm.split('-').map(Number);
  const monthFirst = `${currentYm}-01`;
  const monthLast  = `${currentYm}-${String(new Date(_yY,_mM,0).getDate()).padStart(2,'0')}`;
  // cutoff가 선택 월의 범위를 벗어나면 말일로 클램프 (당월이면 오늘로 클램프)
  let cutoffDefault = State.salesCutoff || new Date().toISOString().slice(0,10);
  if (cutoffDefault < monthFirst) cutoffDefault = monthFirst;
  if (cutoffDefault > monthLast)  cutoffDefault = monthLast;
  const todayLocal = new Date().toISOString().slice(0,10);
  if (currentYm === todayLocal.slice(0,7) && cutoffDefault > todayLocal) cutoffDefault = todayLocal;

  const ymI=h('input',{type:'month',value:currentYm});
  ymI.addEventListener('change',async()=>{
    State.salesYm=ymI.value;
    // 월 바뀌면 cutoff를 새 월의 말일(또는 오늘)로 자동 정정
    const [yy,mm]=ymI.value.split('-').map(Number);
    const newLast = `${ymI.value}-${String(new Date(yy,mm,0).getDate()).padStart(2,'0')}`;
    const tl = new Date().toISOString().slice(0,10);
    State.salesCutoff = (ymI.value === tl.slice(0,7) && tl < newLast) ? tl : newLast;
    State.salesTmLoadedKey=null;
    State.loadingPage='sales-tm'; renderApp();
    await loadSalesContext('sales-tm');
    State.loadingPage=null; renderApp();
  });
  const cutoffI=h('input',{type:'date',value:cutoffDefault,min:monthFirst,max:monthLast});
  cutoffI.addEventListener('change',async()=>{
    State.salesCutoff=cutoffI.value; State.salesTmLoadedKey=null;
    State.loadingPage='sales-tm'; renderApp();
    await loadSalesContext('sales-tm');
    State.loadingPage=null; renderApp();
  });

  const period=State.salesPeriod||{};
  const totalWdI=h('input',{type:'number',min:0,value:State.salesTmTotal||0,style:'width:70px'});
  const savePeriod=async()=>{
    if(!isPriv) return;
    try{
      // 단가는 기존 값 유지 (UI에서 제거됨)
      await api('/api/sales/period',{method:'POST',body:{
        ym:State.salesYm, total_workdays:Number(totalWdI.value)||0,
        unit_price:Number(period.unit_price||0)
      }});
      await loadSalesContext('sales-tm'); renderApp(); showToast('기간 설정 저장');
    }catch(e){ alert(e.message); }
  };
  totalWdI.addEventListener('blur', savePeriod);

  const toolbar=h('div',{class:'sales-toolbar'},
    h('span',{class:'label'},'월'), ymI,
    h('span',{class:'label'},'마감기준'), cutoffI,
    h('span',{class:'label'},'총근무일'), totalWdI,
    h('div',{style:'margin-left:auto;color:var(--text-soft);font-size:12px'},
      `실 근무일 ${State.salesTmElapsed} · 남은 ${State.salesTmRemaining}`
    )
  );

  // 빠른 날짜 필터 — TM 마감은 월/cutoff 기반
  const fmtYmdLocalT=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const _t=new Date();
  const _todayYmd=fmtYmdLocalT(_t);
  const _yd=new Date(_t); _yd.setDate(_yd.getDate()-1); const _ydYmd=fmtYmdLocalT(_yd);
  const _curYm=`${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,'0')}`;
  const _prevD=new Date(_t.getFullYear(), _t.getMonth()-1, 1);
  const _prevYm=`${_prevD.getFullYear()}-${String(_prevD.getMonth()+1).padStart(2,'0')}`;
  const _prevLast=new Date(_t.getFullYear(), _t.getMonth(), 0);
  const _prevLastYmd=fmtYmdLocalT(_prevLast);
  const _3mD=new Date(_t); _3mD.setMonth(_3mD.getMonth()-3); const _3mYmd=fmtYmdLocalT(_3mD);

  async function applyTmRange(targetYm, targetCutoff){
    State.salesYm = targetYm; State.salesCutoff = targetCutoff;
    State.salesTmLoadedKey = null; State.loadingPage='sales-tm';
    renderApp();
    await loadSalesContext('sales-tm');
    State.loadingPage=null; renderApp();
  }
  function qBtnT(label, onClick, active){
    return h('button',{class:'btn'+(active?' btn-primary':''), style:'padding:6px 12px;font-size:12px', onClick}, label);
  }
  const curYmT=State.salesYm||_curYm, curCutT=State.salesCutoff||_todayYmd;
  const quickBarT = h('div',{class:'sales-toolbar',style:'gap:6px;flex-wrap:wrap'},
    h('span',{class:'label'},'빠른 날짜'),
    qBtnT('오늘',                ()=>applyTmRange(_curYm, _todayYmd),    curYmT===_curYm && curCutT===_todayYmd),
    qBtnT('어제',                ()=>applyTmRange(_curYm, _ydYmd),       curYmT===_curYm && curCutT===_ydYmd),
    qBtnT('당월',                ()=>applyTmRange(_curYm, _todayYmd),    curYmT===_curYm && curCutT===_todayYmd),
    qBtnT('전월',                ()=>applyTmRange(_prevYm,_prevLastYmd), curYmT===_prevYm && curCutT===_prevLastYmd),
    qBtnT('3개월치',  ()=>applyTmRange(_curYm, _todayYmd),    false),
    qBtnT('전체',                ()=>applyTmRange(_curYm, _todayYmd),    false),
    h('span',{style:'margin-left:8px;color:var(--text-soft);font-size:11px'},
      `※ TM 마감은 월(${curYmT}) + 마감기준(${curCutT}) 기준`)
  );
  wrap.append(quickBarT, toolbar);

  // TM 마감은 결과표(read-only). 입력은 각 직원이 본인 페이지('내 근태' → 오늘 입력 카드)에서 함.
  // 우상단에 안내 라벨만 표시
  wrap.append(
    h('div',{style:'padding:8px 24px 0;font-size:11.5px;color:var(--text-soft)'},
      '📊 결과표 — 각 직원이 본인 화면에서 디비/휴무 입력 시 자동 합산됩니다')
  );

  const elapsed=State.salesTmElapsed;
  const total=State.salesTmTotal;
  const unitPrice=Number(period.unit_price||0);

  // 각 행 함수 계산
  const rows=State.salesTmRows.slice();
  const computed=rows.map(r=>{
    const offFloat = r.off_days + (r.half_days||0)*0.5;   // 반차 0.5
    const denom = Math.max(0.0001, elapsed - offFloat);
    const dayAvg = elapsed>0 ? r.total_count/denom : 0;
    const dbAvg = elapsed>0 ? r.total_db/denom : 0;
    const eff = r.total_db>0 ? r.total_count/r.total_db : 0;
    const projected = dayAvg * Math.max(0, total - offFloat);
    const expectedRevenue = projected * unitPrice;
    const currentRevenue = r.total_count * unitPrice;
    return {...r, offFloat, dayAvg, dbAvg, eff, projected, expectedRevenue, currentRevenue};
  });

  // 합계
  const totalCount = computed.reduce((s,r)=>s+r.total_count,0);
  const totalDb = computed.reduce((s,r)=>s+r.total_db,0);
  const totalProjected = computed.reduce((s,r)=>s+r.projected,0);
  const totalCurrentRev = computed.reduce((s,r)=>s+r.currentRevenue,0);
  const totalExpectedRev = computed.reduce((s,r)=>s+r.expectedRevenue,0);
  const totalDayAvg = elapsed>0 ? totalCount/elapsed : 0;
  const totalDbAvg = elapsed>0 ? totalDb/elapsed : 0;
  const totalEff = totalDb>0 ? totalCount/totalDb : 0;
  const perPerson = computed.length>0 ? totalProjected/computed.length : 0;

  // 표
  const fmtNum=(n,d=0)=>(Number(n||0)).toLocaleString('ko-KR',{maximumFractionDigits:d});
  const fmtPct=(n)=>((n||0)*100).toFixed(1)+'%';

  // 컬럼 — 이름 / 상태 / 총갯수 / 일평균 / 마감예상 / 총 디비 / 디비평균 / 디비 효율 / 매출
  const cols=['이름','상태','총갯수','일평균','마감예상','총 디비','디비평균','디비 효율','매출(현재)','매출(예상)'];
  const thead=h('thead',null,h('tr',null,...cols.map(c=>h('th',null,c))));
  const tbody=h('tbody');
  for (const r of computed){
    const isSelf=r.user_id===me.id;
    const eff=r.eff;
    const effColor = eff>=0.20?'#0f7b6c':eff>=0.15?'#1d4ed8':eff>=0.10?'#a96400':'#b91c1c';
    const status = getTodayStatus(r.user_id, State.records);
    tbody.append(h('tr',{class:isSelf?'row-self':''},
      h('td',null,
        h('span',{style:'display:inline-flex;align-items:center;gap:7px;cursor:pointer',
          onClick:()=>{State.perfPersonId=r.user_id; State.perfRangeKey=null; State.perfRange='thisMonth'; renderApp();}},
          h('span',{class:'avatar',style:`width:22px;height:22px;font-size:10.5px;background:${nameColor(r.name)}`}, initial(r.name)),
          r.name,
          r.role==='manager'?h('span',{class:'role-badge role-manager',style:'margin-left:4px;font-size:10px'},'차장'):null
        )
      ),
      h('td',{style:'text-align:left'}, statusBadge(status)),
      h('td',null, fmtNum(r.total_count)),
      h('td',null, fmtNum(r.dayAvg,1)),
      h('td',null, fmtNum(r.projected,0)),
      h('td',null, fmtNum(r.total_db)),
      h('td',null, fmtNum(r.dbAvg,0)),
      h('td',{class:'eff-cell',style:`color:${effColor}`}, fmtPct(eff)),
      h('td',null, fmtKRW(r.currentRevenue)),
      h('td',null, fmtKRW(r.expectedRevenue)),
    ));
  }
  tbody.append(h('tr',{class:'total-row'},
    h('td',null,'합계'),
    h('td',null,'—'),
    h('td',null, fmtNum(totalCount)),
    h('td',null, fmtNum(totalDayAvg,1)),
    h('td',null, fmtNum(totalProjected,0)),
    h('td',null, fmtNum(totalDb)),
    h('td',null, fmtNum(totalDbAvg,0)),
    h('td',null, fmtPct(totalEff)),
    h('td',null, fmtKRW(totalCurrentRev)),
    h('td',null, fmtKRW(totalExpectedRev)),
  ));

  const table=h('table',{class:'tm-table'}, thead, tbody);
  const tableWrap=h('div',{class:'orders-wrap'}, table);
  wrap.append(tableWrap);

  // 매출 카드
  const cards=h('div',{class:'sales-cards',style:'padding:0 24px 60px'},
    h('div',{class:'sales-card hl'}, h('div',{class:'lbl'},'한명 평균 마감예상'), h('div',{class:'val'}, fmtNum(perPerson,1)+'건')),
    h('div',{class:'sales-card'}, h('div',{class:'lbl'},'현재 누적 매출'), h('div',{class:'val'}, fmtKRW(totalCurrentRev))),
    h('div',{class:'sales-card'}, h('div',{class:'lbl'},'남은 예상 매출'), h('div',{class:'val'}, fmtKRW(totalExpectedRev-totalCurrentRev))),
    h('div',{class:'sales-card green'}, h('div',{class:'lbl'},'총 예상 매출'), h('div',{class:'val'}, fmtKRW(totalExpectedRev))),
  );
  wrap.append(cards);

  return wrap;
}

// ─────── 일 TM 마감 (월 TM 마감의 일자 버전) ───────
function renderSalesTMDaily(){
  const me=State.user;
  const isPriv=me.role==='admin'||me.role==='manager';
  const wrap=h('div');

  const d = State.salesTmDailyDate || new Date().toISOString().slice(0,10);
  if (State.loadingPage==='sales-tm-daily' && State.salesTmDailyLoadedYm===null){
    return h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'),
      h('div',null,'일 TM 마감 로딩 중…'));
  }

  const dateI=h('input',{type:'date',value:d});
  dateI.addEventListener('change',async()=>{
    State.salesTmDailyDate = dateI.value;
    const ymKey = dateI.value.slice(0,7);
    if (State.salesTmDailyLoadedYm !== ymKey){
      State.salesTmDailyLoadedYm = null;
      State.loadingPage='sales-tm-daily'; renderApp();
      await loadSalesContext('sales-tm-daily');
      State.loadingPage=null;
    }
    renderApp();
  });

  // 빠른 날짜 필터 — 일 TM 마감
  const fmtYmdLocalD=(dd)=>`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
  const _dt=new Date();
  const _dToday=fmtYmdLocalD(_dt);
  const _dY=new Date(_dt); _dY.setDate(_dY.getDate()-1); const _dYesterday=fmtYmdLocalD(_dY);
  const _dMonthStart=fmtYmdLocalD(new Date(_dt.getFullYear(),_dt.getMonth(),1));
  const _dPrevLast=fmtYmdLocalD(new Date(_dt.getFullYear(),_dt.getMonth(),0));
  const _d3m=new Date(_dt); _d3m.setMonth(_d3m.getMonth()-3); const _d3mYmd=fmtYmdLocalD(_d3m);

  async function applyDailyDate(target){
    State.salesTmDailyDate = target;
    const ymKey = target.slice(0,7);
    if (State.salesTmDailyLoadedYm !== ymKey){
      State.salesTmDailyLoadedYm = null;
      State.loadingPage='sales-tm-daily'; renderApp();
      await loadSalesContext('sales-tm-daily');
      State.loadingPage=null;
    }
    renderApp();
  }
  function qBtnD(label, onClick, active){
    return h('button',{class:'btn'+(active?' btn-primary':''), style:'padding:6px 12px;font-size:12px', onClick}, label);
  }
  const quickBarD = h('div',{class:'sales-toolbar',style:'gap:6px;flex-wrap:wrap'},
    h('span',{class:'label'},'빠른 날짜'),
    qBtnD('오늘',                ()=>applyDailyDate(_dToday),       d===_dToday),
    qBtnD('어제',                ()=>applyDailyDate(_dYesterday),   d===_dYesterday),
    qBtnD('당월',                ()=>applyDailyDate(_dMonthStart),  d===_dMonthStart),
    qBtnD('전월',                ()=>applyDailyDate(_dPrevLast),    d===_dPrevLast),
    qBtnD('3개월치',  ()=>applyDailyDate(_d3mYmd),       d===_d3mYmd),
    qBtnD('전체',                ()=>applyDailyDate(_dToday),       false),
  );
  const toolbar=h('div',{class:'sales-toolbar'},
    h('span',{class:'label'},'일자'), dateI,
    h('span',{style:'margin-left:8px;color:var(--text-soft);font-size:11px'},
      `※ 일 TM 마감 — ${d} 기준`)
  );
  wrap.append(quickBarD, toolbar);

  // 데이터: 그 일자에 해당하는 행만
  const dayRows = (State.salesTmDailyRows||[])
    .filter(r=>String(r.work_date).slice(0,10)===d);
  const byUser = {}; dayRows.forEach(r=>byUser[r.user_id]=r);
  const users = State.users.filter(u=>u.role!=='admin');

  const fmtNum=(n,p=0)=>(Number(n||0)).toLocaleString('ko-KR',{maximumFractionDigits:p});
  const fmtPct=(n)=>((n||0)*100).toFixed(1)+'%';

  // 합계
  let sumCount=0, sumDb=0, offCnt=0;
  users.forEach(u=>{
    const r=byUser[u.id];
    if (r){ sumCount+=Number(r.count||0); sumDb+=Number(r.db_count||0); if(r.is_off) offCnt++; }
  });
  const totalEff = sumDb>0 ? sumCount/sumDb : 0;

  const cols=['이름','상태','마감(건)','디비(건)','효율','휴무'];
  const thead=h('thead',null,h('tr',null,...cols.map(c=>h('th',null,c))));
  const tbody=h('tbody');

  async function saveDailyCell(uid, patch){
    const cur = byUser[uid] || { user_id:uid, work_date:d, db_count:0, count:0, is_off:false };
    const body = {
      user_id: uid, work_date: d,
      db_count: Number(patch.db_count ?? cur.db_count ?? 0),
      count:    Number(patch.count    ?? cur.count    ?? 0),
      is_off:   patch.is_off ?? cur.is_off ?? false,
    };
    try{
      const r = await api('/api/sales/tm-daily',{method:'POST',body});
      // 캐시 업데이트
      const idx = State.salesTmDailyRows.findIndex(x=>x.user_id===uid && String(x.work_date).slice(0,10)===d);
      const merged = { ...(idx>=0?State.salesTmDailyRows[idx]:{}), ...r.row };
      if (idx>=0) State.salesTmDailyRows[idx] = merged;
      else State.salesTmDailyRows.push(merged);
      renderApp();
    }catch(e){ alert(e.message); }
  }

  function editableCell(uid, key, val){
    const cell=h('td',null, fmtNum(val||0));
    if (!isPriv) return cell;
    cell.style.cursor='pointer';
    cell.addEventListener('click',()=>{
      if (cell.classList.contains('editing')) return;
      cell.classList.add('editing'); cell.innerHTML='';
      const input=h('input',{type:'number',min:0,value:Number(val||0),style:'width:80px'});
      cell.append(input);
      setTimeout(()=>{ try{ input.focus(); input.select(); }catch(_){} },10);
      const finish=async(commit)=>{
        cell.classList.remove('editing');
        if (commit){
          await saveDailyCell(uid, {[key]: Number(input.value)||0});
        } else {
          cell.innerHTML=''; cell.append(document.createTextNode(fmtNum(val||0)));
        }
      };
      input.addEventListener('blur',()=>finish(true));
      input.addEventListener('keydown',e=>{
        if(e.key==='Enter') finish(true);
        else if(e.key==='Escape') finish(false);
      });
    });
    return cell;
  }

  for (const u of users){
    const r = byUser[u.id];
    const count = r?.count || 0;
    const db    = r?.db_count || 0;
    const isOff = !!r?.is_off;
    const eff   = db>0 ? count/db : 0;
    const effColor = eff>=0.20?'#0f7b6c':eff>=0.15?'#1d4ed8':eff>=0.10?'#a96400':'#b91c1c';
    const status = getTodayStatus(u.id, State.records);

    const offTd = isPriv
      ? (function(){
          const td=h('td',null);
          const btn=h('button',{class:'btn'+(isOff?' btn-primary':''), style:'padding:4px 10px;font-size:11.5px'}, isOff?'휴무':'정상');
          btn.addEventListener('click',()=>saveDailyCell(u.id,{is_off:!isOff}));
          td.append(btn);
          return td;
        })()
      : h('td',null, isOff?'휴무':'-');

    tbody.append(h('tr',null,
      h('td',null,
        h('span',{style:'display:inline-flex;align-items:center;gap:7px'+(isPriv?';cursor:pointer':''),
          onClick: isPriv?()=>{State.perfPersonId=u.id; State.perfRangeKey=null; State.perfRange='thisMonth'; renderApp();}:null},
          h('span',{class:'avatar',style:`width:22px;height:22px;font-size:10.5px;background:${nameColor(u.name)}`}, initial(u.name)),
          u.name,
          Number(u.tier)===1?h('span',{class:'role-badge',style:'margin-left:4px;font-size:10px;background:#fdecc8;color:#cb912f'},'1차'):
          Number(u.tier)===2?h('span',{class:'role-badge',style:'margin-left:4px;font-size:10px;background:#d3e5ef;color:#0b6e99'},'2차'):null
        )
      ),
      h('td',{style:'text-align:left'}, statusBadge(status)),
      editableCell(u.id,'count',count),
      editableCell(u.id,'db_count',db),
      h('td',{class:'eff-cell',style:`color:${effColor}`}, fmtPct(eff)),
      offTd,
    ));
  }
  tbody.append(h('tr',{class:'total-row'},
    h('td',null,'합계'),
    h('td',null,'—'),
    h('td',null, fmtNum(sumCount)),
    h('td',null, fmtNum(sumDb)),
    h('td',null, fmtPct(totalEff)),
    h('td',null, `${offCnt}명 휴무`),
  ));
  const table=h('table',{class:'tm-table'}, thead, tbody);
  const tableWrap=h('div',{class:'orders-wrap'}, table);
  wrap.append(tableWrap);

  return wrap;
}

// ─────── 요청 3: 유입 분석 ───────
// 권한: 직원/차장 = 편집, 대표(admin) = 결과만 보기
function renderSalesVendor(){
  const me=State.user;
  // 대표(admin)도 편집 가능 — 대표가 직접 작성하는 페이지
  const canEdit = me.role === 'admin' || me.role === 'manager' || me.role === 'employee';
  const wrap=h('div');
  if (State.loadingPage==='sales-vendor' && State.salesVendorLoadedDate===null){
    return h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'),
      h('div',null,'유입 분석 로딩 중…'));
  }

  const dateI=h('input',{type:'date',value:State.salesDate||(new Date().toISOString().slice(0,10))});
  dateI.addEventListener('change',async()=>{
    State.salesDate=dateI.value; State.salesVendorLoadedDate=null;
    State.loadingPage='sales-vendor'; renderApp();
    await loadSalesContext('sales-vendor');
    State.loadingPage=null; renderApp();
  });

  // 재컨택 = 자동 계산 (수식: 실적 마감 - 유입분석 완료)
  const dayVendorCompleted = (State.salesVendorRows||[]).reduce((s,v)=>s+(v.completed_count||0),0);
  const autoDailyRecontact = Number(State.salesDayClosingTotal||0) - dayVendorCompleted;
  const autoMonthRecontact = Number(State.salesMonthClosingTotal||0) - Number(State.salesMonthVendorCompletedTotal||0);
  const recontactBoxStyle = 'display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:#eaf2fb;color:#0b6e99;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums';
  const recontactBox = h('span',{
    style: recontactBoxStyle,
    title:`수식: 당일 실적 마감(${State.salesDayClosingTotal||0}) - 유입분석 당일 완료(${dayVendorCompleted})`
  }, `${autoDailyRecontact.toLocaleString('ko-KR')}건`);
  const monthlyRecontactBox = h('span',{
    style: recontactBoxStyle,
    title:`수식: 당월 실적 마감(${State.salesMonthClosingTotal||0}) - 유입분석 당월 완료(${State.salesMonthVendorCompletedTotal||0})`
  }, `${autoMonthRecontact.toLocaleString('ko-KR')}건`);

  const toolbar=h('div',{class:'sales-toolbar'},
    h('span',{class:'label'},'일자'), dateI,
    h('span',{class:'label',style:'margin-left:14px'},'당일 재컨택 (자동)'), recontactBox,
    h('span',{class:'label',style:'margin-left:14px'},'당월 재컨택 (자동)'), monthlyRecontactBox,
    h('span',{style:'margin-left:8px;color:var(--text-soft);font-size:11px'},
      '※ 자동 계산 = 실적 마감 − 유입분석 완료')
  );

  // 빠른 날짜 필터 — 유입 분석은 단일 일자 기준
  const fmtYmdLocalV=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const _vt=new Date();
  const _vToday=fmtYmdLocalV(_vt);
  const _vY=new Date(_vt); _vY.setDate(_vY.getDate()-1); const _vYesterday=fmtYmdLocalV(_vY);
  const _vMonthStart=fmtYmdLocalV(new Date(_vt.getFullYear(),_vt.getMonth(),1));
  const _vPrevLast=fmtYmdLocalV(new Date(_vt.getFullYear(),_vt.getMonth(),0));
  const _vPrevFirst=fmtYmdLocalV(new Date(_vt.getFullYear(),_vt.getMonth()-1,1));
  const _v3m=new Date(_vt); _v3m.setMonth(_v3m.getMonth()-3); const _v3mYmd=fmtYmdLocalV(_v3m);

  async function applyVendorDate(d){
    State.salesDate = d; State.salesVendorLoadedDate = null;
    State.loadingPage='sales-vendor';
    renderApp();
    await loadSalesContext('sales-vendor');
    State.loadingPage=null; renderApp();
  }
  function qBtnV(label, onClick, active){
    return h('button',{class:'btn'+(active?' btn-primary':''), style:'padding:6px 12px;font-size:12px', onClick}, label);
  }
  const curDateV = State.salesDate || _vToday;
  const quickBarV = h('div',{class:'sales-toolbar',style:'gap:6px;flex-wrap:wrap'},
    h('span',{class:'label'},'빠른 날짜'),
    qBtnV('오늘',                ()=>applyVendorDate(_vToday),      curDateV===_vToday),
    qBtnV('어제',                ()=>applyVendorDate(_vYesterday),  curDateV===_vYesterday),
    qBtnV('당월',                ()=>applyVendorDate(_vMonthStart), curDateV===_vMonthStart),
    qBtnV('전월',                ()=>applyVendorDate(_vPrevLast),   curDateV===_vPrevLast),
    qBtnV('3개월치',  ()=>applyVendorDate(_v3mYmd),      curDateV===_v3mYmd),
    qBtnV('전체',                ()=>applyVendorDate(_vToday),      false),
    h('span',{style:'margin-left:8px;color:var(--text-soft);font-size:11px'},
      `※ 유입 분석은 단일 일자(${curDateV}) 기준`)
  );
  wrap.append(quickBarV, toolbar);

  // 상단 합계
  const rows=State.salesVendorRows;
  const sum = rows.reduce((s,r)=>{
    s.db+=r.db_count; s.del+=r.deleted_count; s.rec+=r.received_count; s.cmp+=r.completed_count; return s;
  }, {db:0,del:0,rec:0,cmp:0});
  const eff = sum.db>0 ? sum.cmp/sum.db : 0;
  const acc = sum.db>0 ? sum.rec/sum.db : 0;

  const summary=h('div',{class:'day-summary'},
    h('div',{class:'day-summary-row'},
      h('div',{class:'day-stat'},
        h('div',{class:'lbl'},'당일 디비 갯수'),
        h('div',{class:'val'}, sum.db)),
      h('div',{class:'day-stat'},
        h('div',{class:'lbl'},'당일완료 (접수)'),
        h('div',{class:'val'}, sum.rec)),
      h('div',{class:'day-stat hl'},
        h('div',{class:'lbl'},'완료'),
        h('div',{class:'val'}, sum.cmp)),
      h('div',{class:'day-stat'},
        h('div',{class:'lbl'},'효율'),
        h('div',{class:'val'}, ((eff)*100).toFixed(1)+'%')),
      h('div',{class:'day-stat'},
        h('div',{class:'lbl'},'접수율'),
        h('div',{class:'val'}, ((acc)*100).toFixed(1)+'%')),
      h('div',{class:'day-stat green'},
        h('div',{class:'lbl'},'당일 재컨택 (자동)'),
        h('div',{class:'val'}, autoDailyRecontact)),
    )
  );
  wrap.append(summary);

  // vendor 카드들
  const grid=h('div',{class:'vendor-grid'});
  for (const v of rows){
    const eff = (v.db_count - v.deleted_count) > 0 ? v.completed_count/(v.db_count - v.deleted_count) : 0;
    const acc = (v.db_count - v.deleted_count) > 0 ? v.received_count/(v.db_count - v.deleted_count) : 0;
    const card=h('div',{class:'vendor-card'},
      h('div',{class:'vc-head',style:`background:${v.color||'#9b9a97'}`},
        h('div',null, '▶ ', v.code, v.parent_label?h('span',{class:'vc-parent',style:'margin-left:6px'}, '('+v.parent_label+')'):null),
        h('div',{style:'font-size:11px;font-weight:600;opacity:.9'}, v.completed_count + '건')
      ),
      h('div',{class:'vc-grid'},
        vendorCell(v,'db_count','디비갯수', canEdit),
        vendorCell(v,'deleted_count','삭제', canEdit),
        vendorCell(v,'received_count','접수', canEdit),
        vendorCell(v,'completed_count','완료', canEdit),
      ),
      h('div',{class:'vc-stats'},
        h('div',{class:'vc-stat eff'}, h('span',null,'효율'), h('span',{class:'v'}, (eff*100).toFixed(1)+'%')),
        h('div',{class:'vc-stat acc'}, h('span',null,'접수율'), h('span',{class:'v'}, (acc*100).toFixed(1)+'%')),
      )
    );
    grid.append(card);
  }
  if (!rows.length){
    grid.append(h('div',{class:'sales-empty'}, h('div',{class:'ico'},'📈'), '유입처가 없습니다 — admin 에 시드 후 자동 생성'));
  }
  wrap.append(grid);
  return wrap;
}

function vendorCell(v, key, label, isPriv){
  const cell=h('div',{class:'vc-cell'},
    h('div',{class:'lbl'}, label),
    h('div',{class:'val'}, v[key]||0)
  );
  if (!isPriv) return cell;
  cell.addEventListener('click', ()=>{
    if (cell.classList.contains('editing')) return;
    cell.classList.add('editing'); cell.innerHTML='';
    const input=h('input',{type:'number',min:0,value:v[key]||0});
    cell.append(input);
    setTimeout(()=>{ try{ input.focus(); input.select(); }catch(_){} },10);
    const finish=async(commit)=>{
      cell.classList.remove('editing');
      const newVal = commit?(Number(input.value)||0):v[key];
      if (commit && newVal !== v[key]){
        try{
          await api('/api/sales/vendor-daily',{method:'POST',body:{
            vendor_id:v.vendor_id, work_date:State.salesDate,
            db_count:v.db_count, deleted_count:v.deleted_count,
            received_count:v.received_count, remaining_count:v.remaining_count,
            completed_count:v.completed_count,
            [key]: newVal
          }});
          v[key] = newVal;
          renderApp();
        }catch(e){ alert(e.message); renderApp(); }
        return;
      }
      cell.innerHTML='';
      cell.append(h('div',{class:'lbl'}, label), h('div',{class:'val'}, v[key]||0));
    };
    input.addEventListener('blur',()=>finish(true));
    input.addEventListener('keydown',e=>{
      if(e.key==='Enter') input.blur();
      if(e.key==='Escape') finish(false);
    });
  });
  return cell;
}

// ───────── CSV 내보내기 ─────────
function exportCsv(){
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const recIdx={};
  for(const r of State.records){
    if(r.status!=='APPROVED') continue;
    const dateStr=String(r.work_date).slice(0,10);
    recIdx[`${r.user_id}|${dateStr}`]=r;
  }
  const rows=[];
  const head=['이름','역할'];
  for(let d=1;d<=dim;d++) head.push(`${m}/${d}`);
  rows.push(head);
  for(const u of State.users){
    const row=[u.name, u.role==='manager'?'차장':'직원'];
    for(let d=1;d<=dim;d++){
      const ymd=fmtYmd(y,m,d);
      const r=recIdx[`${u.id}|${ymd}`];
      row.push(r?TYPE_LABELS[r.type]||'':'');
    }
    rows.push(row);
  }
  const csv=rows.map(r=>r.map(c=>{
    const s=String(c||'');
    return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;
  }).join(',')).join('\n');
  // BOM 추가 — 엑셀 한글 깨짐 방지
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`근태_${State.ym}.csv`;
  document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),500);
  showToast('CSV 다운로드');
}

// ───────── 단축키 ─────────
document.addEventListener('keydown',(e)=>{
  if(!State.user) return;
  const tag=(e.target&&e.target.tagName)||'';
  // Esc — 드로어/모달 닫기 (입력 필드에서도 동작)
  if(e.key==='Escape'){
    const m=$('.modal-bg'); if(m){ m.remove(); e.preventDefault(); }
    return;
  }
  // / — 검색창 포커스 (직원 페이지에서)
  if(e.key==='/'&&State.page==='people'&&!State.selectedPersonId&&tag!=='INPUT'&&tag!=='TEXTAREA'){
    const i=document.querySelector('.search-box input');
    if(i){ i.focus(); e.preventDefault(); }
    return;
  }
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  // ←/→ — 월 이동 (팀 캘린더 / 직원 상세)
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    if(State.page!=='grid'&&!State.selectedPersonId) return;
    const [y,m]=State.ym.split('-').map(Number);
    const d=new Date(y, m-1+(e.key==='ArrowLeft'?-1:1), 1);
    State.ym=fmtYm(d);
    loadMonth().then(renderApp);
    e.preventDefault();
  }
});

bootstrap();
