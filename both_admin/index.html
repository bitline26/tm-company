<!DOCTYPE html>
<!-- v: 2026-05-13-bust-cache-2 — PB 색 톤 + 데모 시드 + 기본 ALL 필터 + 입금중복 강조 -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>티엠컴퍼니</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f7f7f5; --text:#37352f; --text-soft:#787774;
    --border:#e9e9e7; --border-soft:#efeeec;
    --hover:#f1f1ef; --accent:#2383e2; --accent-soft:#eaf2fb;
    --green:#0f7b6c; --green-soft:#ddedea;
    --yellow:#cb912f; --yellow-soft:#fdecc8;
    --red:#e03e3e; --red-soft:#ffe2dd;
    --purple:#6940a5; --purple-soft:#e8deee;
    --pink:#ad1a72; --pink-soft:#f5e0e9;
    --blue:#0b6e99; --blue-soft:#d3e5ef;
    --gray:#9b9a97; --gray-soft:#ebeced;
    --shadow:rgba(15,15,15,0.05) 0 1px 2px;
    --shadow-md:rgba(15,15,15,0.10) 0 3px 6px,rgba(15,15,15,0.08) 0 9px 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:inherit}

  .auth-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#fafaf8;
    padding:24px;position:relative;overflow:hidden;
  }
  .auth-wrap::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(55,53,47,.05) 0%, transparent 70%),
      radial-gradient(40% 40% at 0% 100%, rgba(55,53,47,.04) 0%, transparent 70%),
      radial-gradient(40% 40% at 100% 100%, rgba(55,53,47,.04) 0%, transparent 70%);
  }
  .auth-card{
    position:relative;z-index:1;width:380px;background:#fff;
    border-radius:16px;padding:44px 36px 28px;
    box-shadow:0 1px 1px rgba(15,15,15,.03),0 8px 24px rgba(15,15,15,.06),0 24px 48px rgba(15,15,15,.04);
    border:1px solid rgba(15,15,15,.05);
  }
  .auth-brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px}
  .auth-brand-mark{
    width:44px;height:44px;border-radius:11px;
    background:#0f0f0f;
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;letter-spacing:0.02em;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 4px 14px rgba(15,15,15,.22);
  }
  .auth-brand-text{font-weight:700;font-size:16px;letter-spacing:-0.02em}

  .auth-tabs{display:flex;gap:20px;justify-content:center;border-bottom:1px solid var(--border);margin-bottom:24px}
  .auth-tab{padding:10px 2px 12px;border:none;background:transparent;color:#a3a29e;font-weight:600;font-size:13.5px;position:relative;letter-spacing:-0.005em}
  .auth-tab:hover{color:var(--text)}
  .auth-tab.on{color:var(--text)}
  .auth-tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--text);border-radius:2px}

  .field{margin-bottom:12px}
  .field input,.field select{
    width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:10px;
    background:#fcfcfb;outline:none;transition:border-color .12s,box-shadow .12s,background .12s;
    font-size:14px;color:var(--text);
  }
  .field input::placeholder{color:#b8b6b1}
  .field input:focus,.field select:focus{border-color:#0f0f0f;background:#fff;box-shadow:0 0 0 3px rgba(15,15,15,.06)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font-weight:600;font-size:13px;transition:background .12s,border-color .12s,transform .05s}
  .btn:hover{background:var(--hover)}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:#0f0f0f;color:#fff;border-color:#0f0f0f}
  .btn-primary:hover{background:#000;border-color:#000}
  .btn-block{width:100%;padding:14px;font-size:14px;border-radius:11px;letter-spacing:-0.005em;margin-top:6px}
  .btn-danger{color:var(--red);border-color:var(--red-soft)}
  .btn-danger:hover{background:var(--red-soft)}

  .auth-msg{font-size:12px;color:var(--red);min-height:16px;text-align:center;margin:8px 0 0}

  .auth-hint{
    margin-top:18px;padding:11px 14px;border-radius:10px;
    background:#f7f6f3;
    font-size:11.5px;color:var(--text-soft);
    display:flex;align-items:center;justify-content:center;gap:8px;
    letter-spacing:0.01em;
  }
  .auth-hint code{
    font-family:'SF Mono',Menlo,monospace;font-size:11px;background:#fff;
    border:1px solid var(--border);padding:1.5px 6px;border-radius:4px;color:var(--text);
  }

  .layout{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--bg-soft);border-right:1px solid var(--border);padding:14px 8px;display:flex;flex-direction:column;gap:2px}
  .side-user{padding:10px 10px 14px;border-bottom:1px solid var(--border-soft);margin-bottom:8px}
  .side-user-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .role-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:600;background:var(--gray-soft);color:var(--text-soft)}
  .role-admin{background:var(--purple-soft);color:var(--purple)}
  .role-manager{background:var(--blue-soft);color:var(--blue)}
  .side-user-meta{font-size:11px;color:var(--text-soft);margin-top:2px}
  .side-nav{display:flex;flex-direction:column;gap:1px;flex:1}
  .nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:4px;color:var(--text-soft);font-size:13.5px;cursor:pointer;border:none;background:transparent;text-align:left;width:100%;font-weight:500}
  .nav-item:hover{background:var(--hover)}
  .nav-item.on{background:var(--hover);color:var(--text);font-weight:600}
  .nav-count{background:var(--red);color:#fff;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:10px}
  .side-foot{border-top:1px solid var(--border-soft);padding-top:8px;margin-top:8px}

  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10}
  .crumbs{font-size:12px;color:var(--text-soft)}
  .page-title{font-size:24px;font-weight:700;margin:2px 0 0;letter-spacing:-0.01em}
  .top-actions{display:flex;align-items:center;gap:8px}
  .month-picker{display:flex;align-items:center;gap:4px}
  .month-label{font-weight:600;font-size:14px;min-width:90px;text-align:center}
  .icon-btn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:#fff;border-radius:6px;color:var(--text-soft);font-size:14px}
  .icon-btn:hover{background:var(--hover)}

  .content{padding:18px 24px 60px;flex:1;overflow:auto;contain:layout style}
  .orders-wrap{contain:layout style}
  .tm-table{contain:layout style}

  /* ───── 그리드 (노션 DB 캘린더 + 트렐로 보드 톤) ───── */
  .grid-wrap{border:1px solid var(--border);border-radius:10px;background:#fff;overflow:auto;max-width:100%}
  table.grid{border-collapse:separate;border-spacing:0;font-size:13px;table-layout:fixed;width:100%}
  table.grid th,table.grid td{border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);padding:0;text-align:center;vertical-align:middle}
  table.grid thead th{background:#fbfaf8;font-weight:600;color:var(--text-soft);font-size:11px;letter-spacing:0.02em;position:sticky;top:0;z-index:2;height:32px;text-transform:uppercase}
  /* 헤더 — 구글/네이버 캘린더 기준: 토 파랑, 일 빨강, 공휴 빨강+분홍 */
  table.grid thead th.sat{color:#3271b6;background:#f3f7fc}
  table.grid thead th.sun{color:#cf4b4b;background:#fbf3f3}
  table.grid thead th.holiday{color:#cf4b4b;background:#fde8e8}
  table.grid .col-name{position:sticky;left:0;background:#fff;z-index:3;text-align:left;padding:8px 14px;font-weight:600;width:140px;min-width:140px;border-right:1px solid var(--border)}
  table.grid thead .col-name{background:#fbfaf8;z-index:4;font-weight:600}
  table.grid tbody tr:hover .col-name{background:#faf9f6}
  /* 본문 — 평일 흰, 토 연파랑, 일 연분홍, 공휴 분홍 (4단계 명확 구분) */
  table.grid td.day{width:46px;height:42px;padding:4px;cursor:pointer;background:#fff;position:relative;user-select:none}
  table.grid td.day:hover{background:#f7f7f5}
  table.grid td.day.sat{background:#f4f8fc;cursor:default}
  table.grid td.day.sat:hover{background:#f4f8fc}
  table.grid td.day.sun{background:#fcf3f3;cursor:default}
  table.grid td.day.sun:hover{background:#fcf3f3}
  table.grid td.day.holiday{background:#fde8e8;cursor:default}
  table.grid td.day.holiday:hover{background:#fde8e8}
  table.grid td.day.today{background:#fff8e7}
  table.grid td.day.today.sat{background:#eef4fa}
  table.grid td.day.today.sun{background:#fbeaea}
  table.grid td.day.today.holiday{background:#fcdada}

  /* 셀 안 칩 (노션 DB 태그 스타일) */
  .chip{
    display:inline-flex;align-items:center;justify-content:center;
    padding:3px 8px;border-radius:5px;
    font-size:11px;font-weight:600;letter-spacing:-0.005em;
    line-height:1.35;white-space:nowrap;
    transition:transform .08s;
  }
  .chip-WORK{background:transparent;color:#a3a29e;font-weight:500}
  .chip-OFF{background:#ebebe9;color:#5b5750}
  .chip-MONTHLY{background:#d3e5ef;color:#0b6e99}
  .chip-ANNUAL{background:#dbe5f8;color:#1d4ed8}
  .chip-HALF_AM,.chip-HALF_PM{background:#fde8c8;color:#a96400}
  .chip-SICK{background:#ffe2dd;color:#b91c1c}
  .chip-HOLIDAY{background:#e8deee;color:#6940a5}
  .chip.is-requested{background:#fff;border:1px dashed #d49426;color:#a96400;padding:2px 7px}
  .chip.is-rejected{text-decoration:line-through;opacity:.55}
  td.day:hover .chip{transform:scale(1.04)}
  td.day.empty:hover::after{
    content:"+";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#c2c0bc;font-size:18px;font-weight:300;
  }

  /* 오늘 표시: 일자 헤더 강조 */
  table.grid thead th.today-h{color:#0f0f0f;font-weight:800;background:#fff8e7}

  /* 본인 행 강조 — 좌측 검정 바 + 살짝 다른 BG */
  table.grid tr.row-self .col-name{box-shadow:inset 3px 0 0 #0f0f0f;background:#fbf9f3}
  table.grid tr.row-self td.day:not(.sat):not(.sun):not(.holiday){background:#fdfcf8}
  table.grid tr.row-self td.day:not(.sat):not(.sun):not(.holiday):hover{background:#f7f4ec}

  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .legend-item{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-soft)}

  /* 헤더 위젯 (오늘 부재 / 본인 사용량) */
  .stat-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .stat-chip{
    display:inline-flex;align-items:center;gap:8px;padding:8px 12px;
    background:#fff;border:1px solid var(--border);border-radius:9px;font-size:12.5px;
    color:var(--text);
  }
  .stat-chip .num{font-weight:700;font-size:14px;color:#0f0f0f}
  .stat-chip.muted{color:var(--text-soft)}
  .stat-chip .stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .stat-chip .stat-dot.dot-annual{background:#1d4ed8}
  .stat-chip .stat-dot.dot-half{background:#d49426}
  .stat-chip .stat-dot.dot-sick{background:#b91c1c}
  .stat-chip .stat-dot.dot-monthly{background:#175594}
  .stat-chip .stat-dot.dot-off{background:#5b5750}
  .out-today{
    background:#fffbf2;border-color:#f6e2b3;color:#7a4f00;
  }
  .out-today .num{color:#7a4f00}

  /* ───── 우측 슬라이드 드로어 (트렐로 카드 상세 + 노션 페이지 톤) ───── */
  .modal-bg{position:fixed;inset:0;background:rgba(15,15,15,.30);z-index:50;animation:fadeIn .15s ease-out}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
  .drawer{
    position:fixed;top:0;right:0;bottom:0;width:440px;max-width:96vw;background:#fff;
    box-shadow:-12px 0 40px rgba(15,15,15,.10),-1px 0 0 var(--border-soft);
    padding:0;display:flex;flex-direction:column;
    animation:slideR .22s cubic-bezier(.2,.7,.2,1);
  }
  .drawer-head{padding:20px 24px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border-soft)}
  .drawer-eyebrow{font-size:11px;color:var(--text-soft);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
  .drawer-title{font-size:18px;font-weight:700;letter-spacing:-0.01em;line-height:1.3}
  .drawer-close{background:transparent;border:none;color:var(--text-soft);font-size:18px;cursor:pointer;padding:6px;border-radius:6px;line-height:1}
  .drawer-close:hover{background:var(--hover);color:var(--text)}
  .drawer-body{padding:18px 24px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:16px}
  .drawer-prop{display:flex;align-items:flex-start;gap:10px;font-size:13px}
  .drawer-prop .key{flex:0 0 84px;color:var(--text-soft);font-weight:500;font-size:12.5px;padding-top:4px}
  .drawer-prop .val{flex:1}
  .drawer-foot{padding:14px 20px;border-top:1px solid var(--border-soft);display:flex;gap:8px;justify-content:flex-end;background:#fafaf8;border-radius:0}

  .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .type-btn{padding:9px 6px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12.5px;font-weight:600;text-align:center;color:var(--text-soft);transition:all .1s}
  .type-btn:hover{background:var(--hover)}
  .type-btn.on{border-color:#0f0f0f;background:#0f0f0f;color:#fff}

  .audit-box{
    padding:12px 14px;border-radius:9px;background:#fafaf8;
    font-size:12px;color:var(--text-soft);line-height:1.6;
    display:flex;flex-direction:column;gap:4px;
  }
  .audit-box .audit-line{display:flex;justify-content:space-between;gap:8px}
  .audit-box .audit-key{color:#9b9a97;font-weight:500}
  .audit-box .audit-val{color:var(--text);font-weight:500}
  .audit-box .audit-val.ok{color:#0f7b6c}
  .audit-box .audit-val.no{color:#b91c1c}

  /* 정통 모달 (반려 사유 등) */
  .modal{background:#fff;border-radius:12px;width:420px;max-width:92vw;padding:22px;box-shadow:0 20px 50px rgba(15,15,15,.18);border:1px solid rgba(15,15,15,.05);position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60}
  .modal h3{margin:0 0 4px;font-size:15px;font-weight:700;letter-spacing:-0.01em}
  .modal .modal-sub{font-size:12.5px;color:var(--text-soft);margin-bottom:14px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}

  .approval-list{display:flex;flex-direction:column;gap:8px}
  .approval-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .approval-info{display:flex;flex-direction:column;gap:2px}
  .approval-info .who{font-weight:700;font-size:14px}
  .approval-info .what{font-size:12.5px;color:var(--text-soft)}
  .approval-actions{display:flex;gap:6px}
  .empty{padding:40px;text-align:center;color:var(--text-soft);font-size:13px}

  /* ───── 직원 디렉토리 (메인 — 직원 중심) ───── */
  .people-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .search-box{flex:1;position:relative;max-width:480px}
  .search-box input{
    width:100%;padding:11px 12px 11px 38px;border:1px solid var(--border);border-radius:10px;
    background:#fff;font-size:14px;outline:none;transition:border-color .12s,box-shadow .12s;
  }
  .search-box input:focus{border-color:#0f0f0f;box-shadow:0 0 0 3px rgba(15,15,15,.06)}
  .search-box::before{
    content:"";position:absolute;left:13px;top:50%;width:14px;height:14px;
    transform:translateY(-50%);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239b9a97' stroke-width='2.2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>");
    background-size:contain;background-repeat:no-repeat;
  }
  .view-toggle{display:flex;gap:2px;background:#f1f1ef;padding:3px;border-radius:8px}
  .view-toggle button{padding:6px 12px;border:none;background:transparent;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--text-soft);cursor:pointer}
  .view-toggle button.on{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(15,15,15,.06)}

  .people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .person-card{
    padding:16px;border:1px solid var(--border);border-radius:12px;background:#fff;
    cursor:pointer;transition:transform .1s,box-shadow .1s,border-color .1s;
    display:flex;flex-direction:column;gap:10px;
  }
  .person-card:hover{transform:translateY(-2px);border-color:#d8d8d4;box-shadow:0 6px 16px rgba(15,15,15,.06)}
  .person-head{display:flex;align-items:center;gap:10px}
  .avatar{
    width:38px;height:38px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;color:#fff;letter-spacing:0.01em;
  }
  .person-name{font-weight:700;font-size:14.5px;letter-spacing:-0.005em}
  .person-meta{font-size:11.5px;color:var(--text-soft);margin-top:1px;display:flex;align-items:center;gap:6px}
  .person-meta .dot{width:6px;height:6px;border-radius:50%;background:var(--gray)}
  .person-meta .dot.on{background:#4caf50}
  .person-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:2px}
  .person-stat{padding:6px 8px;background:#fafaf8;border-radius:7px;text-align:center}
  .person-stat .lbl{font-size:10px;color:var(--text-soft);font-weight:500;letter-spacing:0.02em}
  .person-stat .val{font-size:14px;font-weight:700;color:var(--text);margin-top:1px}
  .person-today{font-size:11.5px;font-weight:600;padding:4px 8px;border-radius:5px;display:inline-flex;align-items:center;gap:5px;width:fit-content}
  .person-today.t-WORK{background:#f0f9f0;color:#0f7b6c}
  .person-today.t-OFF{background:#ebebe9;color:#5b5750}
  .person-today.t-MONTHLY{background:#d3e5ef;color:#0b6e99}
  .person-today.t-ANNUAL{background:#dbe5f8;color:#1d4ed8}
  .person-today.t-HALF_AM,.person-today.t-HALF_PM{background:#fde8c8;color:#a96400}
  .person-today.t-SICK{background:#ffe2dd;color:#b91c1c}

  /* ───── 직원 상세 (프로필 페이지) ───── */
  .person-detail{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:flex-start}
  .pd-side{position:sticky;top:14px}
  .pd-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px}
  .pd-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:#fff;margin-bottom:14px}
  .pd-name{font-size:20px;font-weight:700;letter-spacing:-0.01em}
  .pd-role{font-size:12.5px;color:var(--text-soft);margin-top:2px}
  .pd-props{margin-top:16px;border-top:1px solid var(--border-soft);padding-top:14px;display:flex;flex-direction:column;gap:10px}
  .pd-prop{display:flex;justify-content:space-between;font-size:12.5px}
  .pd-prop .k{color:var(--text-soft)}
  .pd-prop .v{font-weight:600}
  .pd-section{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
  .pd-section h3{margin:0 0 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;letter-spacing:-0.005em}
  .pd-stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .pd-stat{padding:14px;background:#fafaf8;border-radius:10px;text-align:center}
  .pd-stat .v{font-size:22px;font-weight:700;color:var(--text)}
  .pd-stat .l{font-size:11.5px;color:var(--text-soft);font-weight:500;margin-top:2px;letter-spacing:0.02em}
  /* 네이버 캘린더 스타일 — 토(파랑)/일·공휴(빨강) + 휴일명 표기 */
  .pd-mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .pd-mini-cal .pmh{text-align:center;font-size:12px;color:#37352f;font-weight:700;padding:8px 0;letter-spacing:0.02em;border-bottom:1px solid var(--border-soft)}
  .pd-mini-cal .pmh.sat{color:#3271b6}
  .pd-mini-cal .pmh.sun{color:#cf4b4b}
  .pd-mini-cal .pmd{min-height:88px;border-radius:8px;background:#fff;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;cursor:pointer;position:relative;font-size:13px;color:#37352f;font-weight:600;border:1px solid #ebebe9;padding:6px 7px;gap:3px}
  .pd-mini-cal .pmd.empty{visibility:hidden;border:none;background:transparent}
  .pd-mini-cal .pmd:hover{background:#fafaf8;border-color:#d3d2cf}
  .pd-mini-cal .pmd.sat .pmd-num{color:#3271b6}
  .pd-mini-cal .pmd.sun .pmd-num,
  .pd-mini-cal .pmd.holiday .pmd-num{color:#cf4b4b}
  .pd-mini-cal .pmd.holiday{background:#fef3f3;border-color:#fad9d9}
  .pd-mini-cal .pmd.holiday:hover{background:#fde8e8}
  .pd-mini-cal .pmd.today{box-shadow:inset 0 0 0 2px #0f0f0f;background:#fff8e7}
  .pd-mini-cal .pmd.today.holiday{background:#fce4d6}
  .pd-mini-cal .pmd .pmd-num{font-size:13px;font-weight:700;line-height:1}
  .pd-mini-cal .pmd .pmd-hol{font-size:10px;color:#cf4b4b;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
  .pd-mini-cal .pmd .chip{font-size:10px;padding:2px 6px;margin-top:auto;align-self:flex-start}
  .pd-history-list{display:flex;flex-direction:column;gap:8px}
  .pd-hist{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:9px;background:#fafaf8;font-size:12.5px}
  .pd-hist .hi-left{display:flex;align-items:center;gap:10px}
  .pd-hist .hi-date{font-weight:600;min-width:70px}
  .pd-hist .hi-status{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
  .pd-hist .s-APPROVED{background:#e2efea;color:#0f7b6c}
  .pd-hist .s-REQUESTED{background:#fff5d9;color:#a96400}
  .pd-hist .s-REJECTED{background:#ffe2dd;color:#b91c1c}
  .pd-back{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;color:var(--text-soft);font-weight:600;cursor:pointer;padding:4px 8px;border-radius:6px;background:transparent;border:none}
  .pd-back:hover{background:var(--hover);color:var(--text)}

  @media (max-width:900px){
    .person-detail{grid-template-columns:1fr}
    .pd-stat-row{grid-template-columns:repeat(3,1fr)}
  }

  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#37352f;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:80;box-shadow:var(--shadow-md);max-width:90vw}

  /* ─────────────── 영업 모듈 (요청 2,3,4) ─────────────── */
  /* 사이드바 그룹 헤더 */
  .nav-group-h{font-size:10.5px;font-weight:700;color:#a3a29e;letter-spacing:0.06em;text-transform:uppercase;padding:14px 10px 6px;margin-top:4px}
  .nav-group-h:first-child{margin-top:0;padding-top:6px}

  /* 영업 워크스페이스 공통 */
  .sales-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 24px;background:#fff;border-bottom:1px solid var(--border)}
  .sales-toolbar .label{font-size:11px;font-weight:700;color:var(--text-soft);letter-spacing:0.04em}
  .sales-toolbar input[type="date"],.sales-toolbar input[type="month"],.sales-toolbar input[type="number"],.sales-toolbar input[type="text"]{
    padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:13px;outline:none;font-family:inherit;
  }
  .sales-toolbar input:focus{border-color:#0f0f0f;box-shadow:0 0 0 3px rgba(15,15,15,.06)}
  .sales-toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:13px;outline:none}

  /* 거래 표 (요청 4) */
  .orders-wrap{padding:14px 24px 60px}
  .orders-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .orders-table thead th{background:#fbfaf8;color:var(--text-soft);font-size:11px;font-weight:700;letter-spacing:0.03em;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border-soft);position:sticky;top:0}
  .orders-table tbody td{padding:0;border-bottom:1px solid var(--border-soft);vertical-align:middle}
  .orders-table tbody tr:last-child td{border-bottom:none}
  .orders-table tbody tr:hover td{background:#fafaf8}
  .orders-table .cell{padding:10px 12px;display:flex;align-items:center;gap:6px;min-height:40px;cursor:text}
  .orders-table .cell.editing{padding:0}
  .orders-table .cell input,.orders-table .cell select,.orders-table .cell textarea{
    width:100%;padding:10px 12px;border:none;outline:2px solid #0f0f0f;outline-offset:-2px;background:#fff;font-size:13px;font-family:inherit;border-radius:0;
  }
  /* 행 배경 — 카테고리별 색상 (좌측 4px 컬러 바로 강조) */
  .orders-table tr[class^="row-status-"] td:first-child,
  .orders-table tr[class*=" row-status-"] td:first-child{position:relative}
  .orders-table tr[class^="row-status-"] td:first-child::before,
  .orders-table tr[class*=" row-status-"] td:first-child::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
  }
  /* 입금완료 — 차분한 회색 톤 */
  .orders-table tr.row-status-PAID td{background:#f3f4f6;color:#4b5563}
  .orders-table tr.row-status-PAID:hover td{background:#e5e7eb}
  .orders-table tr.row-status-PAID td:first-child::before{background:#9ca3af;width:4px}

  /* 미입금 — 빨강 */
  .orders-table tr.row-status-UNPAID td,
  .orders-table tr.row-status-UNPAID_PROOF td{background:#fee2e2}
  .orders-table tr.row-status-UNPAID:hover td,
  .orders-table tr.row-status-UNPAID_PROOF:hover td{background:#fecaca}
  .orders-table tr.row-status-UNPAID td:first-child::before,
  .orders-table tr.row-status-UNPAID_PROOF td:first-child::before{background:#ef4444;width:4px}

  .orders-table tr.row-status-IN_PROGRESS td{background:#fef3c7}
  .orders-table tr.row-status-IN_PROGRESS:hover td{background:#fde68a}
  .orders-table tr.row-status-IN_PROGRESS td:first-child::before{background:#f59e0b}

  .orders-table tr.row-status-PARTIAL td{background:#e0e7ff}
  .orders-table tr.row-status-PARTIAL:hover td{background:#c7d2fe}
  .orders-table tr.row-status-PARTIAL td:first-child::before{background:#6366f1}

  .orders-table tr.row-status-CANCELLED td{background:#f3f4f6;color:#6b7280}
  .orders-table tr.row-status-CANCELLED td:first-child::before{background:#9ca3af}

  /* ── 중복 행 강조 (회색/빨강 status 색과 완전히 다른 강한 오렌지) ── */
  /* 입금 중복(💰): 같은 번호로 PAID 2건+ → 진한 오렌지 + 굵은 좌측 바 */
  .orders-table tr.row-paid-dup td{background:#fed7aa !important;color:#7c2d12 !important}
  .orders-table tr.row-paid-dup:hover td{background:#fdba74 !important}
  .orders-table tr.row-paid-dup td:first-child::before{background:#ea580c !important;width:6px !important}
  .orders-table tr.row-paid-dup td{box-shadow:inset 0 -1px 0 #fb923c}
  /* 단순 전화 중복(☢): 입금 중복 아닌 경우만 노랑 */
  .orders-table tr.row-dup:not(.row-paid-dup) td{background:#fef3c7 !important}
  .orders-table tr.row-dup:not(.row-paid-dup):hover td{background:#fde68a !important}
  .orders-table tr.row-dup:not(.row-paid-dup) td:first-child::before{background:#eab308 !important}
  /* 중복 뱃지 — 흔들림으로 시선 끌기 */
  @keyframes dup-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-2px)} 75%{transform:translateX(2px)} }
  .orders-table .dup-badge{display:inline-block;font-weight:900;cursor:help;animation:dup-shake 1.4s ease-in-out infinite}
  .orders-table .dup-badge.paid{color:#9a3412;font-size:15px;margin-right:6px;padding:2px 8px;background:#fff;border:2px solid #ea580c;border-radius:6px}
  .orders-table .dup-badge.phone{color:#a16207;font-size:14px;margin-right:5px}
  .orders-table tr.row-status-CANCELLED .cell{text-decoration:line-through;opacity:.65}

  /* 상태 칩 (orders status) */
  .st-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:-0.005em;white-space:nowrap;border:1px solid transparent}
  .st-chip::before{content:"";width:6px;height:6px;border-radius:50%;display:inline-block}
  .st-PAID{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
  .st-PAID::before{background:#10b981}
  .st-UNPAID,
  .st-UNPAID_PROOF{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
  .st-UNPAID::before,
  .st-UNPAID_PROOF::before{background:#ef4444}
  .st-IN_PROGRESS{background:#fef3c7;color:#92400e;border-color:#fcd34d}
  .st-IN_PROGRESS::before{background:#f59e0b}
  .st-PARTIAL{background:#e0e7ff;color:#3730a3;border-color:#a5b4fc}
  .st-PARTIAL::before{background:#6366f1}
  .st-CANCELLED{background:#f3f4f6;color:#4b5563;border-color:#d1d5db}
  .st-CANCELLED::before{background:#9ca3af}

  /* 통신사 칩 */
  .carrier-SK{background:#fef2f2;color:#dc2626;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
  .carrier-KT{background:#fff7ed;color:#c2410c;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
  .carrier-LGU{background:#fdf2f8;color:#be185d;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}

  /* TM 마감 표 (요청 2) */
  .tm-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .tm-table th{background:#fbfaf8;color:var(--text-soft);font-size:11.5px;font-weight:700;letter-spacing:0.03em;padding:10px 12px;text-align:right;border-bottom:1px solid var(--border-soft)}
  .tm-table th:nth-child(1),.tm-table th:nth-child(2){text-align:left}
  .tm-table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border-soft);font-variant-numeric:tabular-nums;font-weight:600}
  .tm-table td:nth-child(1),.tm-table td:nth-child(2){text-align:left}
  .tm-table tr:last-child td{border-bottom:none}
  .tm-table tr.row-self td{background:#fbf9f3}
  .tm-table tr:hover td{background:#fafaf8}
  .tm-table .col-input{cursor:cell}
  .tm-table .col-input:hover{background:#f1f5fb !important}
  .tm-table .col-input.editing{padding:0}
  .tm-table .col-input input{width:100%;padding:9px 12px;border:none;outline:2px solid #0f0f0f;outline-offset:-2px;text-align:right;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
  /* 엑셀식 직접 편집 input — type=text 라 spinner 없음, 셀에 딱 맞게 */
  .tm-table input[type=text]::selection{background:#bfdbfe}
  /* 시트 셀 — 강한 outline 대신 미묘한 강조, 텍스트 드래그 자연스럽게 */
  .tm-table td.sheet-cell{transition:box-shadow .08s,background .08s;cursor:text;position:relative;user-select:none}
  .tm-table td.sheet-cell:hover{background:rgba(15,15,15,.04)}
  .tm-table td.sheet-cell:focus-within{box-shadow:inset 0 0 0 2px #2563eb;z-index:1}
  .tm-table td.sheet-cell.in-range:not(:focus-within){box-shadow:inset 0 0 0 1.5px #93c5fd;background:rgba(37,99,235,.10)}
  .tm-table input.sheet-input::selection{background:#bfdbfe}
  .tm-table input.sheet-input{user-select:text}
  .vendor-card .vc-cell input.vc-input::selection{background:#bfdbfe}
  .tm-table input[type=number]::-webkit-inner-spin-button,
  .tm-table input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .tm-table input[type=number]{-moz-appearance:textfield}
  .tm-table .total-row td{background:#0f0f0f !important;color:#fff;font-weight:800;font-size:14px}
  .tm-table .eff-cell{font-weight:700}
  .tm-table .off-cell{color:#b91c1c;font-weight:700}

  /* TM 마감 매출 카드 */
  .sales-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:14px}
  .sales-card{padding:14px 16px;border-radius:10px;background:#fff;border:1px solid var(--border)}
  .sales-card .lbl{font-size:11px;color:var(--text-soft);font-weight:600;letter-spacing:0.04em}
  .sales-card .val{font-size:18px;font-weight:800;margin-top:3px;color:#0f0f0f;font-variant-numeric:tabular-nums}
  .sales-card.hl{background:#0f0f0f;color:#fff;border-color:#0f0f0f}
  .sales-card.hl .lbl{color:#a3a29e}
  .sales-card.hl .val{color:#fff}
  .sales-card.green{background:#0f7b6c;color:#fff;border-color:#0f7b6c}
  .sales-card.green .lbl{color:#bff5e8}
  .sales-card.green .val{color:#fff}

  /* 디비 평가 (요청 3) — vendor 카드 */
  .vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:14px 24px}
  .vendor-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .vendor-card .vc-head{padding:10px 14px;font-size:13px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:center}
  .vendor-card .vc-parent{font-size:10.5px;font-weight:600;opacity:.85;letter-spacing:0.03em}
  .vendor-card .vc-grid{display:grid;grid-template-columns:repeat(2,1fr);padding:10px;gap:8px}
  .vendor-card .vc-cell{padding:8px 10px;background:#fafaf8;border-radius:7px;transition:outline .08s}
  .vendor-card .vc-cell .lbl{font-size:10.5px;color:var(--text-soft);font-weight:600;letter-spacing:0.04em}
  .vendor-card .vc-cell .val{font-size:16px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
  /* 엑셀식 항상 노출 input — 스피너 제거, 보더 없음, 포커스 시 파란 outline */
  .vendor-card .vc-cell input.vc-input{
    width:100%;border:none;outline:none;background:transparent;padding:0;margin:0;
    font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;font-family:inherit;color:inherit;
    -moz-appearance:textfield;
  }
  .vendor-card .vc-cell input.vc-input::-webkit-outer-spin-button,
  .vendor-card .vc-cell input.vc-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .vendor-card .vc-cell.is-focus{outline:2px solid #2563eb;outline-offset:-2px;background:#fff}
  .vendor-card .vc-cell.in-range{outline:2px solid #2563eb;outline-offset:-2px;background:#eff6ff}
  .vendor-card .vc-stats{padding:0 10px 10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
  .vendor-card .vc-stat{padding:7px 10px;border-radius:7px;display:flex;justify-content:space-between;align-items:center}
  .vendor-card .vc-stat.eff{background:#dbeafe;color:#1d4ed8}
  .vendor-card .vc-stat.acc{background:#fef3c7;color:#a16207}
  .vendor-card .vc-stat .v{font-weight:800;font-size:14px}

  /* 일자별 마감 헤더 (요청 3 상단) */
  .day-summary{padding:14px 24px;background:#fff;border-bottom:1px solid var(--border)}
  .day-summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
  .day-stat{padding:14px;background:#fafaf8;border-radius:10px}
  .day-stat .lbl{font-size:11px;color:var(--text-soft);font-weight:600;letter-spacing:0.04em}
  .day-stat .val{font-size:22px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums}
  .day-stat.hl{background:#fff8e7;border:1px solid #f6e2b3}
  .day-stat.hl .val{color:#a96400}
  .day-stat.green{background:#e7f6e9;border:1px solid #b7e0bf}
  .day-stat.green .val{color:#0f7b6c}

  /* 빈 상태 */
  .sales-empty{padding:60px 20px;text-align:center;color:var(--text-soft)}
  .sales-empty .ico{font-size:36px;margin-bottom:10px;opacity:.4}

  /* + 새 거래 버튼 */
  .add-row-btn{padding:9px 14px;border-radius:8px;background:#0f0f0f;color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .add-row-btn:hover{background:#000}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

const State = {
  user: null,
  availableNames: [],
  presetNames: [],
  page: 'people',          // 직원 디렉토리 = 메인 (직원 중심 어드민)
  ym: null,
  users: [],
  records: [],
  search: '',              // 직원 이름 검색어
  dirDateFrom: '',         // 디렉토리 날짜 범위 (관리자)
  dirDateTo: '',
  detailDateFrom: '',      // 상세 진입 시 1회 적용용
  detailDateTo: '',
  selectedPersonId: null,  // 직원 상세 보기 대상

  // ─────── 영업 모듈 ───────
  salesYm: null,           // 'YYYY-MM' (요청 2,4 컨텍스트)
  salesDate: null,         // 'YYYY-MM-DD' (요청 3 일별)
  salesCutoff: null,       // 요청 2 cutoff (default = today)
  salesOrders: [],         // 요청 4 거래 리스트
  salesVendors: [],        // db_vendors
  salesPeriod: null,       // sales_period
  salesTmRows: [],         // tm-summary 응답 rows
  salesTmElapsed: 0,
  salesTmRemaining: 0,
  salesTmTotal: 0,
  salesVendorRows: [],     // vendor-daily 응답
  salesVendorEdit: false,  // 유입분석 카드 수정 모드 (대표만)
  salesDayMeta: null,      // {recontact_completed, note}
  salesMonthlyRecontact: 0,// 레거시(수동 입력 합) — 표시는 자동 계산으로 대체
  // 재컨택 자동 계산용 (재컨택 = 실적 마감 - 유입분석 완료)
  salesDayClosingTotal: 0,         // 당일 sales_tm_daily.count SUM
  salesMonthClosingTotal: 0,       // 당월 sales_tm_daily.count SUM
  salesMonthVendorCompletedTotal:0,// 당월 sales_vendor_daily.completed_count SUM
  salesOrdersFilter: { status:'ALL', tm:'ALL', vendor:'ALL', q:'', dateFrom:'', dateTo:'' },

const h = (tag,attrs,...children)=>{
  attrs = attrs || {};
  const el=document.createElement(tag);
  for(const k in attrs){
    if(k==='class') el.className=attrs[k];
    else if(k==='style') el.style.cssText=attrs[k];
    else if(k.startsWith('on')&&typeof attrs[k]==='function') el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(attrs[k]===false||attrs[k]==null) {}
    else el.setAttribute(k,attrs[k]);
  }
  for(const c of children.flat()){
    if(c==null||c===false) continue;
    el.append(c.nodeType?c:document.createTextNode(String(c)));
  }
  return el;
};

// 연도별 fetch 캐시 — 같은 연도 중복 요청 방지
const _holidayYearLoaded = new Set();
async function ensureHolidaysFor(year){
  const yk = String(year);
  if (_holidayYearLoaded.has(yk)) return;
  _holidayYearLoaded.add(yk);
  try{
    const r = await fetch(`/api/holidays?year=${yk}`, { credentials:'same-origin' });
    if (!r.ok) return;
    const j = await r.json();
    if (j && j.holidays) {
      let changed = false;
      for (const [d, name] of Object.entries(j.holidays)) {
        if (KR_HOLIDAY_MAP[d] !== name) { KR_HOLIDAY_MAP[d] = name; KR_HOLIDAYS.add(d); changed = true; }
      }
      if (changed && typeof renderApp === 'function') renderApp();
    }
  }catch(_){ /* 폴백 정적 매핑 사용 */ }
}
function computeKrWorkdays(ym){
  const [y,m] = ym.split('-').map(Number);
  const last = daysInMonth(y,m);
  let count = 0;
  for (let d=1; d<=last; d++){
    const dt = new Date(y, m-1, d);
    const dow = dt.getDay();             // 0=일,6=토
    if (dow===0 || dow===6) continue;
    if (isKrHoliday(fmtYmd(y,m,d))) continue;
    count++;
  }
  return count;
}

// 종소리 알람 — Web Audio API로 짧은 종소리 합성 (외부 자원 불필요)
function playBell(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = new Ctx();
    const now = ctx.currentTime;
    // 메인 톤 + 하모닉 — 종소리 느낌
    [[880, 1.2], [1318, 0.6], [2637, 0.4]].forEach(([freq, dur])=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + dur);
    });
    // 약한 두 번째 비트
    setTimeout(()=>{
      try{
        const c2 = new Ctx();
        const t2 = c2.currentTime;
        [[700, 0.8], [1050, 0.5]].forEach(([f,d])=>{
          const o=c2.createOscillator(), g=c2.createGain();
          o.type='sine'; o.frequency.value=f;
          g.gain.setValueAtTime(0.14, t2); g.gain.exponentialRampToValueAtTime(0.0001, t2+d);
          o.connect(g); g.connect(c2.destination); o.start(t2); o.stop(t2+d);
        });
      }catch(_){}
    }, 320);
  }catch(_){}
}

async function api(path, opts){
  opts = opts || {};
  const r=await fetch(path,{
    method:opts.method||'GET',
    headers:opts.body?{'Content-Type':'application/json'}:{},
    body:opts.body?JSON.stringify(opts.body):undefined,
    credentials:'same-origin',
  });
  let data={};
  try{ data=await r.json(); }catch(_){}
  if(!r.ok) throw new Error(data.error||`HTTP ${r.status}`);
  return data;
}

function renderMyHome(){
  const me=State.user;
  const isTier1 = Number(me.tier)===1;
  // self를 selectedPersonId로 설정해두고 person detail 재활용 (단, 좌측 프로필+뒤로가기 제거된 형태)
  const u={id:me.id,name:me.name,role:me.role,tier:me.tier,registered:true};
  // 2차 직원은 State.records 에 같은 tier=2 다른 직원들 기록도 포함 → 본인 것만 필터
  const recs=State.records.filter(r=>r.user_id===me.id);
  const cnt={ANNUAL:0,MONTHLY:0,HALF_AM:0,HALF_PM:0,SICK:0,OFF:0,UNAUTHORIZED:0};
  recs.forEach(r=>{
    if(r.status!=='APPROVED') return;
    if(cnt[r.type]!=null) cnt[r.type]++;
  });
  const wait=recs.filter(r=>r.status==='REQUESTED').length;

  // 분류별 사용 현황 — 신청 모달의 유형 버튼과 동일 5종
  // 1차직원: 휴무 / 무단결근
  // 2차직원: 오전반차 / 오후반차 / 무단결근 / 휴무(병가) / 월차
  const statCells = isTier1
    ? [
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.OFF), h('div',{class:'l'},'휴무')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.UNAUTHORIZED), h('div',{class:'l'},'무단결근')),
      ]
    : [
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.HALF_AM),     h('div',{class:'l'},'오전반차')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.HALF_PM),     h('div',{class:'l'},'오후반차')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.UNAUTHORIZED),h('div',{class:'l'},'무단결근')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.OFF+cnt.SICK),h('div',{class:'l'},'휴무(병가)')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.MONTHLY),     h('div',{class:'l'},'월차')),
      ];

  const stats=h('section',{class:'pd-section'},
    h('h3',null,'📊 ',`${State.ym} 사용 현황`,
      wait?h('span',{style:'margin-left:8px;font-size:11.5px;font-weight:600;color:#a96400;background:#fff5d9;padding:2px 8px;border-radius:5px'},`승인 대기 ${wait}건`):null),
    h('div',{class:'pd-stat-row'}, ...statCells)
  );

  // 큰 캘린더 — 네이버 캘린더 스타일 (토 파랑 / 일·공휴 빨강 + 휴일명 표기)
  const [y,m]=State.ym.split('-').map(Number);
  ensureHolidaysFor(y); // 그 해 공휴일 백그라운드 fetch
  const dim=daysInMonth(y,m);
  const firstDow=new Date(y,m-1,1).getDay();
  const recIdx={};
  recs.forEach(r=>{ recIdx[String(r.work_date).slice(0,10)]=r; });
  const todayYmd=fmtYmd(new Date().getFullYear(),new Date().getMonth()+1,new Date().getDate());
  const cal=h('div',{class:'pd-mini-cal'});
  // 요일 헤더 — 일(빨강) / 토(파랑) / 평일(검정)
  const dowLabels=['일','월','화','수','목','금','토'];
  dowLabels.forEach((lbl,i)=>{
    const c=['pmh'];
    if(i===0) c.push('sun');
    if(i===6) c.push('sat');
    cal.append(h('div',{class:c.join(' ')}, lbl));
  });
  for(let i=0;i<firstDow;i++) cal.append(h('div',{class:'pmd empty'}));
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ymd=fmtYmd(y,m,d);
    const holName=krHolidayName(ymd);
    const isHoliday=!!holName;
    const isSat=dow===6, isSun=dow===0;
    const rec=recIdx[ymd];
    const cls=['pmd'];
    // 우선순위: 공휴일 > 일 > 토
    if(isHoliday) cls.push('holiday');
    else if(isSun) cls.push('sun');
    else if(isSat) cls.push('sat');
    if(ymd===todayYmd) cls.push('today');
    const inner=[ h('div',{class:'pmd-num'}, d) ];
    if (isHoliday) inner.push(h('div',{class:'pmd-hol', title: holName}, holName));
    if(rec){
      const cc=['chip',`chip-${rec.type}`];
      if(rec.status==='REQUESTED') cc.push('is-requested');
      if(rec.status==='REJECTED') cc.push('is-rejected');
      inner.push(h('span',{class:cc.join(' ')}, TYPE_LABELS[rec.type]||''));
    } else if (isTier1 && !isSat && !isSun && !isHoliday) {
      // 1차 직원: 평일 디폴트로 '정상출근' 표기 (신청 클릭은 그대로 작동)
      inner.push(h('span',{class:'chip chip-WORK',style:'font-size:11px;opacity:.55'}, '정상출근'));
    }
    cal.append(h('div',{class:cls.join(' '),
      title: isHoliday ? holName : (isSun ? '일요일' : (isSat ? '토요일' : '')),
      onClick:(isSat||isSun||isHoliday)?null:()=>openCellDrawer(u,ymd,rec)
    }, ...inner));
  }

  const calSection=h('section',{class:'pd-section'},
    h('h3',null,'🗓 캘린더',h('span',{style:'color:var(--text-soft);font-weight:500;font-size:11.5px;margin-left:8px'},'· 빈 칸 클릭으로 신청')),
    cal
  );

  // 영업 마감 입력은 별도 탭(내 마감)에서. 여기는 근태(휴가)만.
  return h('div',null, stats, calSection);
}

// 상세 페이지의 "신청 이력" 섹션만 따로 렌더 (직원 본인용)
function _renderHistoryOnly(u){
  const recs=State.records.filter(r=>r.user_id===u.id);
  const filter={sort:'desc',type:'ALL',status:'ALL',from:'',to:''};
  const histList=h('div',{class:'pd-history-list'});

  function paint(){
    histList.innerHTML='';
    let f=recs.slice();
    if(filter.type!=='ALL'){
      if(filter.type==='HALF') f=f.filter(r=>r.type==='HALF_AM'||r.type==='HALF_PM');
      else f=f.filter(r=>r.type===filter.type);
    }
    if(filter.status!=='ALL') f=f.filter(r=>r.status===filter.status);
    if(filter.from) f=f.filter(r=>String(r.work_date).slice(0,10)>=filter.from);
    if(filter.to) f=f.filter(r=>String(r.work_date).slice(0,10)<=filter.to);
    f.sort((a,b)=>{const c=String(a.work_date).localeCompare(String(b.work_date));return filter.sort==='desc'?-c:c;});
    if(!f.length){ histList.append(h('div',{class:'empty',style:'padding:24px'},'조건에 맞는 이력이 없습니다')); return; }
    for(const r of f){
      const dateStr=String(r.work_date).slice(0,10);
      const dow=['일','월','화','수','목','금','토'][new Date(dateStr+'T00:00:00').getDay()];
      histList.append(h('div',{class:'pd-hist',style:'cursor:pointer',
        onClick:()=>openCellDrawer(u,dateStr,r)},
        h('div',{class:'hi-left'},
          h('span',{class:'hi-date'}, dateStr.slice(5)+' ('+dow+')'),
          h('span',{class:`chip chip-${r.type}`}, TYPE_LABELS[r.type]),
          r.note?h('span',{style:'color:var(--text-soft);font-size:11.5px'},'· '+r.note):null
        ),
        h('span',{class:`hi-status s-${r.status}`}, statusLabel(r.status))
      ));
    }
  }
  const typeOpts=[['ALL','전체'],['ANNUAL','연차'],['MONTHLY','월차'],['HALF','반차'],['SICK','병가'],['OFF','휴무'],['WORK','정상']];
  const typeSel=h('select',{style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:e=>{filter.type=e.target.value;paint();}}, ...typeOpts.map(([v,l])=>h('option',{value:v},l)));
  const statusOpts=[['ALL','전체상태'],['APPROVED','승인'],['REQUESTED','대기'],['REJECTED','반려']];
  const statusSel=h('select',{style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:e=>{filter.status=e.target.value;paint();}}, ...statusOpts.map(([v,l])=>h('option',{value:v},l)));
  const fromI=h('input',{type:'date',style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px',
    onChange:e=>{filter.from=e.target.value;paint();}});
  const toI=h('input',{type:'date',style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px',
    onChange:e=>{filter.to=e.target.value;paint();}});
  const sortBtn=h('button',{class:'btn',style:'padding:7px 11px;font-size:12px',
    onClick:()=>{filter.sort=filter.sort==='desc'?'asc':'desc';sortBtn.textContent=filter.sort==='desc'?'최신순 ↓':'오래된순 ↑';paint();}},'최신순 ↓');
  const resetBtn=h('button',{class:'btn',style:'padding:7px 11px;font-size:12px',
    onClick:()=>{filter.sort='desc';filter.type='ALL';filter.status='ALL';filter.from='';filter.to='';
      typeSel.value='ALL';statusSel.value='ALL';fromI.value='';toI.value='';sortBtn.textContent='최신순 ↓';paint();}},'초기화');

  const bar=h('div',{style:'display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px'},
    typeSel, statusSel,
    h('span',{style:'color:var(--text-soft);font-size:11.5px;margin-left:4px'},'기간'),
    fromI, h('span',{style:'color:var(--text-soft)'},'~'), toI,
    h('span',{style:'flex:1'}), sortBtn, resetBtn
  );

  paint();
  return h('section',{class:'pd-section'},
    h('h3',null,'🕘 신청 이력 ',h('span',{style:'color:var(--text-soft);font-weight:500;font-size:12px;margin-left:6px'},'· 총 '+recs.length+'건')),
    bar, histList
  );
}

// ─── 직원 '내 마감' 페이지 (요청 2 — 일단위 입력 → 자동 월 누적) ───
async function loadMyClosing(force){
  const ym = State.salesYm || todayYm();
  State.salesYm = ym;
  if (!force && State.myClosingLoadedYm === ym) return;
  try{
    const cutoff = new Date().toISOString().slice(0,10);
    const [r1, r2] = await Promise.all([
      api(`/api/sales/tm-daily?ym=${ym}`),    // 본인 일별 행 (오늘 채우기/수정)
      api(`/api/sales/tm-summary?ym=${ym}&cutoff=${cutoff}`),  // 12명 + 본인 누적·휴무
    ]);
    State.myClosingRows = r1.rows || [];
    State.salesPeriod = r2.period;
    State.salesTmElapsed = r2.elapsedWorkdays || 0;
    State.salesTmRemaining = r2.remainingWorkdays || 0;
    State.salesTmTotal = r2.totalWorkdays || 0;
    const mySummary = (r2.rows||[]).find(r=>r.user_id===State.user.id) || { off_days:0, total_count:0, total_db:0 };
    State.myAutoOffDays = Number(mySummary.off_days||0);
    State.myMonthSum = { total_count: Number(mySummary.total_count||0), total_db: Number(mySummary.total_db||0) };
    State.myClosingLoadedYm = ym;
  }catch(e){ console.error(e); }
}

async function loadMyClosingRange(from, to){
  try{
    const r = await api(`/api/sales/tm-daily?from=${from}&to=${to}`);
    State.myClosingRowsRange = r.rows || [];
  }catch(e){
    State.myClosingRowsRange = [];
    showToast(e.message);
  }
}

function renderMyClosing(){
  const me = State.user;
  // 날짜 범위 — 빠른 선택
  const range = State.myClosingRange || 'thisMonth';
  const today = new Date();
  const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let from, to, rangeLabel;
  if (range==='today')       { from=fmt(today); to=fmt(today); rangeLabel='오늘'; }
  else if (range==='yesterday'){ const y=new Date(today); y.setDate(y.getDate()-1); from=fmt(y); to=fmt(y); rangeLabel='어제'; }
  else if (range==='thisMonth'){ from=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`; to=fmt(today); rangeLabel='당월'; }
  else if (range==='prevMonth'){ const pm=new Date(today.getFullYear(),today.getMonth()-1,1); const last=new Date(today.getFullYear(),today.getMonth(),0); from=fmt(pm); to=fmt(last); rangeLabel='전월'; }
  else if (range==='3months') {
    // 직전 3개월 — 오늘이 5월이면 2/3/4월 1일~말일 (현재 월 제외)
    const fromD = new Date(today.getFullYear(), today.getMonth()-3, 1);
    const toD   = new Date(today.getFullYear(), today.getMonth(), 0); // 직전 월의 말일
    from = fmt(fromD); to = fmt(toD); rangeLabel='직전 3개월';
  }
  else                        { from='2020-01-01'; to=fmt(today); rangeLabel='전체'; }

  // 캐시 무효화 — 범위 바뀌면 다시 로드
  const cacheKey = `${from}~${to}`;
  if (State.myClosingRangeKey !== cacheKey){
    State.myClosingRangeKey = cacheKey;
    State.myClosingRowsRange = null;
    loadMyClosingRange(from,to).then(()=>renderApp());
    return h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'), h('div',null,'마감 결과 로딩 중…'));
  }
  const rows = State.myClosingRowsRange || [];

  // 본인 행만 (서버에서 이미 본인 것만 옴 — 직원 권한이라)
  const myRows = rows.filter(r=>r.user_id===me.id);

  // 통계
  let totalCount=0, totalDb=0, offDays=0;
  myRows.forEach(r=>{
    totalCount += Number(r.count||0);
    totalDb    += Number(r.db_count||0);
    if (r.is_off) offDays++;
  });
  const daysWithData = myRows.length;
  const workedDays = daysWithData - offDays;
  const dayAvg = workedDays>0 ? totalCount/workedDays : 0;
  const eff = totalDb>0 ? totalCount/totalDb : 0;

  // 빠른 범위 버튼
  function qBtn(label, key){
    const active = range===key;
    const btn = h('button',{class:'btn'+(active?' btn-primary':''), style:'padding:6px 12px;font-size:12px'}, label);
    btn.addEventListener('click', ()=>{
      State.myClosingRange = key;
      renderApp();
    });
    return btn;
  }
  const quickBar = h('div',{class:'sales-toolbar',style:'gap:6px;flex-wrap:wrap'},
    h('span',{class:'label'},'기간'),
    qBtn('오늘','today'),
    qBtn('어제','yesterday'),
    qBtn('당월','thisMonth'),
    qBtn('전월','prevMonth'),
    qBtn('3개월치','3months'),
    qBtn('전체','all'),
    h('span',{style:'margin-left:auto;color:var(--text-soft);font-size:12px'},
      `${rangeLabel} · ${from} ~ ${to}`)
  );

  // 통계 카드
  const fmtNum=(n,p=0)=>(Number(n||0)).toLocaleString('ko-KR',{maximumFractionDigits:p});
  const fmtPct=(n)=>((n||0)*100).toFixed(1)+'%';
  const statCard=(label,val,bg)=>h('div',{
    style:`padding:18px;background:${bg||'#fff'};border:1px solid var(--border);border-radius:11px;display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px`
  },
    h('div',{style:'font-size:11px;color:var(--text-soft);font-weight:700;letter-spacing:0.04em;text-transform:uppercase'}, label),
    h('div',{style:'font-size:26px;font-weight:800;font-variant-numeric:tabular-nums'}, val)
  );
  // 통계 카드 — 3개월치 모드는 월별 3줄(예: 5월 → 2월/3월/4월), 그 외엔 합산 1줄
  let statsBlock;
  if (range==='3months') {
    // 오늘 기준 직전 3개월 산출 (5월 → 2,3,4월)
    const now = new Date();
    const months = [];
    for (let i=3; i>=1; i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      months.push({y:d.getFullYear(), m:d.getMonth()+1});
    }
    const groupBox = (lbl, sub, cards) => h('div',{style:'padding:14px 24px 0'},
      h('div',{style:'font-size:13px;font-weight:800;color:#0f0f0f;margin-bottom:8px;letter-spacing:.01em;display:flex;align-items:center;gap:8px'},
        lbl, h('span',{style:'font-size:11px;font-weight:600;color:var(--text-soft)'}, sub)),
      h('div',{style:'display:flex;gap:12px;flex-wrap:wrap'}, ...cards)
    );
    const blocks = [];
    for (const {y,m} of months){
      const ym = `${y}-${String(m).padStart(2,'0')}`;
      const mRows = myRows.filter(r=>String(r.work_date).slice(0,10).startsWith(ym));
      let mCount=0, mDb=0, mOff=0;
      mRows.forEach(r=>{ mCount += Number(r.count||0); mDb += Number(r.db_count||0); if (r.is_off) mOff++; });
      const mDays = mRows.length;
      const mWorked = mDays - mOff;
      const mAvg = mWorked>0 ? mCount/mWorked : 0;
      const mEff = mDb>0 ? mCount/mDb : 0;
      blocks.push(groupBox(`📊 ${m}월 성과`, `${ym} · 근무 ${mWorked}일 · 휴무 ${mOff}일`, [
        statCard('총 마감 (건)', fmtNum(mCount), '#fffaf0'),
        statCard('총 디비 (건)', fmtNum(mDb),    '#fffaf0'),
        statCard('일평균 마감',  fmtNum(mAvg,1), '#eef2ff'),
        statCard('일평균 디비',  fmtNum(mWorked>0?mDb/mWorked:0,1), '#eef2ff'),
        statCard('효율',         mDb>0?fmtPct(mEff):'—', '#dcfce7'),
      ]));
    }
    statsBlock = h('div',{style:'display:flex;flex-direction:column;gap:14px;padding-bottom:8px'}, ...blocks);
  } else {
    statsBlock = h('div',{style:'display:flex;gap:12px;padding:14px 24px 0;flex-wrap:wrap'},
      statCard('총 마감 (건)', fmtNum(totalCount), '#fffaf0'),
      statCard('총 디비 (건)', fmtNum(totalDb), '#fffaf0'),
      statCard('일평균 마감', fmtNum(dayAvg,1), '#eef2ff'),
      statCard('효율', totalDb>0?fmtPct(eff):'—', '#dcfce7'),
      statCard('근무 / 휴무', `${workedDays}일 / ${offDays}일`, '#fff'),
    );
  }

  // 일별 표 (최신순)
  const tbody=h('tbody');
  if (!myRows.length){
    tbody.append(h('tr',null,
      h('td',{colspan:5,style:'padding:40px;text-align:center;color:var(--text-soft)'},
        '해당 기간 마감 기록이 없습니다 — 대표/관리자 입력 대기 중')));
  } else {
    myRows.slice().sort((a,b)=>String(b.work_date).localeCompare(String(a.work_date))).forEach(r=>{
      const d = String(r.work_date).slice(0,10);
      const dow = ['일','월','화','수','목','금','토'][new Date(d+'T00:00:00').getDay()];
      const rEff = r.db_count>0 ? r.count/r.db_count : 0;
      tbody.append(h('tr',null,
        h('td',{style:'padding:11px 14px;font-variant-numeric:tabular-nums'},`${d} (${dow})`),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700'}, fmtNum(r.count)),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700'}, fmtNum(r.db_count)),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums'}, r.db_count>0?fmtPct(rEff):'—'),
        h('td',{style:'padding:11px 14px;text-align:center;color:var(--text-soft);font-size:12px'}, r.is_off?'휴무':'—'),
      ));
    });
  }
  const table = h('table',{class:'tm-table',style:'width:100%'},
    h('thead',null, h('tr',null,
      h('th',{style:'text-align:left'},'일자'),
      h('th',{style:'text-align:right'},'마감 (건)'),
      h('th',{style:'text-align:right'},'디비 (건)'),
      h('th',{style:'text-align:right'},'효율'),
      h('th',null,'비고'),
    )),
    tbody
  );

  const note = h('div',{style:'padding:10px 24px 0;color:var(--text-soft);font-size:11.5px'},
    '※ 대표/관리자가 입력한 본인 마감 결과만 표시됩니다 — 본 페이지에서는 수정할 수 없습니다.');

  return h('div',null, quickBar, statsBlock, note, h('div',{style:'padding:14px 24px 40px'}, table));
}

  // 일자 picker (기본 오늘) + 본인 그날 행
  const todayYmd = new Date().toISOString().slice(0,10);
  if (!State.myDay || String(State.myDay).slice(0,7) !== ym) State.myDay = todayYmd;
  const sel = State.myDay;
  const dayRow = (State.myClosingRows||[]).find(r=>String(r.work_date).slice(0,10)===sel)
    || { count:0, db_count:0, is_off:false };

  // 누적 (서버 SUM) — 본인 월 총갯수/총디비
  const monthSum = State.myMonthSum || { total_count:0, total_db:0 };
  const autoOffDays = Number(State.myAutoOffDays||0);

  // 낙관적 누적 미리보기 (선택일자 입력 변화량 반영)
  function previewSums(){
    const baseCount = monthSum.total_count - (dayRow.count||0);
    const baseDb    = monthSum.total_db    - (dayRow.db_count||0);
    return {
      total_count: baseCount + (Number(cntI.value)||0),
      total_db:    baseDb    + (Number(dbI.value)||0),
    };
  }

  // 함수식 (월 누적 기반 — 휴무는 attendance 자동)
  const compute = (totalCount, totalDb) => {
    const denom = Math.max(0.0001, elapsed - autoOffDays);
    const dayAvg = elapsed>0 ? totalCount/denom : 0;
    const dbAvg  = elapsed>0 ? totalDb/denom : 0;
    const eff    = totalDb>0 ? totalCount/totalDb : 0;
    const projected = dayAvg * Math.max(0, total - autoOffDays);
    return { dayAvg, dbAvg, eff, projected };
  };

  // 툴바: 월 + 일자 picker (일단위 입력)
  const ymI = h('input',{type:'month',value:ym});

    await loadMyClosing(true);
    State.loadingPage=null; renderApp();

  const dateI = h('input',{type:'date',value:sel,min:ym+'-01',max:todayYmd});

  const dowKr = ['일','월','화','수','목','금','토'][new Date(sel+'T00:00:00').getDay()];

      `실 근무일 ${elapsed} · 남은 ${remaining} · 총 ${total}일`)

      h('td',{style:cellStyleHt}, tcEl),
      h('td',{style:cellStyleHt}, dayAvgEl),
      h('td',{style:cellStyleHt+';color:#1d4ed8'}, projectedEl),
      h('td',{style:cellStyleHt}, tdEl),
      h('td',{style:cellStyleHt}, dbAvgEl),
      h('td',{style:cellStyleHt+';font-size:20px'}, effEl),
    ))
  );
  const periodInfo = h('div',{style:'padding:10px 24px 0;color:var(--text-soft);font-size:12px'},
    `실 근무일 ${elapsed} · 남은 ${remaining} · 총 ${total}일 · 휴무는 근태(승인된 휴가/월차/연차)에서 자동`);
