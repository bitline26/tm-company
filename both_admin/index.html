<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>티엠컴퍼니</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f7f7f5; --text:#37352f; --text-soft:#787774;
    --border:#e9e9e7; --border-soft:#efeeec;
    --hover:#f1f1ef; --accent:#2383e2; --accent-soft:#eaf2fb;
    --green:#0f7b6c; --green-soft:#ddedea;
    --yellow:#cb912f; --yellow-soft:#fdecc8;
    --red:#e03e3e; --red-soft:#ffe2dd;
    --purple:#6940a5; --purple-soft:#e8deee;
    --pink:#ad1a72; --pink-soft:#f5e0e9;
    --blue:#0b6e99; --blue-soft:#d3e5ef;
    --gray:#9b9a97; --gray-soft:#ebeced;
    --shadow:rgba(15,15,15,0.05) 0 1px 2px;
    --shadow-md:rgba(15,15,15,0.10) 0 3px 6px,rgba(15,15,15,0.08) 0 9px 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:inherit}

  .auth-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#fafaf8;
    padding:24px;position:relative;overflow:hidden;
  }
  .auth-wrap::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(55,53,47,.05) 0%, transparent 70%),
      radial-gradient(40% 40% at 0% 100%, rgba(55,53,47,.04) 0%, transparent 70%),
      radial-gradient(40% 40% at 100% 100%, rgba(55,53,47,.04) 0%, transparent 70%);
  }
  .auth-card{
    position:relative;z-index:1;width:380px;background:#fff;
    border-radius:16px;padding:44px 36px 28px;
    box-shadow:0 1px 1px rgba(15,15,15,.03),0 8px 24px rgba(15,15,15,.06),0 24px 48px rgba(15,15,15,.04);
    border:1px solid rgba(15,15,15,.05);
  }
  .auth-brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px}
  .auth-brand-mark{
    width:44px;height:44px;border-radius:11px;
    background:#0f0f0f;
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;letter-spacing:0.02em;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 4px 14px rgba(15,15,15,.22);
  }
  .auth-brand-text{font-weight:700;font-size:16px;letter-spacing:-0.02em}

  .auth-tabs{display:flex;gap:20px;justify-content:center;border-bottom:1px solid var(--border);margin-bottom:24px}
  .auth-tab{padding:10px 2px 12px;border:none;background:transparent;color:#a3a29e;font-weight:600;font-size:13.5px;position:relative;letter-spacing:-0.005em}
  .auth-tab:hover{color:var(--text)}
  .auth-tab.on{color:var(--text)}
  .auth-tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--text);border-radius:2px}

  .field{margin-bottom:12px}
  .field input,.field select{
    width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:10px;
    background:#fcfcfb;outline:none;transition:border-color .12s,box-shadow .12s,background .12s;
    font-size:14px;color:var(--text);
  }
  .field input::placeholder{color:#b8b6b1}
  .field input:focus,.field select:focus{border-color:#0f0f0f;background:#fff;box-shadow:0 0 0 3px rgba(15,15,15,.06)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font-weight:600;font-size:13px;transition:background .12s,border-color .12s,transform .05s}
  .btn:hover{background:var(--hover)}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:#0f0f0f;color:#fff;border-color:#0f0f0f}
  .btn-primary:hover{background:#000;border-color:#000}
  .btn-block{width:100%;padding:14px;font-size:14px;border-radius:11px;letter-spacing:-0.005em;margin-top:6px}
  .btn-danger{color:var(--red);border-color:var(--red-soft)}
  .btn-danger:hover{background:var(--red-soft)}

  .auth-msg{font-size:12px;color:var(--red);min-height:16px;text-align:center;margin:8px 0 0}

  .auth-hint{
    margin-top:18px;padding:11px 14px;border-radius:10px;
    background:#f7f6f3;
    font-size:11.5px;color:var(--text-soft);
    display:flex;align-items:center;justify-content:center;gap:8px;
    letter-spacing:0.01em;
  }
  .auth-hint code{
    font-family:'SF Mono',Menlo,monospace;font-size:11px;background:#fff;
    border:1px solid var(--border);padding:1.5px 6px;border-radius:4px;color:var(--text);
  }

  .layout{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--bg-soft);border-right:1px solid var(--border);padding:14px 8px;display:flex;flex-direction:column;gap:2px}
  .side-user{padding:10px 10px 14px;border-bottom:1px solid var(--border-soft);margin-bottom:8px}
  .side-user-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .role-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:600;background:var(--gray-soft);color:var(--text-soft)}
  .role-admin{background:var(--purple-soft);color:var(--purple)}
  .role-manager{background:var(--blue-soft);color:var(--blue)}
  .side-user-meta{font-size:11px;color:var(--text-soft);margin-top:2px}
  .side-nav{display:flex;flex-direction:column;gap:1px;flex:1}
  .nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:4px;color:var(--text-soft);font-size:13.5px;cursor:pointer;border:none;background:transparent;text-align:left;width:100%;font-weight:500}
  .nav-item:hover{background:var(--hover)}
  .nav-item.on{background:var(--hover);color:var(--text);font-weight:600}
  .nav-count{background:var(--red);color:#fff;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:10px}
  .side-foot{border-top:1px solid var(--border-soft);padding-top:8px;margin-top:8px}

  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10}
  .crumbs{font-size:12px;color:var(--text-soft)}
  .page-title{font-size:24px;font-weight:700;margin:2px 0 0;letter-spacing:-0.01em}
  .top-actions{display:flex;align-items:center;gap:8px}
  .month-picker{display:flex;align-items:center;gap:4px}
  .month-label{font-weight:600;font-size:14px;min-width:90px;text-align:center}
  .icon-btn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:#fff;border-radius:6px;color:var(--text-soft);font-size:14px}
  .icon-btn:hover{background:var(--hover)}

  .content{padding:18px 24px 60px;flex:1;overflow:auto}

  .grid-wrap{border:1px solid var(--border);border-radius:8px;background:#fff;overflow:auto;max-width:100%}
  table.grid{border-collapse:collapse;font-size:13px;table-layout:fixed}
  table.grid th,table.grid td{border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);padding:0;text-align:center;height:34px;vertical-align:middle}
  table.grid thead th{background:var(--bg-soft);font-weight:600;color:var(--text-soft);font-size:11.5px;position:sticky;top:0;z-index:2;height:30px}
  table.grid thead th.weekend{color:var(--red)}
  table.grid thead th.sat{color:var(--blue)}
  table.grid .col-name{position:sticky;left:0;background:#fff;z-index:3;text-align:left;padding:0 12px;font-weight:600;min-width:110px;border-right:1px solid var(--border)}
  table.grid thead .col-name{background:var(--bg-soft);z-index:4}
  table.grid tr:hover .col-name{background:var(--bg-soft)}
  table.grid td.day{width:32px;cursor:pointer;font-size:11.5px;font-weight:600;color:var(--text-soft);position:relative;user-select:none}
  table.grid td.day:hover{outline:2px solid var(--accent);outline-offset:-2px;z-index:1}
  table.grid td.day.weekend{background:var(--bg-soft);cursor:default}
  table.grid td.day.weekend:hover{outline:none}
  table.grid td.day.today{box-shadow:inset 0 0 0 2px var(--accent)}
  /* 셀 타입 색상 (Linear/Notion 톤 — 채도 낮고 선명) */
  td.type-WORK{background:#fff}
  td.type-OFF{background:#f1f1ef;color:#5b5750}
  td.type-HALF_AM{background:linear-gradient(180deg,#fde8c8 50%,#fff 50%);color:#a96400}
  td.type-HALF_PM{background:linear-gradient(180deg,#fff 50%,#fde8c8 50%);color:#a96400}
  td.type-MONTHLY{background:#dee9f5;color:#175594}
  td.type-ANNUAL{background:#dbe5f8;color:#1d4ed8}
  td.type-SICK{background:#fde0dd;color:#b91c1c}
  td.type-HOLIDAY{background:#ebe3f5;color:#6940a5}
  td.day.requested::after{content:"";position:absolute;inset:2px;border:1.5px dashed #d49426;border-radius:3px;pointer-events:none}
  td.day.rejected{text-decoration:line-through;color:#b91c1c!important;background:#fde0dd!important}

  /* 본인 행 강조 — 좌측 액센트 바 + 행 배경 미세 톤다운 */
  table.grid tr.row-self .col-name{
    background:#f6f1e9;color:#37352f;
    box-shadow:inset 3px 0 0 #0f0f0f;
    padding-left:14px;
  }
  table.grid tr.row-self td.day:not(.weekend){background-color:#fdfbf7}
  table.grid tr.row-self td.day.type-OFF{background:#ecebe9}
  table.grid tr.row-self td.day.type-MONTHLY{background:#d4e2f1}
  table.grid tr.row-self td.day.type-ANNUAL{background:#cfdcf6}
  table.grid tr.row-self td.day.type-SICK{background:#fcd6d2}
  table.grid tr.row-self td.day.type-HOLIDAY{background:#e1d6f1}

  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;font-size:12px;color:var(--text-soft)}
  .legend-item{display:inline-flex;align-items:center;gap:5px}
  .legend-sw{display:inline-block;width:14px;height:14px;border-radius:3px;border:1px solid var(--border)}

  /* 헤더 위젯 (오늘 부재 / 본인 사용량) */
  .stat-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .stat-chip{
    display:inline-flex;align-items:center;gap:8px;padding:8px 12px;
    background:#fff;border:1px solid var(--border);border-radius:9px;font-size:12.5px;
    color:var(--text);
  }
  .stat-chip .num{font-weight:700;font-size:14px;color:#0f0f0f}
  .stat-chip.muted{color:var(--text-soft)}
  .stat-chip .stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .stat-chip .stat-dot.dot-annual{background:#1d4ed8}
  .stat-chip .stat-dot.dot-half{background:#d49426}
  .stat-chip .stat-dot.dot-sick{background:#b91c1c}
  .stat-chip .stat-dot.dot-monthly{background:#175594}
  .stat-chip .stat-dot.dot-off{background:#5b5750}
  .out-today{
    background:#fffbf2;border-color:#f6e2b3;color:#7a4f00;
  }
  .out-today .num{color:#7a4f00}

  .modal-bg{position:fixed;inset:0;background:rgba(15,15,15,.42);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  .modal{background:#fff;border-radius:14px;width:440px;max-width:92vw;padding:24px;box-shadow:0 20px 50px rgba(15,15,15,.18),0 4px 12px rgba(15,15,15,.06);border:1px solid rgba(15,15,15,.05)}
  .modal h3{margin:0 0 4px;font-size:16px;font-weight:700;letter-spacing:-0.01em}
  .modal .modal-sub{font-size:12.5px;color:var(--text-soft);margin-bottom:16px}
  .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
  .type-btn{padding:9px 6px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12.5px;font-weight:600;text-align:center;color:var(--text-soft);transition:all .1s}
  .type-btn:hover{background:var(--hover)}
  .type-btn.on{border-color:#0f0f0f;background:#0f0f0f;color:#fff}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
  .audit-box{
    margin:6px 0 14px;padding:10px 12px;border-radius:8px;background:#f7f6f3;
    font-size:11.5px;color:var(--text-soft);line-height:1.55;
  }
  .audit-box .audit-line{display:flex;justify-content:space-between;gap:8px}
  .audit-box .audit-key{color:#9b9a97;font-weight:500}
  .audit-box .audit-val{color:var(--text);font-weight:500}
  .audit-box .audit-val.ok{color:#0f7b6c}
  .audit-box .audit-val.no{color:#b91c1c}

  .approval-list{display:flex;flex-direction:column;gap:8px}
  .approval-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .approval-info{display:flex;flex-direction:column;gap:2px}
  .approval-info .who{font-weight:700;font-size:14px}
  .approval-info .what{font-size:12.5px;color:var(--text-soft)}
  .approval-actions{display:flex;gap:6px}
  .empty{padding:40px;text-align:center;color:var(--text-soft);font-size:13px}

  .emp-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .emp-card{padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .emp-name{font-weight:700}
  .emp-state{font-size:11.5px;color:var(--text-soft);margin-top:4px}
  .emp-state .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gray);margin-right:4px;vertical-align:middle}
  .emp-state.reg .dot{background:#4caf50}

  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#37352f;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:80;box-shadow:var(--shadow-md);max-width:90vw}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

const State = {
  user: null,
  availableNames: [],
  presetNames: [],
  page: 'grid',
  ym: null,
  users: [],
  records: [],
};

const $ = (sel,el=document)=>el.querySelector(sel);
const h = (tag,attrs,...children)=>{
  attrs = attrs || {};
  const el=document.createElement(tag);
  for(const k in attrs){
    if(k==='class') el.className=attrs[k];
    else if(k==='style') el.style.cssText=attrs[k];
    else if(k.startsWith('on')&&typeof attrs[k]==='function') el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(attrs[k]===false||attrs[k]==null) {}
    else el.setAttribute(k,attrs[k]);
  }
  for(const c of children.flat()){
    if(c==null||c===false) continue;
    el.append(c.nodeType?c:document.createTextNode(String(c)));
  }
  return el;
};
const fmtYm=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const fmtYmd=(y,m,d)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const todayYm=()=>fmtYm(new Date());
const daysInMonth=(y,m)=>new Date(y,m,0).getDate();

const TYPE_LABELS={
  WORK:'정상출근', OFF:'휴무', HALF_AM:'오전반차', HALF_PM:'오후반차',
  MONTHLY:'월차', ANNUAL:'연차', SICK:'병가', HOLIDAY:'공휴일',
};
const TYPE_SHORT={
  WORK:'', OFF:'휴', HALF_AM:'반', HALF_PM:'반',
  MONTHLY:'월', ANNUAL:'연', SICK:'병', HOLIDAY:'공',
};
const REQUESTABLE_TYPES=['OFF','HALF_AM','HALF_PM','MONTHLY','ANNUAL','SICK'];

function showToast(msg, ms=2200){
  const old=$('.toast'); if(old) old.remove();
  const t=h('div',{class:'toast'},msg);
  document.body.append(t);
  setTimeout(()=>t.remove(),ms);
}

async function api(path, opts){
  opts = opts || {};
  const r=await fetch(path,{
    method:opts.method||'GET',
    headers:opts.body?{'Content-Type':'application/json'}:{},
    body:opts.body?JSON.stringify(opts.body):undefined,
    credentials:'same-origin',
  });
  let data={};
  try{ data=await r.json(); }catch(_){}
  if(!r.ok) throw new Error(data.error||`HTTP ${r.status}`);
  return data;
}

async function bootstrap(){
  try{
    const me=await api('/api/auth/me');
    State.user=me.user;
    State.availableNames=me.availableNames||[];
    State.presetNames=me.presetNames||[];
    if(State.user){
      State.ym=todayYm();
      await loadMonth();
      renderApp();
    }else{
      renderAuth();
    }
  }catch(e){
    console.error(e);
    renderAuth();
  }
}

function renderAuth(){
  const root=$('#app'); root.innerHTML='';
  const tab={cur:'login'};
  const card=h('div',{class:'auth-card'});

  function paint(){
    card.innerHTML='';
    card.append(
      h('div',{class:'auth-brand'},
        h('div',{class:'auth-brand-mark'},'TM'),
        h('div',{class:'auth-brand-text'},'티엠컴퍼니')
      ),
      h('div',{class:'auth-tabs'},
        h('button',{class:'auth-tab '+(tab.cur==='login'?'on':''),onClick:()=>{tab.cur='login';paint();}},'로그인'),
        h('button',{class:'auth-tab '+(tab.cur==='signup'?'on':''),onClick:()=>{tab.cur='signup';paint();}},'회원가입'),
      ),
    );
    if(tab.cur==='login') card.append(loginForm());
    else card.append(signupForm());
  }
  paint();
  root.append(h('div',{class:'auth-wrap'},card));
}

function loginForm(){
  const wrap=h('div');
  const nameI=h('input',{type:'text',autocomplete:'username',placeholder:'이름'});
  const pwI=h('input',{type:'password',autocomplete:'current-password',placeholder:'비밀번호'});
  const msg=h('div',{class:'auth-msg'});
  const submit=async()=>{
    msg.textContent='';
    try{
      const r=await api('/api/auth/login',{method:'POST',body:{name:nameI.value.trim(),password:pwI.value}});
      State.user=r.user;
      State.ym=todayYm();
      await loadMonth();
      renderApp();
    }catch(e){ msg.textContent=e.message; }
  };
  pwI.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  wrap.append(
    h('div',{class:'field'},nameI),
    h('div',{class:'field'},pwI),
    msg,
    h('button',{class:'btn btn-primary btn-block',onClick:submit},'로그인')
  );
  return wrap;
}

function signupForm(){
  const wrap=h('div');
  const sel=h('select',null,
    h('option',{value:''},'— 이름 선택 —'),
    ...State.availableNames.map(n=>h('option',{value:n},n))
  );
  const pwI=h('input',{type:'password',autocomplete:'new-password',placeholder:'비밀번호 (4자 이상)'});
  const pw2I=h('input',{type:'password',autocomplete:'new-password',placeholder:'비밀번호 확인'});
  const msg=h('div',{class:'auth-msg'});
  const submit=async()=>{
    msg.textContent='';
    if(!sel.value){ msg.textContent='이름을 선택하세요'; return; }
    if(pwI.value.length<4){ msg.textContent='비밀번호 4자 이상'; return; }
    if(pwI.value!==pw2I.value){ msg.textContent='비밀번호 확인이 일치하지 않습니다'; return; }
    try{
      const r=await api('/api/auth/signup',{method:'POST',body:{name:sel.value,password:pwI.value}});
      State.user=r.user;
      State.ym=todayYm();
      await loadMonth();
      renderApp();
    }catch(e){ msg.textContent=e.message; }
  };
  wrap.append(
    h('div',{class:'field'},sel),
    h('div',{class:'field'},pwI),
    h('div',{class:'field'},pw2I),
    msg,
    h('button',{class:'btn btn-primary btn-block',onClick:submit},'가입하기')
  );
  return wrap;
}

async function loadMonth(){
  const r=await api(`/api/att/list?ym=${State.ym}`);
  State.users=r.users;
  State.records=r.records;
}

function renderApp(){
  const root=$('#app'); root.innerHTML='';
  const isPriv=State.user.role==='admin'||State.user.role==='manager';
  const pendingCount=State.records.filter(r=>r.status==='REQUESTED').length;

  const navItem=(key,label,count)=>h('button',{
    class:'nav-item '+(State.page===key?'on':''),
    onClick:()=>{State.page=key;renderApp();}
  }, label, count?h('span',{class:'nav-count'},count):null);

  const sidebar=h('aside',{class:'sidebar'},
    h('div',{class:'side-user'},
      h('div',{class:'side-user-name'}, State.user.name,
        State.user.role==='admin'?h('span',{class:'role-badge role-admin'},'대표'):
        State.user.role==='manager'?h('span',{class:'role-badge role-manager'},'차장'):
        h('span',{class:'role-badge'},'직원')
      ),
      h('div',{class:'side-user-meta'},'근태관리 시스템')
    ),
    h('nav',{class:'side-nav'},
      navItem('grid','월간 근태'),
      isPriv?navItem('approval','승인 대기',pendingCount||null):null,
      navItem('employees','직원 목록'),
    ),
    h('div',{class:'side-foot'},
      h('button',{class:'nav-item',onClick:logout},'로그아웃')
    )
  );

  let content;
  if(State.page==='grid') content=renderGrid();
  else if(State.page==='approval') content=renderApproval();
  else if(State.page==='employees') content=renderEmployees();

  const main=h('section',{class:'main'},
    renderTopbar(),
    h('div',{class:'content'}, content)
  );
  root.append(h('div',{class:'layout'},sidebar,main));
}

function renderTopbar(){
  const titleMap={grid:'월간 근태',approval:'승인 대기',employees:'직원 목록'};
  const title=titleMap[State.page]||'';
  const actions=h('div',{class:'top-actions'});
  if(State.page==='grid'){
    const [y,m]=State.ym.split('-').map(Number);
    const change=(delta)=>{
      const d=new Date(y,m-1+delta,1);
      State.ym=fmtYm(d);
      loadMonth().then(renderApp);
    };
    actions.append(
      h('button',{class:'btn',onClick:exportCsv,title:'CSV로 내보내기'},'내보내기'),
      h('div',{class:'month-picker'},
        h('button',{class:'icon-btn',onClick:()=>change(-1),title:'이전 달 (←)'},'‹'),
        h('div',{class:'month-label'},`${y}년 ${m}월`),
        h('button',{class:'icon-btn',onClick:()=>change(+1),title:'다음 달 (→)'},'›'),
      ),
      h('button',{class:'btn',onClick:()=>{State.ym=todayYm();loadMonth().then(renderApp);}},'오늘')
    );
  }
  return h('header',{class:'topbar'},
    h('div',null,
      h('div',{class:'crumbs'},'티엠컴퍼니'),
      h('h1',{class:'page-title'},title)
    ),
    actions
  );
}

// 헤더 위젯 (오늘 부재 / 본인 사용량) ─────────────────
function renderStatChips(){
  const wrap=h('div',{class:'stat-row'});
  const today=new Date();
  const todayYmd=fmtYmd(today.getFullYear(),today.getMonth()+1,today.getDate());

  // 오늘 부재중 (APPROVED 인 OFF/MONTHLY/ANNUAL/SICK/HOLIDAY/HALF_AM/HALF_PM)
  const outToday=State.records.filter(r=>{
    const d=String(r.work_date).slice(0,10);
    return d===todayYmd && r.status==='APPROVED' && r.type!=='WORK';
  });
  const userMap={}; State.users.forEach(u=>userMap[u.id]=u);
  const outNames=outToday.map(r=>{
    const n=userMap[r.user_id]?.name||'?';
    return `${n}(${TYPE_LABELS[r.type]})`;
  }).join(', ');
  wrap.append(h('div',{
    class:'stat-chip out-today',
    title:outNames||'결근/휴가 없음',
  }, '오늘 부재 ', h('span',{class:'num'}, outToday.length), '명',
     outNames?h('span',{style:'color:#9a7600;margin-left:6px'},'· '+outNames):null));

  // 본인 이번달 사용량 (APPROVED만)
  const me=State.user;
  if(me.role!=='admin'){
    const mine=State.records.filter(r=>r.user_id===me.id && r.status==='APPROVED');
    const cnt={ANNUAL:0,MONTHLY:0,HALF_AM:0,HALF_PM:0,SICK:0,OFF:0};
    mine.forEach(r=>{ if(cnt[r.type]!=null) cnt[r.type]++; });
    const halfTotal=cnt.HALF_AM+cnt.HALF_PM;
    wrap.append(
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-annual'}),' 연차 ',h('span',{class:'num'},cnt.ANNUAL)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-monthly'}),' 월차 ',h('span',{class:'num'},cnt.MONTHLY)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-half'}),' 반차 ',h('span',{class:'num'},halfTotal)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-sick'}),' 병가 ',h('span',{class:'num'},cnt.SICK)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-off'}),' 휴무 ',h('span',{class:'num'},cnt.OFF)),
    );
  }

  // 승인 대기
  const isPriv=me.role==='admin'||me.role==='manager';
  const waiting=State.records.filter(r=>r.status==='REQUESTED');
  if(waiting.length){
    wrap.append(h('div',{
      class:'stat-chip',style:'background:#fff7ec;border-color:#f4d99c;color:#7a4f00;cursor:pointer',
      onClick:()=>{ if(isPriv){ State.page='approval'; renderApp(); }}
    },'승인 대기 ', h('span',{class:'num',style:'color:#7a4f00'}, waiting.length),'건',
       isPriv?h('span',{style:'margin-left:6px;font-size:11px'},'· 클릭'):null));
  }

  return wrap;
}

function renderGrid(){
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const today=new Date();
  const todayYmd=fmtYmd(today.getFullYear(),today.getMonth()+1,today.getDate());

  const recIdx={};
  for(const r of State.records){
    const dateStr=String(r.work_date).slice(0,10);
    recIdx[`${r.user_id}|${dateStr}`]=r;
  }

  const headRow=[h('th',{class:'col-name'},'이름')];
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const cls=[];
    if(dow===0) cls.push('weekend');
    if(dow===6) cls.push('sat');
    headRow.push(h('th',{class:cls.join(' ')}, d));
  }
  const headRow2=[h('th',{class:'col-name'},'요일')];
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const labels=['일','월','화','수','목','금','토'];
    const cls=[]; if(dow===0) cls.push('weekend'); if(dow===6) cls.push('sat');
    headRow2.push(h('th',{class:cls.join(' ')}, labels[dow]));
  }

  const tbody=h('tbody');
  for(const u of State.users){
    const isSelf=u.id===State.user.id;
    const tr=h('tr',{class:isSelf?'row-self':''});
    tr.append(h('td',{class:'col-name'}, u.name,
      u.role==='manager'?h('span',{class:'role-badge role-manager',style:'margin-left:6px'},'차장'):null
    ));
    for(let d=1;d<=dim;d++){
      const dow=new Date(y,m-1,d).getDay();
      const isWeekend=(dow===0||dow===6);
      const ymd=fmtYmd(y,m,d);
      const rec=recIdx[`${u.id}|${ymd}`];
      const cls=['day'];
      if(isWeekend) cls.push('weekend');
      if(ymd===todayYmd) cls.push('today');
      let label='';
      if(rec){
        cls.push(`type-${rec.type}`);
        if(rec.status==='REQUESTED') cls.push('requested');
        if(rec.status==='REJECTED') cls.push('rejected');
        label=TYPE_SHORT[rec.type]||'';
      }
      const td=h('td',{
        class:cls.join(' '),
        title:rec?`${TYPE_LABELS[rec.type]} (${statusLabel(rec.status)})${rec.note?' · '+rec.note:''}`:'',
        onClick:isWeekend?null:()=>openCellModal(u,ymd,rec),
      }, label);
      tr.append(td);
    }
    tbody.append(tr);
  }

  const table=h('table',{class:'grid'},
    h('thead',null,h('tr',null,headRow),h('tr',null,headRow2)),
    tbody
  );
  const wrap=h('div',{class:'grid-wrap'},table);

  const legend=h('div',{class:'legend'},
    legendItem('정상','#fff'),
    legendItem('휴무','#f1f1ef'),
    legendItem('월차','#dee9f5'),
    legendItem('연차','#dbe5f8'),
    legendItem('반차','#fde8c8'),
    legendItem('병가','#fde0dd'),
    legendItem('공가','#ebe3f5'),
    h('span',{class:'legend-item',style:'margin-left:auto'},'· 점선 = 승인대기 · 빨강 취소선 = 반려')
  );
  return h('div',null, renderStatChips(), wrap, legend);
}
function legendItem(label,color){
  return h('span',{class:'legend-item'},h('span',{class:'legend-sw',style:`background:${color}`}),label);
}
function statusLabel(s){return s==='APPROVED'?'승인':s==='REJECTED'?'반려':'요청'}

function openCellModal(target,ymd,rec){
  const me=State.user;
  const isPriv=me.role==='admin'||me.role==='manager';
  const isSelf=target.id===me.id;
  if(!isSelf && !isPriv){
    if(rec) showToast(`${target.name} · ${ymd} · ${TYPE_LABELS[rec.type]} (${statusLabel(rec.status)})`);
    return;
  }
  let chosen=rec?rec.type:'OFF';

  let typeGrid;
  function repaint(){
    typeGrid.innerHTML='';
    REQUESTABLE_TYPES.forEach(t=>typeGrid.append(typeBtn(t)));
  }
  function typeBtn(t){
    return h('button',{
      class:'type-btn '+(chosen===t?'on':''),
      onClick:()=>{chosen=t;repaint();}
    }, TYPE_LABELS[t]);
  }
  typeGrid=h('div',{class:'type-grid'});
  REQUESTABLE_TYPES.forEach(t=>typeGrid.append(typeBtn(t)));

  const noteI=h('input',{type:'text',value:rec?rec.note||'':'',placeholder:'메모 (선택)'});
  const msg=h('div',{class:'auth-msg'});

  // 승인 이력 박스 (기존 레코드가 있을 때만)
  let auditBox=null;
  if(rec){
    const reqAt=rec.requested_at?new Date(rec.requested_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}):'';
    const apvAt=rec.approved_at?new Date(rec.approved_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}):'';
    const apvName=rec.approver_name||'';
    let statusLine;
    if(rec.status==='APPROVED'){
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'승인'),
        h('span',{class:'audit-val ok'}, apvName||'관리자',' · ',apvAt));
    } else if(rec.status==='REJECTED'){
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'반려'),
        h('span',{class:'audit-val no'}, apvName||'관리자',' · ',apvAt, rec.reject_reason?` — ${rec.reject_reason}`:''));
    } else {
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'상태'),
        h('span',{class:'audit-val'},'승인 대기'));
    }
    auditBox=h('div',{class:'audit-box'},
      h('div',{class:'audit-line'},h('span',{class:'audit-key'},'요청'),h('span',{class:'audit-val'},reqAt)),
      statusLine
    );
  }

  const close=()=>{ const m=$('.modal-bg'); if(m) m.remove(); };
  const save=async()=>{
    msg.textContent='';
    try{
      await api('/api/att/request',{method:'POST',body:{
        user_id:target.id, work_date:ymd, type:chosen, note:noteI.value||null
      }});
      close();
      await loadMonth();
      renderApp();
      showToast(isSelf? (isPriv?'등록(자동승인) 완료':'요청 완료 — 승인 대기'): `${target.name} ${ymd} 등록 완료`);
    }catch(e){ msg.textContent=e.message; }
  };
  const cancel=async()=>{
    if(!rec) return;
    if(!confirm('이 일정을 삭제하시겠습니까?')) return;
    try{
      await api('/api/att/cancel',{method:'POST',body:{id:rec.id}});
      close();
      await loadMonth();
      renderApp();
      showToast('삭제됨');
    }catch(e){ alert(e.message); }
  };

  const modal=h('div',{class:'modal'},
    h('h3',null, isSelf?`${ymd} — 내 일정`:`${target.name} · ${ymd}`),
    h('div',{class:'modal-sub'}, isSelf
      ? (isPriv?'등록 즉시 자동 승인됩니다':'등록 시 차장/대표 승인 후 반영됩니다')
      : `${target.name} 일정을 직접 등록 (자동 승인)`),
    auditBox,
    typeGrid,
    h('div',{class:'field'},noteI),
    msg,
    h('div',{class:'modal-actions'},
      rec?h('button',{class:'btn btn-danger',onClick:cancel},'삭제'):null,
      h('button',{class:'btn',onClick:close},'취소'),
      h('button',{class:'btn btn-primary',onClick:save}, rec?'수정':'등록')
    )
  );
  const bg=h('div',{class:'modal-bg'}, modal);
  bg.addEventListener('click',(e)=>{if(e.target===bg) close();});
  document.body.append(bg);
}

function renderApproval(){
  const userMap={}; State.users.forEach(u=>userMap[u.id]=u);
  const pending=State.records.filter(r=>r.status==='REQUESTED');
  if(!pending.length) return h('div',{class:'empty'},'승인 대기 중인 요청이 없습니다');
  const list=h('div',{class:'approval-list'});
  async function doApprove(id){
    try{
      await api('/api/att/approve',{method:'POST',body:{id,action:'approve'}});
      await loadMonth(); renderApp(); showToast('승인됨');
    }catch(e){ alert(e.message); }
  }
  function openRejectModal(id, who){
    const reasonI=h('input',{type:'text',placeholder:'반려 사유 (필수)'});
    const msg=h('div',{class:'auth-msg'});
    const close=()=>{ const m=$('.modal-bg'); if(m) m.remove(); };
    const submit=async()=>{
      const reason=reasonI.value.trim();
      if(!reason){ msg.textContent='사유를 입력해주세요'; return; }
      try{
        await api('/api/att/approve',{method:'POST',body:{id,action:'reject',reject_reason:reason}});
        close(); await loadMonth(); renderApp(); showToast('반려됨');
      }catch(e){ msg.textContent=e.message; }
    };
    reasonI.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
    const modal=h('div',{class:'modal'},
      h('h3',null,'반려'),
      h('div',{class:'modal-sub'}, who?`${who}님의 신청을 반려합니다`:''),
      h('div',{class:'field'},reasonI),
      msg,
      h('div',{class:'modal-actions'},
        h('button',{class:'btn',onClick:close},'취소'),
        h('button',{class:'btn btn-danger',onClick:submit},'반려 확정')
      )
    );
    const bg=h('div',{class:'modal-bg'},modal);
    bg.addEventListener('click',e=>{ if(e.target===bg) close(); });
    document.body.append(bg);
    setTimeout(()=>reasonI.focus(),20);
  }
  for(const r of pending){
    const u=userMap[r.user_id]||{name:'?'};
    const dateStr=String(r.work_date).slice(0,10);
    const card=h('div',{class:'approval-card'},
      h('div',{class:'approval-info'},
        h('div',{class:'who'}, u.name,' · ',dateStr,' · ',TYPE_LABELS[r.type]),
        h('div',{class:'what'}, r.note||'(메모 없음)',' · 요청: ',new Date(r.requested_at).toLocaleString('ko-KR'))
      ),
      h('div',{class:'approval-actions'},
        h('button',{class:'btn btn-danger',onClick:()=>openRejectModal(r.id, u.name)},'반려'),
        h('button',{class:'btn btn-primary',onClick:()=>doApprove(r.id)},'승인'),
      )
    );
    list.append(card);
  }
  return list;
}

function renderEmployees(){
  if(!State.users.length) return h('div',{class:'empty'},'직원이 없습니다');
  const grid=h('div',{class:'emp-list'});
  for(const u of State.users){
    grid.append(h('div',{class:'emp-card'},
      h('div',{class:'emp-name'}, u.name,
        u.role==='manager'?h('span',{class:'role-badge role-manager',style:'margin-left:6px'},'차장'):null
      ),
      h('div',{class:'emp-state '+(u.registered?'reg':'')},
        h('span',{class:'dot'}), u.registered?'가입 완료':'미가입')
    ));
  }
  return grid;
}

async function logout(){
  try{ await api('/api/auth/logout',{method:'POST'}); }catch(_){}
  State.user=null; State.users=[]; State.records=[];
  bootstrap();
}

// ───────── CSV 내보내기 ─────────
function exportCsv(){
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const recIdx={};
  for(const r of State.records){
    if(r.status!=='APPROVED') continue;
    const dateStr=String(r.work_date).slice(0,10);
    recIdx[`${r.user_id}|${dateStr}`]=r;
  }
  const rows=[];
  const head=['이름','역할'];
  for(let d=1;d<=dim;d++) head.push(`${m}/${d}`);
  rows.push(head);
  for(const u of State.users){
    const row=[u.name, u.role==='manager'?'차장':'직원'];
    for(let d=1;d<=dim;d++){
      const ymd=fmtYmd(y,m,d);
      const r=recIdx[`${u.id}|${ymd}`];
      row.push(r?TYPE_LABELS[r.type]||'':'');
    }
    rows.push(row);
  }
  const csv=rows.map(r=>r.map(c=>{
    const s=String(c||'');
    return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;
  }).join(',')).join('\n');
  // BOM 추가 — 엑셀 한글 깨짐 방지
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`근태_${State.ym}.csv`;
  document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),500);
  showToast('CSV 다운로드');
}

// ───────── 단축키 ─────────
document.addEventListener('keydown',(e)=>{
  if(!State.user) return;
  // 입력 필드에서는 단축키 무시
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  if(e.key==='Escape'){
    const m=$('.modal-bg'); if(m){ m.remove(); e.preventDefault(); }
    return;
  }
  if(State.page!=='grid') return;
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const [y,m]=State.ym.split('-').map(Number);
    const d=new Date(y, m-1+(e.key==='ArrowLeft'?-1:1), 1);
    State.ym=fmtYm(d);
    loadMonth().then(renderApp);
    e.preventDefault();
  }
});

bootstrap();
</script>
