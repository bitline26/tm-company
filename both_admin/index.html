<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>티엠컴퍼니</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f7f7f5; --text:#37352f; --text-soft:#787774;
    --border:#e9e9e7; --border-soft:#efeeec;
    --hover:#f1f1ef; --accent:#2383e2; --accent-soft:#eaf2fb;
    --green:#0f7b6c; --green-soft:#ddedea;
    --yellow:#cb912f; --yellow-soft:#fdecc8;
    --red:#e03e3e; --red-soft:#ffe2dd;
    --purple:#6940a5; --purple-soft:#e8deee;
    --pink:#ad1a72; --pink-soft:#f5e0e9;
    --blue:#0b6e99; --blue-soft:#d3e5ef;
    --gray:#9b9a97; --gray-soft:#ebeced;
    --shadow:rgba(15,15,15,0.05) 0 1px 2px;
    --shadow-md:rgba(15,15,15,0.10) 0 3px 6px,rgba(15,15,15,0.08) 0 9px 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:inherit}

  .auth-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#fafaf8;
    padding:24px;position:relative;overflow:hidden;
  }
  .auth-wrap::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(55,53,47,.05) 0%, transparent 70%),
      radial-gradient(40% 40% at 0% 100%, rgba(55,53,47,.04) 0%, transparent 70%),
      radial-gradient(40% 40% at 100% 100%, rgba(55,53,47,.04) 0%, transparent 70%);
  }
  .auth-card{
    position:relative;z-index:1;width:380px;background:#fff;
    border-radius:16px;padding:44px 36px 28px;
    box-shadow:0 1px 1px rgba(15,15,15,.03),0 8px 24px rgba(15,15,15,.06),0 24px 48px rgba(15,15,15,.04);
    border:1px solid rgba(15,15,15,.05);
  }
  .auth-brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px}
  .auth-brand-mark{
    width:44px;height:44px;border-radius:11px;
    background:#0f0f0f;
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;letter-spacing:0.02em;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 4px 14px rgba(15,15,15,.22);
  }
  .auth-brand-text{font-weight:700;font-size:16px;letter-spacing:-0.02em}

  .auth-tabs{display:flex;gap:20px;justify-content:center;border-bottom:1px solid var(--border);margin-bottom:24px}
  .auth-tab{padding:10px 2px 12px;border:none;background:transparent;color:#a3a29e;font-weight:600;font-size:13.5px;position:relative;letter-spacing:-0.005em}
  .auth-tab:hover{color:var(--text)}
  .auth-tab.on{color:var(--text)}
  .auth-tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--text);border-radius:2px}

  .field{margin-bottom:12px}
  .field input,.field select{
    width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:10px;
    background:#fcfcfb;outline:none;transition:border-color .12s,box-shadow .12s,background .12s;
    font-size:14px;color:var(--text);
  }
  .field input::placeholder{color:#b8b6b1}
  .field input:focus,.field select:focus{border-color:#0f0f0f;background:#fff;box-shadow:0 0 0 3px rgba(15,15,15,.06)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font-weight:600;font-size:13px;transition:background .12s,border-color .12s,transform .05s}
  .btn:hover{background:var(--hover)}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:#0f0f0f;color:#fff;border-color:#0f0f0f}
  .btn-primary:hover{background:#000;border-color:#000}
  .btn-block{width:100%;padding:14px;font-size:14px;border-radius:11px;letter-spacing:-0.005em;margin-top:6px}
  .btn-danger{color:var(--red);border-color:var(--red-soft)}
  .btn-danger:hover{background:var(--red-soft)}

  .auth-msg{font-size:12px;color:var(--red);min-height:16px;text-align:center;margin:8px 0 0}

  .auth-hint{
    margin-top:18px;padding:11px 14px;border-radius:10px;
    background:#f7f6f3;
    font-size:11.5px;color:var(--text-soft);
    display:flex;align-items:center;justify-content:center;gap:8px;
    letter-spacing:0.01em;
  }
  .auth-hint code{
    font-family:'SF Mono',Menlo,monospace;font-size:11px;background:#fff;
    border:1px solid var(--border);padding:1.5px 6px;border-radius:4px;color:var(--text);
  }

  .layout{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--bg-soft);border-right:1px solid var(--border);padding:14px 8px;display:flex;flex-direction:column;gap:2px}
  .side-user{padding:10px 10px 14px;border-bottom:1px solid var(--border-soft);margin-bottom:8px}
  .side-user-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .role-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:600;background:var(--gray-soft);color:var(--text-soft)}
  .role-admin{background:var(--purple-soft);color:var(--purple)}
  .role-manager{background:var(--blue-soft);color:var(--blue)}
  .side-user-meta{font-size:11px;color:var(--text-soft);margin-top:2px}
  .side-nav{display:flex;flex-direction:column;gap:1px;flex:1}
  .nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:4px;color:var(--text-soft);font-size:13.5px;cursor:pointer;border:none;background:transparent;text-align:left;width:100%;font-weight:500}
  .nav-item:hover{background:var(--hover)}
  .nav-item.on{background:var(--hover);color:var(--text);font-weight:600}
  .nav-count{background:var(--red);color:#fff;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:10px}
  .side-foot{border-top:1px solid var(--border-soft);padding-top:8px;margin-top:8px}

  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10}
  .crumbs{font-size:12px;color:var(--text-soft)}
  .page-title{font-size:24px;font-weight:700;margin:2px 0 0;letter-spacing:-0.01em}
  .top-actions{display:flex;align-items:center;gap:8px}
  .month-picker{display:flex;align-items:center;gap:4px}
  .month-label{font-weight:600;font-size:14px;min-width:90px;text-align:center}
  .icon-btn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:#fff;border-radius:6px;color:var(--text-soft);font-size:14px}
  .icon-btn:hover{background:var(--hover)}

  .content{padding:18px 24px 60px;flex:1;overflow:auto}

  /* ───── 그리드 (노션 DB 캘린더 + 트렐로 보드 톤) ───── */
  .grid-wrap{border:1px solid var(--border);border-radius:10px;background:#fff;overflow:auto;max-width:100%}
  table.grid{border-collapse:separate;border-spacing:0;font-size:13px;table-layout:fixed;width:100%}
  table.grid th,table.grid td{border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);padding:0;text-align:center;vertical-align:middle}
  table.grid thead th{background:#fbfaf8;font-weight:600;color:var(--text-soft);font-size:11px;letter-spacing:0.02em;position:sticky;top:0;z-index:2;height:32px;text-transform:uppercase}
  table.grid thead th.weekend{color:#cf4b4b}
  table.grid thead th.sat{color:#3271b6}
  table.grid .col-name{position:sticky;left:0;background:#fff;z-index:3;text-align:left;padding:8px 14px;font-weight:600;width:140px;min-width:140px;border-right:1px solid var(--border)}
  table.grid thead .col-name{background:#fbfaf8;z-index:4;font-weight:600}
  table.grid tbody tr:hover .col-name{background:#faf9f6}
  table.grid td.day{width:46px;height:42px;padding:4px;cursor:pointer;background:#fff;position:relative;user-select:none}
  table.grid td.day:hover{background:#f7f7f5}
  table.grid td.day.weekend{background:#fafaf8;cursor:default}
  table.grid td.day.weekend:hover{background:#fafaf8}
  table.grid td.day.today{background:#fff8e7}
  table.grid td.day.today.weekend{background:#fdf3d8}

  /* 셀 안 칩 (노션 DB 태그 스타일) */
  .chip{
    display:inline-flex;align-items:center;justify-content:center;
    padding:3px 8px;border-radius:5px;
    font-size:11px;font-weight:600;letter-spacing:-0.005em;
    line-height:1.35;white-space:nowrap;
    transition:transform .08s;
  }
  .chip-WORK{background:transparent;color:#a3a29e;font-weight:500}
  .chip-OFF{background:#ebebe9;color:#5b5750}
  .chip-MONTHLY{background:#d3e5ef;color:#0b6e99}
  .chip-ANNUAL{background:#dbe5f8;color:#1d4ed8}
  .chip-HALF_AM,.chip-HALF_PM{background:#fde8c8;color:#a96400}
  .chip-SICK{background:#ffe2dd;color:#b91c1c}
  .chip-HOLIDAY{background:#e8deee;color:#6940a5}
  .chip.is-requested{background:#fff;border:1px dashed #d49426;color:#a96400;padding:2px 7px}
  .chip.is-rejected{text-decoration:line-through;opacity:.55}
  td.day:hover .chip{transform:scale(1.04)}
  td.day.empty:hover::after{
    content:"+";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#c2c0bc;font-size:18px;font-weight:300;
  }

  /* 오늘 표시: 일자 헤더 강조 */
  table.grid thead th.today-h{color:#0f0f0f;font-weight:800;background:#fff8e7}

  /* 본인 행 강조 — 좌측 검정 바 + 살짝 다른 BG */
  table.grid tr.row-self .col-name{box-shadow:inset 3px 0 0 #0f0f0f;background:#fbf9f3}
  table.grid tr.row-self td.day:not(.weekend){background:#fdfcf8}
  table.grid tr.row-self td.day:not(.weekend):hover{background:#f7f4ec}

  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .legend-item{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-soft)}

  /* 헤더 위젯 (오늘 부재 / 본인 사용량) */
  .stat-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .stat-chip{
    display:inline-flex;align-items:center;gap:8px;padding:8px 12px;
    background:#fff;border:1px solid var(--border);border-radius:9px;font-size:12.5px;
    color:var(--text);
  }
  .stat-chip .num{font-weight:700;font-size:14px;color:#0f0f0f}
  .stat-chip.muted{color:var(--text-soft)}
  .stat-chip .stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .stat-chip .stat-dot.dot-annual{background:#1d4ed8}
  .stat-chip .stat-dot.dot-half{background:#d49426}
  .stat-chip .stat-dot.dot-sick{background:#b91c1c}
  .stat-chip .stat-dot.dot-monthly{background:#175594}
  .stat-chip .stat-dot.dot-off{background:#5b5750}
  .out-today{
    background:#fffbf2;border-color:#f6e2b3;color:#7a4f00;
  }
  .out-today .num{color:#7a4f00}

  /* ───── 우측 슬라이드 드로어 (트렐로 카드 상세 + 노션 페이지 톤) ───── */
  .modal-bg{position:fixed;inset:0;background:rgba(15,15,15,.30);z-index:50;animation:fadeIn .15s ease-out}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
  .drawer{
    position:fixed;top:0;right:0;bottom:0;width:440px;max-width:96vw;background:#fff;
    box-shadow:-12px 0 40px rgba(15,15,15,.10),-1px 0 0 var(--border-soft);
    padding:0;display:flex;flex-direction:column;
    animation:slideR .22s cubic-bezier(.2,.7,.2,1);
  }
  .drawer-head{padding:20px 24px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border-soft)}
  .drawer-eyebrow{font-size:11px;color:var(--text-soft);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
  .drawer-title{font-size:18px;font-weight:700;letter-spacing:-0.01em;line-height:1.3}
  .drawer-close{background:transparent;border:none;color:var(--text-soft);font-size:18px;cursor:pointer;padding:6px;border-radius:6px;line-height:1}
  .drawer-close:hover{background:var(--hover);color:var(--text)}
  .drawer-body{padding:18px 24px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:16px}
  .drawer-prop{display:flex;align-items:flex-start;gap:10px;font-size:13px}
  .drawer-prop .key{flex:0 0 84px;color:var(--text-soft);font-weight:500;font-size:12.5px;padding-top:4px}
  .drawer-prop .val{flex:1}
  .drawer-foot{padding:14px 20px;border-top:1px solid var(--border-soft);display:flex;gap:8px;justify-content:flex-end;background:#fafaf8;border-radius:0}

  .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .type-btn{padding:9px 6px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12.5px;font-weight:600;text-align:center;color:var(--text-soft);transition:all .1s}
  .type-btn:hover{background:var(--hover)}
  .type-btn.on{border-color:#0f0f0f;background:#0f0f0f;color:#fff}

  .audit-box{
    padding:12px 14px;border-radius:9px;background:#fafaf8;
    font-size:12px;color:var(--text-soft);line-height:1.6;
    display:flex;flex-direction:column;gap:4px;
  }
  .audit-box .audit-line{display:flex;justify-content:space-between;gap:8px}
  .audit-box .audit-key{color:#9b9a97;font-weight:500}
  .audit-box .audit-val{color:var(--text);font-weight:500}
  .audit-box .audit-val.ok{color:#0f7b6c}
  .audit-box .audit-val.no{color:#b91c1c}

  /* 정통 모달 (반려 사유 등) */
  .modal{background:#fff;border-radius:12px;width:420px;max-width:92vw;padding:22px;box-shadow:0 20px 50px rgba(15,15,15,.18);border:1px solid rgba(15,15,15,.05);position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60}
  .modal h3{margin:0 0 4px;font-size:15px;font-weight:700;letter-spacing:-0.01em}
  .modal .modal-sub{font-size:12.5px;color:var(--text-soft);margin-bottom:14px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}

  .approval-list{display:flex;flex-direction:column;gap:8px}
  .approval-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .approval-info{display:flex;flex-direction:column;gap:2px}
  .approval-info .who{font-weight:700;font-size:14px}
  .approval-info .what{font-size:12.5px;color:var(--text-soft)}
  .approval-actions{display:flex;gap:6px}
  .empty{padding:40px;text-align:center;color:var(--text-soft);font-size:13px}

  /* ───── 직원 디렉토리 (메인 — 직원 중심) ───── */
  .people-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .search-box{flex:1;position:relative;max-width:480px}
  .search-box input{
    width:100%;padding:11px 12px 11px 38px;border:1px solid var(--border);border-radius:10px;
    background:#fff;font-size:14px;outline:none;transition:border-color .12s,box-shadow .12s;
  }
  .search-box input:focus{border-color:#0f0f0f;box-shadow:0 0 0 3px rgba(15,15,15,.06)}
  .search-box::before{
    content:"";position:absolute;left:13px;top:50%;width:14px;height:14px;
    transform:translateY(-50%);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239b9a97' stroke-width='2.2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>");
    background-size:contain;background-repeat:no-repeat;
  }
  .view-toggle{display:flex;gap:2px;background:#f1f1ef;padding:3px;border-radius:8px}
  .view-toggle button{padding:6px 12px;border:none;background:transparent;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--text-soft);cursor:pointer}
  .view-toggle button.on{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(15,15,15,.06)}

  .people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .person-card{
    padding:16px;border:1px solid var(--border);border-radius:12px;background:#fff;
    cursor:pointer;transition:transform .1s,box-shadow .1s,border-color .1s;
    display:flex;flex-direction:column;gap:10px;
  }
  .person-card:hover{transform:translateY(-2px);border-color:#d8d8d4;box-shadow:0 6px 16px rgba(15,15,15,.06)}
  .person-head{display:flex;align-items:center;gap:10px}
  .avatar{
    width:38px;height:38px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;color:#fff;letter-spacing:0.01em;
  }
  .person-name{font-weight:700;font-size:14.5px;letter-spacing:-0.005em}
  .person-meta{font-size:11.5px;color:var(--text-soft);margin-top:1px;display:flex;align-items:center;gap:6px}
  .person-meta .dot{width:6px;height:6px;border-radius:50%;background:var(--gray)}
  .person-meta .dot.on{background:#4caf50}
  .person-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:2px}
  .person-stat{padding:6px 8px;background:#fafaf8;border-radius:7px;text-align:center}
  .person-stat .lbl{font-size:10px;color:var(--text-soft);font-weight:500;letter-spacing:0.02em}
  .person-stat .val{font-size:14px;font-weight:700;color:var(--text);margin-top:1px}
  .person-today{font-size:11.5px;font-weight:600;padding:4px 8px;border-radius:5px;display:inline-flex;align-items:center;gap:5px;width:fit-content}
  .person-today.t-WORK{background:#f0f9f0;color:#0f7b6c}
  .person-today.t-OFF{background:#ebebe9;color:#5b5750}
  .person-today.t-MONTHLY{background:#d3e5ef;color:#0b6e99}
  .person-today.t-ANNUAL{background:#dbe5f8;color:#1d4ed8}
  .person-today.t-HALF_AM,.person-today.t-HALF_PM{background:#fde8c8;color:#a96400}
  .person-today.t-SICK{background:#ffe2dd;color:#b91c1c}

  /* ───── 직원 상세 (프로필 페이지) ───── */
  .person-detail{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:flex-start}
  .pd-side{position:sticky;top:14px}
  .pd-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px}
  .pd-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:#fff;margin-bottom:14px}
  .pd-name{font-size:20px;font-weight:700;letter-spacing:-0.01em}
  .pd-role{font-size:12.5px;color:var(--text-soft);margin-top:2px}
  .pd-props{margin-top:16px;border-top:1px solid var(--border-soft);padding-top:14px;display:flex;flex-direction:column;gap:10px}
  .pd-prop{display:flex;justify-content:space-between;font-size:12.5px}
  .pd-prop .k{color:var(--text-soft)}
  .pd-prop .v{font-weight:600}
  .pd-section{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
  .pd-section h3{margin:0 0 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;letter-spacing:-0.005em}
  .pd-stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .pd-stat{padding:14px;background:#fafaf8;border-radius:10px;text-align:center}
  .pd-stat .v{font-size:22px;font-weight:700;color:var(--text)}
  .pd-stat .l{font-size:11.5px;color:var(--text-soft);font-weight:500;margin-top:2px;letter-spacing:0.02em}
  .pd-mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#37352f;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:80;box-shadow:var(--shadow-md);max-width:90vw}

  /* ─────────────── 영업 모듈 (요청 2,3,4) ─────────────── */

  /* 영업 워크스페이스 공통 */

  /* TM 마감 표 (요청 2) */
  .tm-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .tm-table th{background:#fbfaf8;color:var(--text-soft);font-size:11.5px;font-weight:700;letter-spacing:0.03em;padding:10px 12px;text-align:right;border-bottom:1px solid var(--border-soft)}
  .tm-table th:nth-child(1),.tm-table th:nth-child(2){text-align:left}
  .tm-table td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border-soft);font-variant-numeric:tabular-nums;font-weight:600}
  .tm-table td:nth-child(1),.tm-table td:nth-child(2){text-align:left}
  .tm-table tr:last-child td{border-bottom:none}
  .tm-table tr.row-self td{background:#fbf9f3}
  .tm-table tr:hover td{background:#fafaf8}
  .tm-table .col-input{cursor:cell}
  .tm-table .col-input:hover{background:#f1f5fb !important}
  .tm-table .col-input.editing{padding:0}
  .tm-table .col-input input{width:100%;padding:9px 12px;border:none;outline:2px solid #0f0f0f;outline-offset:-2px;text-align:right;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}

  /* TM 마감 매출 카드 */

  .vendor-card .vc-cell .val{font-size:16px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
  .vendor-card .vc-cell.editing{padding:0}
  .vendor-card .vc-cell.editing input{width:100%;padding:8px 10px;border:none;outline:2px solid #0f0f0f;outline-offset:-2px;font-size:14px;font-weight:700;font-family:inherit}
  .vendor-card .vc-stats{padding:0 10px 10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
  .vendor-card .vc-stat{padding:7px 10px;border-radius:7px;display:flex;justify-content:space-between;align-items:center}
  .vendor-card .vc-stat.eff{background:#dbeafe;color:#1d4ed8}
  .vendor-card .vc-stat.acc{background:#fef3c7;color:#a16207}

  /* 일자별 마감 헤더 (요청 3 상단) */
  .day-summary{padding:14px 24px;background:#fff;border-bottom:1px solid var(--border)}
  .day-summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
  .day-stat{padding:14px;background:#fafaf8;border-radius:10px}

  /* 빈 상태 */
  .sales-empty{padding:60px 20px;text-align:center;color:var(--text-soft)}
  .sales-empty .ico{font-size:36px;margin-bottom:10px;opacity:.4}

  /* + 새 거래 버튼 */
  .add-row-btn{padding:9px 14px;border-radius:8px;background:#0f0f0f;color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .add-row-btn:hover{background:#000}
</style>

<body>
<div id="app"></div>

<script>
'use strict';

const State = {
  user: null,
  availableNames: [],
  presetNames: [],
  page: 'people',          // 직원 디렉토리 = 메인 (직원 중심 어드민)
  ym: null,
  users: [],
  records: [],
  search: '',              // 직원 이름 검색어
  dirDateFrom: '',         // 디렉토리 날짜 범위 (관리자)
  dirDateTo: '',
  detailDateFrom: '',      // 상세 진입 시 1회 적용용
  detailDateTo: '',
  selectedPersonId: null,  // 직원 상세 보기 대상

  // ─────── 영업 모듈 ───────
  salesYm: null,           // 'YYYY-MM' (요청 2,4 컨텍스트)
  salesDate: null,         // 'YYYY-MM-DD' (요청 3 일별)
  salesCutoff: null,       // 요청 2 cutoff (default = today)
  salesOrders: [],         // 요청 4 거래 리스트
  salesVendors: [],        // db_vendors
  salesPeriod: null,       // sales_period
  salesTmRows: [],         // tm-summary 응답 rows
  salesTmElapsed: 0,
  salesTmRemaining: 0,
  salesTmTotal: 0,
  salesVendorRows: [],     // vendor-daily 응답
  salesDayMeta: null,      // {recontact_completed, note}
  salesOrdersFilter: { status:'ALL', tm:'ALL', vendor:'ALL', q:'' },

  // 캐시 키 (로드된 컨텍스트 추적 — 같은 키면 페치 스킵)
  salesOrdersLoadedYm: null,
  salesTmLoadedKey: null,    // 'ym|cutoff'
  salesVendorLoadedDate: null,
  salesVendorsLoaded: false,

  // 오늘 입력 데이터 (TM 일별)
  salesTmTodayMap: {},       // { user_id → {db_count, is_off} }
  myTmToday: null,           // 본인 오늘 (employee home 용)

  // 직원 '내 마감' 페이지
  myClosingRows: [],         // 본인 sales_tm_daily 월별 행
  myClosingLoadedYm: null,

  // 로딩 인디케이터 (페이지별)
  loadingPage: null,
};

// 이름 → HSL 색상 (아바타 일관성)
function nameColor(name){
  let h=0; for(const ch of name) h=(h*31+ch.charCodeAt(0))%360;
  return `hsl(${h}, 38%, 52%)`;
}
function initial(name){ return (name||'?').slice(0,1); }

const $ = (sel,el=document)=>el.querySelector(sel);
const h = (tag,attrs,...children)=>{
  attrs = attrs || {};
  const el=document.createElement(tag);
  for(const k in attrs){
    if(k==='class') el.className=attrs[k];
    else if(k==='style') el.style.cssText=attrs[k];
    else if(k.startsWith('on')&&typeof attrs[k]==='function') el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(attrs[k]===false||attrs[k]==null) {}
    else el.setAttribute(k,attrs[k]);
  }
  for(const c of children.flat()){
    if(c==null||c===false) continue;
    el.append(c.nodeType?c:document.createTextNode(String(c)));
  }
  return el;
};
const fmtYm=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const fmtYmd=(y,m,d)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const todayYm=()=>fmtYm(new Date());
const daysInMonth=(y,m)=>new Date(y,m,0).getDate();

const TYPE_LABELS={
  WORK:'정상출근', OFF:'휴무', HALF_AM:'오전반차', HALF_PM:'오후반차',
  MONTHLY:'월차', ANNUAL:'연차', SICK:'병가', HOLIDAY:'공휴일',
};
const TYPE_SHORT={
  WORK:'', OFF:'휴', HALF_AM:'반', HALF_PM:'반',
  MONTHLY:'월', ANNUAL:'연', SICK:'병', HOLIDAY:'공',
};
// 셀 칩에 표시할 짧은 라벨 (노션 DB 태그 톤)
const TYPE_SHORT_FULL={
  WORK:'정상', OFF:'휴무', HALF_AM:'오전반차', HALF_PM:'오후반차',
  MONTHLY:'월차', ANNUAL:'연차', SICK:'병가', HOLIDAY:'공가',
};
// 더 짧은 라벨(좁은 셀용)
const TYPE_TINY={
  WORK:'', OFF:'휴무', HALF_AM:'오반', HALF_PM:'오반',
  MONTHLY:'월차', ANNUAL:'연차', SICK:'병가', HOLIDAY:'공가',
};
const REQUESTABLE_TYPES=['OFF','HALF_AM','HALF_PM','MONTHLY','ANNUAL','SICK'];

function showToast(msg, ms=2200){
  const old=$('.toast'); if(old) old.remove();
  const t=h('div',{class:'toast'},msg);
  document.body.append(t);
  setTimeout(()=>t.remove(),ms);
}

async function api(path, opts){
  opts = opts || {};
  const r=await fetch(path,{
    method:opts.method||'GET',
    headers:opts.body?{'Content-Type':'application/json'}:{},
    body:opts.body?JSON.stringify(opts.body):undefined,
    credentials:'same-origin',
  });
  let data={};
  try{ data=await r.json(); }catch(_){}
  if(!r.ok) throw new Error(data.error||`HTTP ${r.status}`);
  return data;
}

async function bootstrap(){
  try{
    const ym=todayYm();
    // 부트스트랩 1회 호출 = me + (로그인 시) att/list 동등 데이터까지 한 라운드트립에
    const me=await api(`/api/auth/me?bootstrap=1&ym=${ym}`);
    State.user=me.user;
    State.availableNames=me.availableNames||[];
    State.presetNames=me.presetNames||[];
    if(State.user){
      State.ym=ym;
      if(me.bootstrap){
        State.users=me.bootstrap.users||[];
        State.records=me.bootstrap.records||[];
      }
      renderApp();   // 한 번에 풀데이터 렌더 (placeholder 렌더 생략)
      loadMyTmToday().then(()=>{ if(State.user) renderApp(); }).catch(()=>{});
    }else{
      renderAuth();
    }
  }catch(e){
    console.error(e);
    renderAuth();
  }
}

async function loadMyTmToday(){
  const today = new Date().toISOString().slice(0,10);
  const ym = today.slice(0,7);
  try{
    const d = await api(`/api/sales/tm-daily?ym=${ym}`);
    const row = (d.rows||[]).find(r=>String(r.work_date).slice(0,10)===today);
    State.myTmToday = row
      ? { db_count: row.db_count, is_off: row.is_off }
      : { db_count: 0, is_off: false };
  }catch(_){ State.myTmToday = { db_count: 0, is_off: false }; }
}

function renderAuth(){
  const root=$('#app'); root.innerHTML='';
  const tab={cur:'login'};
  const card=h('div',{class:'auth-card'});

  function paint(){
    card.innerHTML='';
    card.append(
      h('div',{class:'auth-brand'},
        h('div',{class:'auth-brand-mark'},'TM'),
        h('div',{class:'auth-brand-text'},'티엠컴퍼니')
      ),
      h('div',{class:'auth-tabs'},
        h('button',{class:'auth-tab '+(tab.cur==='login'?'on':''),onClick:()=>{tab.cur='login';paint();}},'로그인'),
        h('button',{class:'auth-tab '+(tab.cur==='signup'?'on':''),onClick:()=>{tab.cur='signup';paint();}},'회원가입'),
      ),
    );
    if(tab.cur==='login') card.append(loginForm());
    else card.append(signupForm());
  }
  paint();
  root.append(h('div',{class:'auth-wrap'},card));
}

function loginForm(){
  const wrap=h('div');
  const nameI=h('input',{type:'text',autocomplete:'username',placeholder:'이름'});
  const pwI=h('input',{type:'password',autocomplete:'current-password',placeholder:'비밀번호'});
  const msg=h('div',{class:'auth-msg'});
  const btn=h('button',{class:'btn btn-primary btn-block'},'로그인');
  let busy=false;
  const submit=async()=>{
    if(busy) return;
    busy=true; btn.textContent='로그인 중…'; btn.style.opacity='.7'; btn.disabled=true;
    msg.textContent='';
    try{
      const ym=todayYm();
      const r=await api('/api/auth/login',{method:'POST',body:{name:nameI.value.trim(),password:pwI.value,ym}});
      State.user=r.user;
      State.ym=ym;
      if(r.bootstrap){
        State.users=r.bootstrap.users||[];
        State.records=r.bootstrap.records||[];
      }
      renderApp();   // 풀데이터 즉시 렌더 (추가 라운드트립 없음)
      loadMyTmToday().then(()=>{ if(State.user) renderApp(); }).catch(()=>{});
    }catch(e){
      msg.textContent=e.message;
      busy=false; btn.textContent='로그인'; btn.style.opacity='1'; btn.disabled=false;
    }
  };
  btn.addEventListener('click',submit);
  pwI.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  nameI.addEventListener('keydown',e=>{ if(e.key==='Enter') pwI.focus(); });
  wrap.append(
    h('div',{class:'field'},nameI),
    h('div',{class:'field'},pwI),
    msg,
    btn
  );
  setTimeout(()=>{ try{ nameI.focus(); }catch(_){}; },20);
  return wrap;
}

function signupForm(){
  const wrap=h('div');
  const sel=h('select',null,
    h('option',{value:''},'— 이름 선택 —'),
    ...State.availableNames.map(n=>h('option',{value:n},n))
  );
  const pwI=h('input',{type:'password',autocomplete:'new-password',placeholder:'비밀번호 (4자 이상)'});
  const pw2I=h('input',{type:'password',autocomplete:'new-password',placeholder:'비밀번호 확인'});
  const msg=h('div',{class:'auth-msg'});
  const submit=async()=>{
    msg.textContent='';
    if(!sel.value){ msg.textContent='이름을 선택하세요'; return; }
    if(pwI.value.length<4){ msg.textContent='비밀번호 4자 이상'; return; }
    if(pwI.value!==pw2I.value){ msg.textContent='비밀번호 확인이 일치하지 않습니다'; return; }
    try{
      const r=await api('/api/auth/signup',{method:'POST',body:{name:sel.value,password:pwI.value}});
      State.user=r.user;
      State.ym=todayYm();
      renderApp();
      loadMonth().then(()=>{ if(State.user) renderApp(); }).catch(console.error);
    }catch(e){ msg.textContent=e.message; }
  };
  wrap.append(
    h('div',{class:'field'},sel),
    h('div',{class:'field'},pwI),
    h('div',{class:'field'},pw2I),
    msg,
    h('button',{class:'btn btn-primary btn-block',onClick:submit},'가입하기')
  );
  return wrap;
}

function renderMyHome(){

  const cnt={ANNUAL:0,MONTHLY:0,HALF:0,SICK:0,OFF:0};
  recs.forEach(r=>{
    if(r.status!=='APPROVED') return;
    if(r.type==='ANNUAL') cnt.ANNUAL++;
    else if(r.type==='MONTHLY') cnt.MONTHLY++;
    else if(r.type==='HALF_AM'||r.type==='HALF_PM') cnt.HALF++;
    else if(r.type==='SICK') cnt.SICK++;
    else if(r.type==='OFF') cnt.OFF++;
  });
  const wait=recs.filter(r=>r.status==='REQUESTED').length;

  const stats=h('section',{class:'pd-section'},
    h('h3',null,'📊 ',`${State.ym} 사용 현황`,
      wait?h('span',{style:'margin-left:8px;font-size:11.5px;font-weight:600;color:#a96400;background:#fff5d9;padding:2px 8px;border-radius:5px'},`승인 대기 ${wait}건`):null),
    h('div',{class:'pd-stat-row'},
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.ANNUAL), h('div',{class:'l'},'연차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.MONTHLY), h('div',{class:'l'},'월차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.HALF), h('div',{class:'l'},'반차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.SICK), h('div',{class:'l'},'병가')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.OFF), h('div',{class:'l'},'휴무')),
    )
  );

  // 큰 캘린더 (본인 단독)
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const firstDow=new Date(y,m-1,1).getDay();
  const recIdx={};
  recs.forEach(r=>{ recIdx[String(r.work_date).slice(0,10)]=r; });
  const todayYmd=fmtYmd(new Date().getFullYear(),new Date().getMonth()+1,new Date().getDate());
  const cal=h('div',{class:'pd-mini-cal',style:'gap:6px'});
  ['일','월','화','수','목','금','토'].forEach(d=>cal.append(h('div',{class:'pmh',style:'font-size:11.5px;padding:6px 0'},d)));
  for(let i=0;i<firstDow;i++) cal.append(h('div',{class:'pmd empty'}));
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ymd=fmtYmd(y,m,d);
    const rec=recIdx[ymd];
    const cls=['pmd'];
    if(dow===0||dow===6) cls.push('weekend');
    if(ymd===todayYmd) cls.push('today');
    let inner=[h('div',{style:'font-size:13px;font-weight:600'}, d)];
    if(rec){
      const cc=['chip',`chip-${rec.type}`];
      if(rec.status==='REQUESTED') cc.push('is-requested');
      if(rec.status==='REJECTED') cc.push('is-rejected');
      inner.push(h('span',{class:cc.join(' '),style:'font-size:10.5px;padding:2px 6px;margin-top:3px'}, TYPE_TINY[rec.type]||''));
    }
    cal.append(h('div',{class:cls.join(' '),style:'min-height:60px;padding:6px',
      onClick:(dow===0||dow===6)?null:()=>openCellDrawer(u,ymd,rec)
    }, ...inner));
  }

  const calSection=h('section',{class:'pd-section'},
    h('h3',null,'🗓 캘린더',h('span',{style:'color:var(--text-soft);font-weight:500;font-size:11.5px;margin-left:8px'},'· 빈 칸 클릭으로 신청')),
    cal
  );

  // 영업 마감 입력은 별도 탭(내 마감)에서. 여기는 근태(휴가)만.
  return h('div',null, stats, calSection);
}

// 상세 페이지의 "신청 이력" 섹션만 따로 렌더 (직원 본인용)
function _renderHistoryOnly(u){
  const recs=State.records.filter(r=>r.user_id===u.id);
  const filter={sort:'desc',type:'ALL',status:'ALL',from:'',to:''};
  const histList=h('div',{class:'pd-history-list'});

  function paint(){
    histList.innerHTML='';
    let f=recs.slice();
    if(filter.type!=='ALL'){
      if(filter.type==='HALF') f=f.filter(r=>r.type==='HALF_AM'||r.type==='HALF_PM');
      else f=f.filter(r=>r.type===filter.type);
    }
    if(filter.status!=='ALL') f=f.filter(r=>r.status===filter.status);
    if(filter.from) f=f.filter(r=>String(r.work_date).slice(0,10)>=filter.from);
    if(filter.to) f=f.filter(r=>String(r.work_date).slice(0,10)<=filter.to);
    f.sort((a,b)=>{const c=String(a.work_date).localeCompare(String(b.work_date));return filter.sort==='desc'?-c:c;});
    if(!f.length){ histList.append(h('div',{class:'empty',style:'padding:24px'},'조건에 맞는 이력이 없습니다')); return; }
    for(const r of f){
      const dateStr=String(r.work_date).slice(0,10);
      const dow=['일','월','화','수','목','금','토'][new Date(dateStr+'T00:00:00').getDay()];
      histList.append(h('div',{class:'pd-hist',style:'cursor:pointer',
        onClick:()=>openCellDrawer(u,dateStr,r)},
        h('div',{class:'hi-left'},
          h('span',{class:'hi-date'}, dateStr.slice(5)+' ('+dow+')'),
          h('span',{class:`chip chip-${r.type}`}, TYPE_LABELS[r.type]),
          r.note?h('span',{style:'color:var(--text-soft);font-size:11.5px'},'· '+r.note):null
        ),
        h('span',{class:`hi-status s-${r.status}`}, statusLabel(r.status))
      ));
    }
  }
  const typeOpts=[['ALL','전체'],['ANNUAL','연차'],['MONTHLY','월차'],['HALF','반차'],['SICK','병가'],['OFF','휴무'],['WORK','정상']];
  const typeSel=h('select',{style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:e=>{filter.type=e.target.value;paint();}}, ...typeOpts.map(([v,l])=>h('option',{value:v},l)));
  const statusOpts=[['ALL','전체상태'],['APPROVED','승인'],['REQUESTED','대기'],['REJECTED','반려']];
  const statusSel=h('select',{style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:e=>{filter.status=e.target.value;paint();}}, ...statusOpts.map(([v,l])=>h('option',{value:v},l)));
  const fromI=h('input',{type:'date',style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px',
    onChange:e=>{filter.from=e.target.value;paint();}});
  const toI=h('input',{type:'date',style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px',
    onChange:e=>{filter.to=e.target.value;paint();}});
  const sortBtn=h('button',{class:'btn',style:'padding:7px 11px;font-size:12px',
    onClick:()=>{filter.sort=filter.sort==='desc'?'asc':'desc';sortBtn.textContent=filter.sort==='desc'?'최신순 ↓':'오래된순 ↑';paint();}},'최신순 ↓');
  const resetBtn=h('button',{class:'btn',style:'padding:7px 11px;font-size:12px',
    onClick:()=>{filter.sort='desc';filter.type='ALL';filter.status='ALL';filter.from='';filter.to='';
      typeSel.value='ALL';statusSel.value='ALL';fromI.value='';toI.value='';sortBtn.textContent='최신순 ↓';paint();}},'초기화');

  const bar=h('div',{style:'display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px'},
    typeSel, statusSel,
    h('span',{style:'color:var(--text-soft);font-size:11.5px;margin-left:4px'},'기간'),
    fromI, h('span',{style:'color:var(--text-soft)'},'~'), toI,
    h('span',{style:'flex:1'}), sortBtn, resetBtn
  );

  paint();
  return h('section',{class:'pd-section'},
    h('h3',null,'🕘 신청 이력 ',h('span',{style:'color:var(--text-soft);font-weight:500;font-size:12px;margin-left:6px'},'· 총 '+recs.length+'건')),
    bar, histList
  );
}

// ─── 직원 '내 마감' 페이지 (요청 2 — 일단위 입력 → 자동 월 누적) ───
async function loadMyClosing(force){
  const ym = State.salesYm || todayYm();
  State.salesYm = ym;
  if (!force && State.myClosingLoadedYm === ym) return;
  try{
    const cutoff = new Date().toISOString().slice(0,10);
    const [r1, r2] = await Promise.all([
      api(`/api/sales/tm-daily?ym=${ym}`),    // 본인 일별 행 (오늘 채우기/수정)
      api(`/api/sales/tm-summary?ym=${ym}&cutoff=${cutoff}`),  // 12명 + 본인 누적·휴무
    ]);
    State.myClosingRows = r1.rows || [];
    State.salesPeriod = r2.period;
    State.salesTmElapsed = r2.elapsedWorkdays || 0;
    State.salesTmRemaining = r2.remainingWorkdays || 0;
    State.salesTmTotal = r2.totalWorkdays || 0;
    const mySummary = (r2.rows||[]).find(r=>r.user_id===State.user.id) || { off_days:0, total_count:0, total_db:0 };
    State.myAutoOffDays = Number(mySummary.off_days||0);
    State.myMonthSum = { total_count: Number(mySummary.total_count||0), total_db: Number(mySummary.total_db||0) };
    State.myClosingLoadedYm = ym;
  }catch(e){ console.error(e); }
}

function renderMyClosing(){
  const me = State.user;
  if (State.loadingPage==='my-closing' && State.myClosingLoadedYm===null){
    return h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'), h('div',null,'로딩 중…'));
  }
  const ym = State.salesYm || todayYm();
  const period = State.salesPeriod || {};
  const elapsed = State.salesTmElapsed || 0;
  const total   = State.salesTmTotal   || 0;
  const remaining = State.salesTmRemaining || 0;
  const unitPrice = Number(period.unit_price || 0);

  // 일자 picker (기본 오늘) + 본인 그날 행
  const todayYmd = new Date().toISOString().slice(0,10);
  if (!State.myDay || String(State.myDay).slice(0,7) !== ym) State.myDay = todayYmd;
  const sel = State.myDay;
  const dayRow = (State.myClosingRows||[]).find(r=>String(r.work_date).slice(0,10)===sel)
    || { count:0, db_count:0, is_off:false };

  // 누적 (서버 SUM) — 본인 월 총갯수/총디비
  const monthSum = State.myMonthSum || { total_count:0, total_db:0 };
  const autoOffDays = Number(State.myAutoOffDays||0);

  // 낙관적 누적 미리보기 (선택일자 입력 변화량 반영)
  function previewSums(){
    const baseCount = monthSum.total_count - (dayRow.count||0);
    const baseDb    = monthSum.total_db    - (dayRow.db_count||0);
    return {
      total_count: baseCount + (Number(cntI.value)||0),
      total_db:    baseDb    + (Number(dbI.value)||0),
    };
  }

  // 함수식 (월 누적 기반 — 휴무는 attendance 자동)
  const compute = (totalCount, totalDb) => {
    const denom = Math.max(0.0001, elapsed - autoOffDays);
    const dayAvg = elapsed>0 ? totalCount/denom : 0;
    const dbAvg  = elapsed>0 ? totalDb/denom : 0;
    const eff    = totalDb>0 ? totalCount/totalDb : 0;
    const projected = dayAvg * Math.max(0, total - autoOffDays);
    return { dayAvg, dbAvg, eff, projected };
  };

  // 툴바: 월 + 일자 picker (일단위 입력)
  const ymI = h('input',{type:'month',value:ym});
  ymI.addEventListener('change', async()=>{
    State.salesYm = ymI.value || todayYm();
    State.myClosingLoadedYm = null; State.myDay = null;
    State.loadingPage='my-closing'; renderApp();
    await loadMyClosing(true);
    State.loadingPage=null; renderApp();
  });
  const dateI = h('input',{type:'date',value:sel,min:ym+'-01',max:todayYmd});
  dateI.addEventListener('change',()=>{ State.myDay = dateI.value; renderApp(); });
  const dowKr = ['일','월','화','수','목','금','토'][new Date(sel+'T00:00:00').getDay()];
  const isToday = (sel === todayYmd);

  const toolbar = h('div',{class:'sales-toolbar'},
    h('span',{class:'label'},'월'), ymI,
    h('span',{class:'label',style:'margin-left:14px'},'일자'), dateI,
    h('span',{style:'font-size:11.5px;color:var(--text-soft);margin-left:6px'}, '('+dowKr+')',
      isToday?h('span',{style:'margin-left:4px;color:#0f7b6c;font-weight:700'},'· 오늘'):null),
    h('div',{style:'margin-left:auto;color:var(--text-soft);font-size:12px'},
      `실 근무일 ${elapsed} · 남은 ${remaining} · 총 ${total}일`)
  );

  // 입력 = 선택된 일자(기본 오늘) 그날 마감/디비
  const cntI   = h('input',{type:'number',min:0,value:dayRow.count||0,
    style:'width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:10px;font-size:26px;font-weight:800;text-align:center;outline:none;font-variant-numeric:tabular-nums'});
  const dbI    = h('input',{type:'number',min:0,value:dayRow.db_count||0,
    style:'width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:10px;font-size:26px;font-weight:800;text-align:center;outline:none;font-variant-numeric:tabular-nums'});

  // 자동 계산 표시 영역 (입력 변할 때마다 갱신)
  const dayAvgEl   = h('div',{style:'font-size:24px;font-weight:800'},'');
  const projectedEl = h('div',{style:'font-size:24px;font-weight:800;color:#1d4ed8'},'');
  const dbAvgEl    = h('div',{style:'font-size:24px;font-weight:800'},'');
  const effEl      = h('div',{style:'font-size:28px;font-weight:800'},'');
  // 표 셀에 들어갈 총갯수/총디비 미러 (입력값 그대로 표시)
  const tcEl = h('div',null,'');
  const tdEl = h('div',null,'');

  const fmtNum=(n,d=0)=>(Number(n||0)).toLocaleString('ko-KR',{maximumFractionDigits:d});
  const fmtPct=(n)=>((n||0)*100).toFixed(1)+'%';

  // 누적값(서버 SUM 반영) + 입력 즉시 함수 갱신
  function repaint(){
    const s = previewSums();
    tcEl.textContent = fmtNum(s.total_count);
    tdEl.textContent = fmtNum(s.total_db);
    const c = compute(s.total_count, s.total_db);
    dayAvgEl.textContent    = s.total_count>0 ? c.dayAvg.toFixed(1) : '0.0';
    projectedEl.textContent = fmtNum(Math.round(c.projected));
    dbAvgEl.textContent     = fmtNum(Math.round(c.dbAvg));
    const e = c.eff;
    effEl.textContent = s.total_db>0 ? Math.round(e*100)+'%' : '—';
    effEl.style.color = e>=0.20?'#0f7b6c':e>=0.15?'#1d4ed8':e>=0.10?'#a96400':'#b91c1c';
  }
  repaint();

  // 저장 (디바운스 — 선택일자 행 sales_tm_daily upsert)
  let saveT;
  const flag = h('span',{style:'margin-left:8px;font-size:12px;color:#0f7b6c;opacity:0;transition:opacity .2s'},'✓ 저장됨');
  const save = async()=>{
    const newCount = Number(cntI.value)||0;
    const newDb    = Number(dbI.value)||0;
    try{
      await api('/api/sales/tm-daily',{method:'POST',body:{
        user_id: me.id, work_date: sel,
        count: newCount, db_count: newDb,
      }});
      flag.style.opacity='1'; setTimeout(()=>{ flag.style.opacity='0'; }, 1200);
      // 캐시 행 갱신 + 누적 SUM 낙관적 갱신
      const idx = (State.myClosingRows||[]).findIndex(r=>String(r.work_date).slice(0,10)===sel);
      const obj = { user_id:me.id, work_date:sel, count:newCount, db_count:newDb, is_off:false };
      if (idx>=0) State.myClosingRows[idx] = obj; else (State.myClosingRows = State.myClosingRows||[]).push(obj);
      const newSums = previewSums();
      State.myMonthSum = newSums;
      dayRow.count = newCount; dayRow.db_count = newDb;
      // admin TM 마감 캐시 무효화 → 즉시 반영
      State.salesTmLoadedKey = null;
    }catch(e){ alert(e.message); }
  };
  function onChange(){
    repaint();
    clearTimeout(saveT);
    saveT = setTimeout(save, 400);
  }
  cntI.addEventListener('input', onChange);
  dbI.addEventListener('input', onChange);
  cntI.addEventListener('blur', ()=>{ clearTimeout(saveT); save(); });
  dbI.addEventListener('blur', ()=>{ clearTimeout(saveT); save(); });

  // 라벨 + 헬퍼
  const labelStyle = 'font-size:11.5px;color:var(--text-soft);font-weight:700;letter-spacing:0.04em;margin-bottom:6px;text-transform:uppercase';
  const cellStyle = 'padding:18px;background:#fff;border:1px solid var(--border);border-radius:11px;display:flex;flex-direction:column';

  // 입력 헤더 + 2칸 (그날 마감 + 그날 디비) — 자동 저장 후 월 누적 자동 합산
  const dayLabel = `${sel.slice(5,7)}/${sel.slice(8,10)} (${dowKr})`;
  const inputHead = h('div',{style:'padding:14px 24px 0;display:flex;align-items:center;gap:10px'},
    h('div',{style:'font-size:14px;font-weight:800;color:#0f0f0f'}, isToday?'📥 오늘 입력':`📥 ${dayLabel} 입력`),
    h('div',{style:'font-size:11.5px;color:var(--text-soft)'}, '그날 마감/디비 입력 → 월 누적 자동 합산 → 함수/관리자 결과표 즉시 반영'),
    flag
  );
  const inputGrid = h('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:8px 24px 0'},
    h('div',{style:cellStyle+';background:#fffaf0;border-color:#fef3c7'},
      h('div',{style:labelStyle+';color:#a96400'}, dayLabel + ' · 마감 건수'),
      cntI,
      h('div',{style:'font-size:11.5px;color:var(--text-soft);margin-top:8px'},'그날 마감한 건수만 입력 (월 누적은 자동)')
    ),
    h('div',{style:cellStyle+';background:#fffaf0;border-color:#fef3c7'},
      h('div',{style:labelStyle+';color:#a96400'}, dayLabel + ' · 받은 디비'),
      dbI,
      h('div',{style:'font-size:11.5px;color:var(--text-soft);margin-top:8px'},'그날 받은 디비만 입력 (월 누적은 자동)')
    ),
  );

  // 결과 한 행 — 컬럼: 이름 / 상태 / 총갯수 / 일평균 / 마감예상 / 총 디비 / 디비평균 / 디비 효율
  const cellStyleHt = 'padding:14px 12px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:18px';
  dayAvgEl.style.cssText = '';
  projectedEl.style.cssText = '';
  dbAvgEl.style.cssText = '';
  effEl.style.cssText = 'font-weight:800';
  const myStatus = getTodayStatus(me.id, State.records);
  const summaryTable = h('table',{style:'border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:14px 24px 0;width:calc(100% - 48px)'},
    h('thead',null, h('tr',null,
      ...['이름','상태','총갯수','일평균','마감예상','총 디비','디비평균','디비 효율'].map(t=>
        h('th',{style:'padding:10px 12px;background:#fbfaf8;color:var(--text-soft);font-size:11px;font-weight:700;letter-spacing:0.04em;text-align:right;border-bottom:1px solid var(--border-soft)'},t))
    )),
    h('tbody',null, h('tr',null,
      h('td',{style:'padding:14px 12px;text-align:left;font-weight:700;font-size:15px'},
        h('span',{style:'display:inline-flex;align-items:center;gap:8px'},
          h('span',{class:'avatar',style:`width:24px;height:24px;font-size:11px;background:${nameColor(me.name)}`}, initial(me.name)),
          me.name)
      ),
      h('td',{style:'padding:14px 12px;text-align:left'}, statusBadge(myStatus)),
      h('td',{style:cellStyleHt}, tcEl),
      h('td',{style:cellStyleHt}, dayAvgEl),
      h('td',{style:cellStyleHt+';color:#1d4ed8'}, projectedEl),
      h('td',{style:cellStyleHt}, tdEl),
      h('td',{style:cellStyleHt}, dbAvgEl),
      h('td',{style:cellStyleHt+';font-size:20px'}, effEl),
    ))
  );
  const periodInfo = h('div',{style:'padding:10px 24px 0;color:var(--text-soft);font-size:12px'},
    `실 근무일 ${elapsed} · 남은 ${remaining} · 총 ${total}일 · 휴무는 근태(승인된 휴가/월차/연차)에서 자동`);

  // 매출 카드는 직원 페이지에서 제거 (대표/관리자만 봄)
  return h('div',null, toolbar, inputHead, inputGrid, summaryTable, periodInfo);
}

// 헤더 위젯 (오늘 부재 / 본인 사용량) ─────────────────
function renderStatChips(){
  const wrap=h('div',{class:'stat-row'});
  const today=new Date();
  const todayYmd=fmtYmd(today.getFullYear(),today.getMonth()+1,today.getDate());

  // 오늘 부재중 (APPROVED 인 OFF/MONTHLY/ANNUAL/SICK/HOLIDAY/HALF_AM/HALF_PM)
  const outToday=State.records.filter(r=>{
    const d=String(r.work_date).slice(0,10);
    return d===todayYmd && r.status==='APPROVED' && r.type!=='WORK';
  });
  const userMap={}; State.users.forEach(u=>userMap[u.id]=u);
  const outNames=outToday.map(r=>{
    const n=userMap[r.user_id]?.name||'?';
    return `${n}(${TYPE_LABELS[r.type]})`;
  }).join(', ');
  wrap.append(h('div',{
    class:'stat-chip out-today',
    title:outNames||'결근/휴가 없음',
  }, '오늘 부재 ', h('span',{class:'num'}, outToday.length), '명',
     outNames?h('span',{style:'color:#9a7600;margin-left:6px'},'· '+outNames):null));

  // 본인 이번달 사용량 (APPROVED만)
  const me=State.user;
  if(me.role!=='admin'){
    const mine=State.records.filter(r=>r.user_id===me.id && r.status==='APPROVED');
    const cnt={ANNUAL:0,MONTHLY:0,HALF_AM:0,HALF_PM:0,SICK:0,OFF:0};
    mine.forEach(r=>{ if(cnt[r.type]!=null) cnt[r.type]++; });
    const halfTotal=cnt.HALF_AM+cnt.HALF_PM;
    wrap.append(
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-annual'}),' 연차 ',h('span',{class:'num'},cnt.ANNUAL)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-monthly'}),' 월차 ',h('span',{class:'num'},cnt.MONTHLY)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-half'}),' 반차 ',h('span',{class:'num'},halfTotal)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-sick'}),' 병가 ',h('span',{class:'num'},cnt.SICK)),
      h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-off'}),' 휴무 ',h('span',{class:'num'},cnt.OFF)),
    );
  }

  // 승인 대기
  const isPriv=me.role==='admin'||me.role==='manager';
  const waiting=State.records.filter(r=>r.status==='REQUESTED');
  if(waiting.length){
    wrap.append(h('div',{
      class:'stat-chip',style:'background:#fff7ec;border-color:#f4d99c;color:#7a4f00;cursor:pointer',
      onClick:()=>{ if(isPriv){ State.page='approval'; renderApp(); }}
    },'승인 대기 ', h('span',{class:'num',style:'color:#7a4f00'}, waiting.length),'건',
       isPriv?h('span',{style:'margin-left:6px;font-size:11px'},'· 클릭'):null));
  }

  return wrap;
}

function renderGrid(){
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const today=new Date();
  const todayYmd=fmtYmd(today.getFullYear(),today.getMonth()+1,today.getDate());

  const recIdx={};
  for(const r of State.records){
    const dateStr=String(r.work_date).slice(0,10);
    recIdx[`${r.user_id}|${dateStr}`]=r;
  }

  const headRow=[h('th',{class:'col-name'},'이름')];
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ymd=fmtYmd(y,m,d);
    const cls=[];
    if(dow===0) cls.push('weekend');
    if(dow===6) cls.push('sat');
    if(ymd===todayYmd) cls.push('today-h');
    const labels=['일','월','화','수','목','금','토'];
    headRow.push(h('th',{class:cls.join(' ')},
      h('div',{style:'font-size:13px;font-weight:700;color:'+(ymd===todayYmd?'#0f0f0f':'inherit')}, d),
      h('div',{style:'font-size:9.5px;font-weight:500;opacity:.7'}, labels[dow])
    ));
  }

  const tbody=h('tbody');
  for(const u of State.users){
    const isSelf=u.id===State.user.id;
    const tr=h('tr',{class:isSelf?'row-self':''});
    tr.append(h('td',{class:'col-name'},
      h('div',{style:'display:flex;align-items:center;gap:8px;cursor:pointer',
        onClick:()=>{State.selectedPersonId=u.id; renderApp();}},
        h('span',{class:'avatar',style:`width:24px;height:24px;font-size:11px;background:${nameColor(u.name)}`}, initial(u.name)),
        h('span',{style:'font-weight:600'}, u.name),
        u.role==='manager'?h('span',{class:'role-badge role-manager',style:'margin-left:auto'},'차장'):null
      )
    ));
    for(let d=1;d<=dim;d++){
      const dow=new Date(y,m-1,d).getDay();
      const isWeekend=(dow===0||dow===6);
      const ymd=fmtYmd(y,m,d);
      const rec=recIdx[`${u.id}|${ymd}`];
      const cls=['day'];
      if(isWeekend) cls.push('weekend');
      if(ymd===todayYmd) cls.push('today');
      if(!rec) cls.push('empty');
      let inner=null;
      if(rec){
        const chipCls=['chip', `chip-${rec.type}`];
        if(rec.status==='REQUESTED') chipCls.push('is-requested');
        if(rec.status==='REJECTED') chipCls.push('is-rejected');
        inner=h('span',{class:chipCls.join(' ')}, TYPE_TINY[rec.type]||'');
      }
      const td=h('td',{
        class:cls.join(' '),
        title:rec?`${TYPE_LABELS[rec.type]} (${statusLabel(rec.status)})${rec.note?' · '+rec.note:''}`:'',
        onClick:isWeekend?null:()=>openCellDrawer(u,ymd,rec),
      }, inner);
      tr.append(td);
    }
    tbody.append(tr);
  }

  const table=h('table',{class:'grid'},
    h('thead',null,h('tr',null,headRow)),
    tbody
  );
  const wrap=h('div',{class:'grid-wrap'},table);

  const legend=h('div',{class:'legend'},
    chipLegend('OFF','휴무'), chipLegend('MONTHLY','월차'), chipLegend('ANNUAL','연차'),
    chipLegend('HALF_AM','반차'), chipLegend('SICK','병가'), chipLegend('HOLIDAY','공가'),
    h('span',{class:'legend-item',style:'margin-left:auto'},'점선 = 승인대기 · 취소선 = 반려')
  );
  return h('div',null, renderStatChips(), wrap, legend);
}
function chipLegend(type,label){
  return h('span',{class:'legend-item'}, h('span',{class:`chip chip-${type}`}, label));
}
function statusLabel(s){return s==='APPROVED'?'승인':s==='REJECTED'?'반려':'요청'}

// 오늘 직원 상태 (근태 attendance_records 기반)
function getTodayStatus(userId, records){
  const today = new Date().toISOString().slice(0,10);
  const r = (records||[]).find(rec =>
    rec.user_id===userId && String(rec.work_date).slice(0,10)===today
  );
  if (!r) return { label:'근무', kind:'WORK' };
  if (r.status==='APPROVED') return { label: TYPE_LABELS[r.type]||'근무', kind:r.type };
  if (r.status==='REQUESTED') return { label: (TYPE_LABELS[r.type]||'')+' 대기', kind:r.type+'_REQ' };
  if (r.status==='REJECTED') return { label:'근무', kind:'WORK' };
  return { label:'근무', kind:'WORK' };
}
function statusBadge(s){
  const colors = {
    WORK:        ['#e7f6e9','#0f7b6c'],
    OFF:         ['#ebebe9','#5b5750'],
    HALF_AM:     ['#fde8c8','#a96400'],
    HALF_PM:     ['#fde8c8','#a96400'],
    MONTHLY:     ['#dbe5f8','#1d4ed8'],
    ANNUAL:      ['#dbe5f8','#1d4ed8'],
    SICK:        ['#ffe2dd','#b91c1c'],
    HOLIDAY:     ['#e8deee','#6940a5'],
  };
  const k = String(s.kind||'WORK').replace(/_REQ$/,'');
  const [bg,fg] = colors[k] || colors.WORK;
  return h('span',{
    style:`display:inline-block;padding:4px 10px;border-radius:5px;font-size:12px;font-weight:700;background:${bg};color:${fg};${s.kind && s.kind.endsWith('_REQ')?'border:1px dashed '+fg:''}`
  }, s.label);
}

function openCellDrawer(target,ymd,rec){
  const me=State.user;
  const isPriv=me.role==='admin'||me.role==='manager';
  const isSelf=target.id===me.id;
  if(!isSelf && !isPriv){
    if(rec) showToast(`${target.name} · ${ymd} · ${TYPE_LABELS[rec.type]} (${statusLabel(rec.status)})`);
    return;
  }
  let chosen=rec?rec.type:'OFF';

  let typeGrid;
  function repaint(){
    typeGrid.innerHTML='';
    REQUESTABLE_TYPES.forEach(t=>typeGrid.append(typeBtn(t)));
  }
  function typeBtn(t){
    return h('button',{
      class:'type-btn '+(chosen===t?'on':''),
      onClick:()=>{chosen=t;repaint();}
    }, TYPE_LABELS[t]);
  }
  typeGrid=h('div',{class:'type-grid'});
  REQUESTABLE_TYPES.forEach(t=>typeGrid.append(typeBtn(t)));

  const noteI=h('input',{type:'text',value:rec?rec.note||'':'',placeholder:'메모 (선택)',
    style:'width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;outline:none;font-size:13.5px'});
  const msg=h('div',{class:'auth-msg'});

  // 승인 이력 박스
  let auditBox=null;
  if(rec){
    const reqAt=rec.requested_at?new Date(rec.requested_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}):'';
    const apvAt=rec.approved_at?new Date(rec.approved_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}):'';
    const apvName=rec.approver_name||'';
    let statusLine;
    if(rec.status==='APPROVED'){
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'승인'),
        h('span',{class:'audit-val ok'}, apvName||'관리자',' · ',apvAt));
    } else if(rec.status==='REJECTED'){
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'반려'),
        h('span',{class:'audit-val no'}, apvName||'관리자',' · ',apvAt, rec.reject_reason?` — ${rec.reject_reason}`:''));
    } else {
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'상태'),
        h('span',{class:'audit-val'},'승인 대기'));
    }
    auditBox=h('div',{class:'audit-box'},
      h('div',{class:'audit-line'},h('span',{class:'audit-key'},'요청'),h('span',{class:'audit-val'},reqAt)),
      statusLine
    );
  }

  const close=()=>{ const m=$('.modal-bg'); if(m) m.remove(); };
  const save=async()=>{
    msg.textContent='';
    try{
      await api('/api/att/request',{method:'POST',body:{
        user_id:target.id, work_date:ymd, type:chosen, note:noteI.value||null
      }});
      close();
      await loadMonth();
      renderApp();
      showToast(isSelf? (isPriv?'등록(자동승인) 완료':'요청 완료 — 승인 대기'): `${target.name} ${ymd} 등록 완료`);
    }catch(e){ msg.textContent=e.message; }
  };
  const cancel=async()=>{
    if(!rec) return;
    if(!confirm('이 일정을 삭제하시겠습니까?')) return;
    try{
      await api('/api/att/cancel',{method:'POST',body:{id:rec.id}});
      close();
      await loadMonth();
      renderApp();
      showToast('삭제됨');
    }catch(e){ alert(e.message); }
  };

  const dateLabel=new Date(ymd+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  const drawer=h('aside',{class:'drawer',onClick:e=>e.stopPropagation()},
    h('div',{class:'drawer-head'},
      h('div',null,
        h('div',{class:'drawer-eyebrow'}, isSelf?'내 일정':target.name),
        h('div',{class:'drawer-title'}, dateLabel)
      ),
      h('button',{class:'drawer-close',onClick:close,title:'Esc'},'✕')
    ),
    h('div',{class:'drawer-body'},
      auditBox,
      h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin-bottom:6px;letter-spacing:0.02em'},'유형'),
      typeGrid,
      h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin:6px 0 6px;letter-spacing:0.02em'},'메모'),
      noteI,
      msg,
      h('div',{style:'font-size:11.5px;color:var(--text-soft);line-height:1.5'}, isSelf
        ? (isPriv?'등록 즉시 자동 승인됩니다':'등록 시 차장/대표 승인 후 반영됩니다')
        : `${target.name} 일정을 직접 등록 (자동 승인)`)
    ),
    h('div',{class:'drawer-foot'},
      rec?h('button',{class:'btn btn-danger',onClick:cancel},'삭제'):null,
      h('button',{class:'btn',onClick:close},'취소'),
      h('button',{class:'btn btn-primary',onClick:save}, rec?'수정':'등록')
    )
  );
  const bg=h('div',{class:'modal-bg'}, drawer);
  bg.addEventListener('click',(e)=>{if(e.target===bg) close();});
  document.body.append(bg);
  setTimeout(()=>{ try{ noteI.focus(); }catch(_){}; },80);
}

// ─────────────── 직원 디렉토리 (메인 — 직원 중심) ───────────────
function renderPeople(){
  const wrap=h('div');
  const me=State.user;

  // 검색 + 날짜 범위 (날짜 설정 시 그 범위 내 기록 가진 직원만 + 카드 클릭 시 상세에 자동 반영)
  const searchI=h('input',{type:'text',placeholder:'직원 이름 검색  ( / )',value:State.search});
  searchI.addEventListener('input',()=>{ State.search=searchI.value; refresh(); });

  const fromI=h('input',{type:'date',value:State.dirDateFrom||'',
    style:'padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:#fff;font-size:13px;outline:none'});
  const toI=h('input',{type:'date',value:State.dirDateTo||'',
    style:'padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:#fff;font-size:13px;outline:none'});
  fromI.addEventListener('change',()=>{State.dirDateFrom=fromI.value;refresh();});
  toI.addEventListener('change',()=>{State.dirDateTo=toI.value;refresh();});

  // 빠른 칩
  const quickChip=(label,setter)=>h('button',{
    class:'btn',style:'padding:7px 11px;font-size:12px',
    onClick:()=>{setter();fromI.value=State.dirDateFrom||'';toI.value=State.dirDateTo||'';refresh();}
  },label);
  const ymdOf=(d)=>fmtYmd(d.getFullYear(),d.getMonth()+1,d.getDate());
  const today=new Date();
  const startOfWeek=new Date(today); startOfWeek.setDate(today.getDate()-today.getDay());
  const endOfWeek=new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate()+6);
  const startOfMonth=new Date(today.getFullYear(),today.getMonth(),1);
  const endOfMonth=new Date(today.getFullYear(),today.getMonth()+1,0);

  const toolbar=h('div',{style:'display:flex;flex-direction:column;gap:10px;margin-bottom:18px'},
    h('div',{class:'people-toolbar',style:'margin-bottom:0'},
      h('div',{class:'search-box'}, searchI),
      h('span',{style:'color:var(--text-soft);font-size:12px;font-weight:600'},'기간'),
      fromI, h('span',{style:'color:var(--text-soft)'},'~'), toI,
    ),
    h('div',{style:'display:flex;flex-wrap:wrap;gap:6px'},
      quickChip('오늘',()=>{State.dirDateFrom=ymdOf(today);State.dirDateTo=ymdOf(today);}),
      quickChip('이번 주',()=>{State.dirDateFrom=ymdOf(startOfWeek);State.dirDateTo=ymdOf(endOfWeek);}),
      quickChip('이번 달',()=>{State.dirDateFrom=ymdOf(startOfMonth);State.dirDateTo=ymdOf(endOfMonth);}),
      quickChip('초기화',()=>{State.dirDateFrom='';State.dirDateTo='';State.search='';searchI.value='';})
    )
  );
  wrap.append(renderStatChips(), toolbar);

  const grid=h('div',{class:'people-grid'});
  const todayYmd=fmtYmd(new Date().getFullYear(),new Date().getMonth()+1,new Date().getDate());

  // 결과 요약 (날짜 범위 적용 시 그 범위 통계)
  const summary=h('div',{style:'font-size:12px;color:var(--text-soft);margin-bottom:10px'});

  function refresh(){
    grid.innerHTML=''; summary.innerHTML='';
    const q=(State.search||'').trim();
    const from=State.dirDateFrom, to=State.dirDateTo;

    function inRange(r){
      const d=String(r.work_date).slice(0,10);
      if(from && d<from) return false;
      if(to && d>to) return false;
      return true;
    }

    let people=State.users.filter(u=>!q||u.name.includes(q));

    // 날짜 범위 설정된 경우: 그 범위에 기록 있는 직원만
    let totalRecords=0;
    if(from || to){
      people=people.filter(u=>{
        const has=State.records.some(r=>r.user_id===u.id && inRange(r));
        return has;
      });
      totalRecords=State.records.filter(r=>inRange(r) && people.some(p=>p.id===r.user_id)).length;
      summary.append(`기간 ${from||'…'} ~ ${to||'…'} · ${people.length}명 · ${totalRecords}건의 기록`);
    } else if(q){
      summary.append(`'${q}' 검색 · ${people.length}명`);
    } else {
      summary.append(`전체 ${people.length}명`);
    }

    if(!people.length){
      grid.append(h('div',{class:'empty'},'조건에 맞는 직원이 없습니다'));
      return;
    }
    for(const u of people){
      const allMine=State.records.filter(r=>r.user_id===u.id);
      const inRangeMine=(from||to)?allMine.filter(inRange):allMine;
      const recs=inRangeMine.filter(r=>r.status==='APPROVED');
      const cnt={ANNUAL:0,MONTHLY:0,HALF:0,SICK:0};
      recs.forEach(r=>{
        if(r.type==='ANNUAL') cnt.ANNUAL++;
        else if(r.type==='MONTHLY') cnt.MONTHLY++;
        else if(r.type==='HALF_AM'||r.type==='HALF_PM') cnt.HALF++;
        else if(r.type==='SICK') cnt.SICK++;
      });
      const todayRec=State.records.find(r=>r.user_id===u.id && String(r.work_date).slice(0,10)===todayYmd);
      const todayType=todayRec?todayRec.type:'WORK';
      const todayLabel=todayRec?TYPE_LABELS[todayRec.type]:'정상출근 예정';
      const wait=allMine.filter(r=>r.status==='REQUESTED').length;
      const rangeCnt=inRangeMine.length;

      const card=h('div',{class:'person-card',onClick:()=>{
        // 날짜 범위가 설정되어 있으면 상세 페이지에서 그 범위 자동 적용
        State.detailDateFrom=from||''; State.detailDateTo=to||'';
        State.selectedPersonId=u.id;
        renderApp();
      }},
        h('div',{class:'person-head'},
          h('span',{class:'avatar',style:`background:${nameColor(u.name)}`}, initial(u.name)),
          h('div',{style:'min-width:0;flex:1'},
            h('div',{class:'person-name'}, u.name),
            h('div',{class:'person-meta'},
              h('span',{class:'dot '+(u.registered?'on':'')}),
              u.role==='manager'?'차장':'직원',' · ',u.registered?'가입':'미가입',
              wait?h('span',{style:'margin-left:auto;color:#a96400;font-weight:700'},'대기 '+wait):null
            )
          )
        ),
        (from||to)
          ? h('div',{class:'person-today t-WORK'}, `기간 내 ${rangeCnt}건`)
          : h('div',{class:`person-today t-${todayType}`}, '오늘 · ', todayLabel),
        h('div',{class:'person-stats'},
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'연차'), h('div',{class:'val'}, cnt.ANNUAL)),
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'월차'), h('div',{class:'val'}, cnt.MONTHLY)),
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'반차'), h('div',{class:'val'}, cnt.HALF)),
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'병가'), h('div',{class:'val'}, cnt.SICK)),
        )
      );
      grid.append(card);
    }
  }
  refresh();
  wrap.append(summary, grid);
  setTimeout(()=>{ try{ searchI.focus(); searchI.setSelectionRange(searchI.value.length,searchI.value.length); }catch(_){}; },30);
  return wrap;
}

// ─────────────── 직원 상세 (BambooHR/Notion People 톤) ───────────────
function renderPersonDetail(){
  const u=State.users.find(x=>x.id===State.selectedPersonId);
  if(!u){
    State.selectedPersonId=null;
    return renderPeople();
  }
  const wrap=h('div');
  // 뒤로가기
  wrap.append(h('button',{class:'pd-back',style:'margin-bottom:14px',
    onClick:()=>{State.selectedPersonId=null;renderApp();}},'← 직원 목록'));

  const recs=State.records.filter(r=>r.user_id===u.id);
  const cntApproved={ANNUAL:0,MONTHLY:0,HALF:0,SICK:0,OFF:0};
  recs.forEach(r=>{
    if(r.status!=='APPROVED') return;
    if(r.type==='ANNUAL') cntApproved.ANNUAL++;
    else if(r.type==='MONTHLY') cntApproved.MONTHLY++;
    else if(r.type==='HALF_AM'||r.type==='HALF_PM') cntApproved.HALF++;
    else if(r.type==='SICK') cntApproved.SICK++;
    else if(r.type==='OFF') cntApproved.OFF++;
  });

  // ── 좌측 프로필 카드
  const sideCard=h('div',{class:'pd-card'},
    h('div',{class:'pd-avatar',style:`background:${nameColor(u.name)}`}, initial(u.name)),
    h('div',{class:'pd-name'}, u.name),
    h('div',{class:'pd-role'},
      u.role==='manager'?'차장 (월차 승인 권한)':u.role==='admin'?'대표':'직원'),
    h('div',{class:'pd-props'},
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'역할'), h('span',{class:'v'}, u.role==='manager'?'차장':u.role==='admin'?'대표':'직원')),
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'가입'), h('span',{class:'v'}, u.registered?'완료':'미가입')),
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'전체 신청'), h('span',{class:'v'}, recs.length+'건')),
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'대기'), h('span',{class:'v'}, recs.filter(r=>r.status==='REQUESTED').length+'건')),
    )
  );

  // ── 우측 본문: 통계 / 미니 캘린더 / 이력
  // 1) 누적 통계 (이번 달 기준)
  const statSection=h('section',{class:'pd-section'},
    h('h3',null,'📊 ',`${State.ym} 사용 현황`),
    h('div',{class:'pd-stat-row'},
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.ANNUAL), h('div',{class:'l'},'연차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.MONTHLY), h('div',{class:'l'},'월차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.HALF), h('div',{class:'l'},'반차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.SICK), h('div',{class:'l'},'병가')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.OFF), h('div',{class:'l'},'휴무')),
    )
  );

  // 2) 미니 캘린더
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const firstDow=new Date(y,m-1,1).getDay();
  const recIdx={};
  recs.forEach(r=>{ recIdx[String(r.work_date).slice(0,10)]=r; });
  const todayYmd=fmtYmd(new Date().getFullYear(),new Date().getMonth()+1,new Date().getDate());
  const cal=h('div',{class:'pd-mini-cal'});
  ['일','월','화','수','목','금','토'].forEach(d=>cal.append(h('div',{class:'pmh'},d)));
  for(let i=0;i<firstDow;i++) cal.append(h('div',{class:'pmd empty'}));
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ymd=fmtYmd(y,m,d);
    const rec=recIdx[ymd];
    const cls=['pmd'];
    if(dow===0||dow===6) cls.push('weekend');
    if(ymd===todayYmd) cls.push('today');
    let inner=[h('div',null,d)];
    if(rec){
      const cc=['chip',`chip-${rec.type}`];
      if(rec.status==='REQUESTED') cc.push('is-requested');
      if(rec.status==='REJECTED') cc.push('is-rejected');
      inner.push(h('span',{class:cc.join(' ')}, TYPE_TINY[rec.type]||''));
    }
    cal.append(h('div',{class:cls.join(' '),
      onClick:(dow===0||dow===6)?null:()=>openCellDrawer(u,ymd,rec)
    }, ...inner));
  }
  const calSection=h('section',{class:'pd-section'},
    h('h3',null,'🗓 미니 캘린더'),
    cal
  );

  // 3) 신청 이력 — 날짜 범위/타입/상태 필터 + 정렬
  // 디렉토리에서 날짜 범위를 가지고 들어왔다면 자동 반영
  const filter={
    sort:'desc',
    type:'ALL',
    status:'ALL',
    from:State.detailDateFrom||'',
    to:State.detailDateTo||'',
  };
  // 1회 적용 후 비움
  State.detailDateFrom=''; State.detailDateTo='';
  const histList=h('div',{class:'pd-history-list'});

  function paintHist(){
    histList.innerHTML='';
    let filtered=recs.slice();
    if(filter.type!=='ALL'){
      if(filter.type==='HALF') filtered=filtered.filter(r=>r.type==='HALF_AM'||r.type==='HALF_PM');
      else filtered=filtered.filter(r=>r.type===filter.type);
    }
    if(filter.status!=='ALL') filtered=filtered.filter(r=>r.status===filter.status);
    if(filter.from) filtered=filtered.filter(r=>String(r.work_date).slice(0,10)>=filter.from);
    if(filter.to) filtered=filtered.filter(r=>String(r.work_date).slice(0,10)<=filter.to);
    filtered.sort((a,b)=>{
      const c=String(a.work_date).localeCompare(String(b.work_date));
      return filter.sort==='desc'?-c:c;
    });
    if(!filtered.length){
      histList.append(h('div',{class:'empty',style:'padding:24px'},'조건에 맞는 이력이 없습니다'));
      return;
    }
    for(const r of filtered){
      const dateStr=String(r.work_date).slice(0,10);
      const dow=['일','월','화','수','목','금','토'][new Date(dateStr+'T00:00:00').getDay()];
      histList.append(h('div',{class:'pd-hist',
        style:'cursor:pointer',
        onClick:()=>openCellDrawer(u,dateStr,r)},
        h('div',{class:'hi-left'},
          h('span',{class:'hi-date'}, dateStr.slice(5)+' ('+dow+')'),
          h('span',{class:`chip chip-${r.type}`}, TYPE_LABELS[r.type]),
          r.note?h('span',{style:'color:var(--text-soft);font-size:11.5px'}, '· '+r.note):null,
        ),
        h('span',{class:`hi-status s-${r.status}`}, statusLabel(r.status))
      ));
    }
  }

  // 필터바
  const filterBar=h('div',{
    style:'display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px;font-size:12px'
  });
  // 타입 필터
  const typeOpts=[['ALL','전체'],['ANNUAL','연차'],['MONTHLY','월차'],['HALF','반차'],['SICK','병가'],['OFF','휴무'],['WORK','정상']];
  const typeSel=h('select',{
    style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none;cursor:pointer',
    onChange:(e)=>{filter.type=e.target.value;paintHist();}
  }, ...typeOpts.map(([v,l])=>h('option',{value:v},l)));
  // 상태 필터
  const statusOpts=[['ALL','전체상태'],['APPROVED','승인'],['REQUESTED','대기'],['REJECTED','반려']];
  const statusSel=h('select',{
    style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none;cursor:pointer',
    onChange:(e)=>{filter.status=e.target.value;paintHist();}
  }, ...statusOpts.map(([v,l])=>h('option',{value:v},l)));
  // 날짜 from/to
  const fromI=h('input',{type:'date',value:filter.from,
    style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:(e)=>{filter.from=e.target.value;paintHist();}});
  const toI=h('input',{type:'date',value:filter.to,
    style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:(e)=>{filter.to=e.target.value;paintHist();}});
  // 정렬 토글
  const sortBtn=h('button',{
    class:'btn',
    style:'padding:7px 11px;font-size:12px',
    onClick:()=>{filter.sort=filter.sort==='desc'?'asc':'desc';sortBtn.textContent=filter.sort==='desc'?'최신순 ↓':'오래된순 ↑';paintHist();}
  }, '최신순 ↓');
  // 초기화
  const resetBtn=h('button',{
    class:'btn',
    style:'padding:7px 11px;font-size:12px',
    onClick:()=>{
      filter.sort='desc';filter.type='ALL';filter.status='ALL';filter.from='';filter.to='';
      typeSel.value='ALL';statusSel.value='ALL';fromI.value='';toI.value='';
      sortBtn.textContent='최신순 ↓';paintHist();
    }
  }, '초기화');

  filterBar.append(
    typeSel, statusSel,
    h('span',{style:'color:var(--text-soft);font-size:11.5px;margin-left:4px'},'기간'),
    fromI, h('span',{style:'color:var(--text-soft)'}, '~'), toI,
    h('span',{style:'flex:1'}),
    sortBtn, resetBtn
  );

  paintHist();
  const histSection=h('section',{class:'pd-section'},
    h('h3',null,'🕘 신청 이력 ',h('span',{style:'color:var(--text-soft);font-weight:500;font-size:12px;margin-left:6px'},'· 총 '+recs.length+'건')),
    filterBar,
    histList
  );

  const detail=h('div',{class:'person-detail'},
    h('div',{class:'pd-side'}, sideCard),
    h('div',null, statSection, calSection, histSection)
  );
  wrap.append(detail);
  return wrap;
}

function renderApproval(){
  const userMap={}; State.users.forEach(u=>userMap[u.id]=u);
  const pending=State.records.filter(r=>r.status==='REQUESTED');
  if(!pending.length) return h('div',{class:'empty'},'승인 대기 중인 요청이 없습니다');
  const list=h('div',{class:'approval-list'});
  async function doApprove(id){
    try{
      await api('/api/att/approve',{method:'POST',body:{id,action:'approve'}});
      await loadMonth(); renderApp(); showToast('승인됨');
    }catch(e){ alert(e.message); }
  }
  function openRejectModal(id, who){
    const reasonI=h('input',{type:'text',placeholder:'반려 사유 (필수)'});
    const msg=h('div',{class:'auth-msg'});
    const close=()=>{ const m=$('.modal-bg'); if(m) m.remove(); };
    const submit=async()=>{
      const reason=reasonI.value.trim();
      if(!reason){ msg.textContent='사유를 입력해주세요'; return; }
      try{
        await api('/api/att/approve',{method:'POST',body:{id,action:'reject',reject_reason:reason}});
        close(); await loadMonth(); renderApp(); showToast('반려됨');
      }catch(e){ msg.textContent=e.message; }
    };
    reasonI.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
    const modal=h('div',{class:'modal'},
      h('h3',null,'반려'),
      h('div',{class:'modal-sub'}, who?`${who}님의 신청을 반려합니다`:''),
      h('div',{class:'field'},reasonI),
      msg,
      h('div',{class:'modal-actions'},
        h('button',{class:'btn',onClick:close},'취소'),
        h('button',{class:'btn btn-danger',onClick:submit},'반려 확정')
      )
    );
    const bg=h('div',{class:'modal-bg'},modal);
    bg.addEventListener('click',e=>{ if(e.target===bg) close(); });
    document.body.append(bg);
    setTimeout(()=>reasonI.focus(),20);
  }
  for(const r of pending){
    const u=userMap[r.user_id]||{name:'?'};
    const dateStr=String(r.work_date).slice(0,10);
    const card=h('div',{class:'approval-card'},
      h('div',{class:'approval-info'},
        h('div',{class:'who'}, u.name,' · ',dateStr,' · ',TYPE_LABELS[r.type]),
        h('div',{class:'what'}, r.note||'(메모 없음)',' · 요청: ',new Date(r.requested_at).toLocaleString('ko-KR'))
      ),
      h('div',{class:'approval-actions'},
        h('button',{class:'btn btn-danger',onClick:()=>openRejectModal(r.id, u.name)},'반려'),
        h('button',{class:'btn btn-primary',onClick:()=>doApprove(r.id)},'승인'),
      )
    );
    list.append(card);
  }
  return list;
}

// ─────────────── 영업 모듈 ───────────────
const ORDER_STATUS_LABEL={PAID:'입금완료',IN_PROGRESS:'입금중',UNPAID:'미입금',PARTIAL:'일부납부',CANCELLED:'취소'};
const ORDER_STATUS_LIST=['PAID','IN_PROGRESS','UNPAID','PARTIAL','CANCELLED'];
const CARRIER_LIST=['SK','KT','LGU'];
const fmtKRW=(n)=>'₩'+(Number(n||0)).toLocaleString('ko-KR');

async function loadSalesContext(page, force){
  const tasks = [];
  // vendor 마스터 한 번만
  if (!State.salesVendorsLoaded || force){
    tasks.push(api('/api/sales/vendors').then(v=>{
      State.salesVendors = v.vendors || []; State.salesVendorsLoaded = true;
    }).catch(()=>{}));
  }
  if (page==='sales-orders'){
    const ym=State.salesYm || todayYm(); State.salesYm=ym;
    if (force || State.salesOrdersLoadedYm !== ym){
      tasks.push(api(`/api/sales/orders?ym=${ym}`).then(r=>{
        State.salesOrders = r.orders || []; State.salesOrdersLoadedYm = ym;
      }));
    }
  } else if (page==='sales-tm'){
    const ym=State.salesYm || todayYm(); State.salesYm=ym;
    const cutoff=State.salesCutoff || (new Date().toISOString().slice(0,10));
    State.salesCutoff=cutoff;
    const key = `${ym}|${cutoff}`;
    if (force || State.salesTmLoadedKey !== key){
      tasks.push(api(`/api/sales/tm-summary?ym=${ym}&cutoff=${cutoff}`).then(r=>{
        State.salesTmRows = r.rows || [];
        State.salesPeriod = r.period;
        State.salesTmElapsed = r.elapsedWorkdays || 0;
        State.salesTmRemaining = r.remainingWorkdays || 0;
        State.salesTmTotal = r.totalWorkdays || 0;
        State.salesTmLoadedKey = key;
      }));
      // 오늘의 TM 일별 입력값도 같이 (모달/패널에서 사용)
      tasks.push(api(`/api/sales/tm-daily?ym=${ym}`).then(d=>{
        const today = new Date().toISOString().slice(0,10);
        const map = {};
        (d.rows || []).forEach(r=>{
          if (String(r.work_date).slice(0,10) === today){
            map[r.user_id] = { db_count: r.db_count, is_off: r.is_off };
          }
        });
        State.salesTmTodayMap = map;
      }).catch(()=>{}));
    }
  } else if (page==='sales-vendor'){
    const d=State.salesDate || (new Date().toISOString().slice(0,10));
    State.salesDate=d;
    if (force || State.salesVendorLoadedDate !== d){
      tasks.push(api(`/api/sales/vendor-daily?date=${d}`).then(r=>{
        State.salesVendorRows = r.vendors || [];
        State.salesDayMeta = r.meta || { recontact_completed: 0, note: null };
        State.salesVendorLoadedDate = d;
      }));
    }
  }
  if (tasks.length) await Promise.all(tasks);
}

// 클릭 즉시 렌더 + 백그라운드 페치
async function navTo(key){
  State.page=key;
  State.selectedPersonId=null;
  // 캐시 미적재 페이지면 로딩 상태 표시
  const needsSalesLoad = key && key.startsWith('sales-') && (
    (key==='sales-orders' && State.salesOrdersLoadedYm !== (State.salesYm||todayYm())) ||
    (key==='sales-tm'     && State.salesTmLoadedKey   !== `${State.salesYm||todayYm()}|${State.salesCutoff||new Date().toISOString().slice(0,10)}`) ||
    (key==='sales-vendor' && State.salesVendorLoadedDate !== (State.salesDate||new Date().toISOString().slice(0,10)))
  );
  const needsClosingLoad = (key==='my-closing' && State.myClosingLoadedYm !== (State.salesYm||todayYm()));
  if (needsSalesLoad || needsClosingLoad) State.loadingPage = key;
  renderApp();
  if (key && key.startsWith('sales-')){
    try{ await loadSalesContext(key); }
    catch(e){ console.error(e); showToast('데이터 로드 실패: '+e.message); }
    if (State.page===key){ State.loadingPage=null; renderApp(); } else { State.loadingPage=null; }
  } else if (key==='my-closing'){
    try{ await loadMyClosing(); }
    catch(e){ console.error(e); }
    if (State.page===key){ State.loadingPage=null; renderApp(); } else { State.loadingPage=null; }
  }
}
