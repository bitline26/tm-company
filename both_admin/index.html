<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>티엠컴퍼니</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f7f7f5; --text:#37352f; --text-soft:#787774;
    --border:#e9e9e7; --border-soft:#efeeec;
    --hover:#f1f1ef; --accent:#2383e2; --accent-soft:#eaf2fb;
    --green:#0f7b6c; --green-soft:#ddedea;
    --yellow:#cb912f; --yellow-soft:#fdecc8;
    --red:#e03e3e; --red-soft:#ffe2dd;
    --purple:#6940a5; --purple-soft:#e8deee;
    --pink:#ad1a72; --pink-soft:#f5e0e9;
    --blue:#0b6e99; --blue-soft:#d3e5ef;
    --gray:#9b9a97; --gray-soft:#ebeced;
    --shadow:rgba(15,15,15,0.05) 0 1px 2px;
    --shadow-md:rgba(15,15,15,0.10) 0 3px 6px,rgba(15,15,15,0.08) 0 9px 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:inherit}

  .auth-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#fafaf8;
    padding:24px;position:relative;overflow:hidden;
  }
  .auth-wrap::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 50% 0%, rgba(55,53,47,.05) 0%, transparent 70%),
      radial-gradient(40% 40% at 0% 100%, rgba(55,53,47,.04) 0%, transparent 70%),
      radial-gradient(40% 40% at 100% 100%, rgba(55,53,47,.04) 0%, transparent 70%);
  }
  .auth-card{
    position:relative;z-index:1;width:380px;background:#fff;
    border-radius:16px;padding:44px 36px 28px;
    box-shadow:0 1px 1px rgba(15,15,15,.03),0 8px 24px rgba(15,15,15,.06),0 24px 48px rgba(15,15,15,.04);
    border:1px solid rgba(15,15,15,.05);
  }
  .auth-brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px}
  .auth-brand-mark{
    width:44px;height:44px;border-radius:11px;
    background:#0f0f0f;
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;letter-spacing:0.02em;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 4px 14px rgba(15,15,15,.22);
  }
  .auth-brand-text{font-weight:700;font-size:16px;letter-spacing:-0.02em}

  .auth-tabs{display:flex;gap:20px;justify-content:center;border-bottom:1px solid var(--border);margin-bottom:24px}
  .auth-tab{padding:10px 2px 12px;border:none;background:transparent;color:#a3a29e;font-weight:600;font-size:13.5px;position:relative;letter-spacing:-0.005em}
  .auth-tab:hover{color:var(--text)}
  .auth-tab.on{color:var(--text)}
  .auth-tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--text);border-radius:2px}

  .field{margin-bottom:12px}
  .field input,.field select{
    width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:10px;
    background:#fcfcfb;outline:none;transition:border-color .12s,box-shadow .12s,background .12s;
    font-size:14px;color:var(--text);
  }
  .field input::placeholder{color:#b8b6b1}
  .field input:focus,.field select:focus{border-color:#0f0f0f;background:#fff;box-shadow:0 0 0 3px rgba(15,15,15,.06)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font-weight:600;font-size:13px;transition:background .12s,border-color .12s,transform .05s}
  .btn:hover{background:var(--hover)}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:#0f0f0f;color:#fff;border-color:#0f0f0f}
  .btn-primary:hover{background:#000;border-color:#000}
  .btn-block{width:100%;padding:14px;font-size:14px;border-radius:11px;letter-spacing:-0.005em;margin-top:6px}
  .btn-danger{color:var(--red);border-color:var(--red-soft)}
  .btn-danger:hover{background:var(--red-soft)}

  .auth-msg{font-size:12px;color:var(--red);min-height:16px;text-align:center;margin:8px 0 0}

  .auth-hint{
    margin-top:18px;padding:11px 14px;border-radius:10px;
    background:#f7f6f3;
    font-size:11.5px;color:var(--text-soft);
    display:flex;align-items:center;justify-content:center;gap:8px;
    letter-spacing:0.01em;
  }
  .auth-hint code{
    font-family:'SF Mono',Menlo,monospace;font-size:11px;background:#fff;
    border:1px solid var(--border);padding:1.5px 6px;border-radius:4px;color:var(--text);
  }

  .layout{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--bg-soft);border-right:1px solid var(--border);padding:14px 8px;display:flex;flex-direction:column;gap:2px}
  .side-user{padding:10px 10px 14px;border-bottom:1px solid var(--border-soft);margin-bottom:8px}
  .side-user-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .role-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:600;background:var(--gray-soft);color:var(--text-soft)}
  .role-admin{background:var(--purple-soft);color:var(--purple)}
  .role-manager{background:var(--blue-soft);color:var(--blue)}
  .side-user-meta{font-size:11px;color:var(--text-soft);margin-top:2px}
  .side-nav{display:flex;flex-direction:column;gap:1px;flex:1}
  .nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:4px;color:var(--text-soft);font-size:13.5px;cursor:pointer;border:none;background:transparent;text-align:left;width:100%;font-weight:500}
  .nav-item:hover{background:var(--hover)}
  .nav-item.on{background:var(--hover);color:var(--text);font-weight:600}
  .nav-count{background:var(--red);color:#fff;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:10px}
  .side-foot{border-top:1px solid var(--border-soft);padding-top:8px;margin-top:8px}

  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10}
  .crumbs{font-size:12px;color:var(--text-soft)}
  .page-title{font-size:24px;font-weight:700;margin:2px 0 0;letter-spacing:-0.01em}
  .top-actions{display:flex;align-items:center;gap:8px}
  .month-picker{display:flex;align-items:center;gap:4px}
  .month-label{font-weight:600;font-size:14px;min-width:90px;text-align:center}
  .icon-btn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:#fff;border-radius:6px;color:var(--text-soft);font-size:14px}
  .icon-btn:hover{background:var(--hover)}

  .content{padding:18px 24px 60px;flex:1;overflow:auto}

  /* ───── 그리드 (노션 DB 캘린더 + 트렐로 보드 톤) ───── */
  .grid-wrap{border:1px solid var(--border);border-radius:10px;background:#fff;overflow:auto;max-width:100%}
  table.grid{border-collapse:separate;border-spacing:0;font-size:13px;table-layout:fixed;width:100%}
  table.grid th,table.grid td{border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);padding:0;text-align:center;vertical-align:middle}
  table.grid thead th{background:#fbfaf8;font-weight:600;color:var(--text-soft);font-size:11px;letter-spacing:0.02em;position:sticky;top:0;z-index:2;height:32px;text-transform:uppercase}
  table.grid thead th.weekend{color:#cf4b4b}
  table.grid thead th.sat{color:#3271b6}
  table.grid .col-name{position:sticky;left:0;background:#fff;z-index:3;text-align:left;padding:8px 14px;font-weight:600;width:140px;min-width:140px;border-right:1px solid var(--border)}
  table.grid thead .col-name{background:#fbfaf8;z-index:4;font-weight:600}
  table.grid tbody tr:hover .col-name{background:#faf9f6}
  table.grid td.day{width:46px;height:42px;padding:4px;cursor:pointer;background:#fff;position:relative;user-select:none}
  table.grid td.day:hover{background:#f7f7f5}
  table.grid td.day.weekend{background:#fafaf8;cursor:default}
  table.grid td.day.weekend:hover{background:#fafaf8}
  table.grid td.day.today{background:#fff8e7}
  table.grid td.day.today.weekend{background:#fdf3d8}

  /* 셀 안 칩 (노션 DB 태그 스타일) */
  .chip{
    display:inline-flex;align-items:center;justify-content:center;
    padding:3px 8px;border-radius:5px;
    font-size:11px;font-weight:600;letter-spacing:-0.005em;
    line-height:1.35;white-space:nowrap;
    transition:transform .08s;
  }
  .chip-WORK{background:transparent;color:#a3a29e;font-weight:500}
  .chip-OFF{background:#ebebe9;color:#5b5750}
  .chip-MONTHLY{background:#d3e5ef;color:#0b6e99}
  .chip-ANNUAL{background:#dbe5f8;color:#1d4ed8}
  .chip-HALF_AM,.chip-HALF_PM{background:#fde8c8;color:#a96400}
  .chip-SICK{background:#ffe2dd;color:#b91c1c}
  .chip-HOLIDAY{background:#e8deee;color:#6940a5}
  .chip.is-requested{background:#fff;border:1px dashed #d49426;color:#a96400;padding:2px 7px}
  .chip.is-rejected{text-decoration:line-through;opacity:.55}
  td.day:hover .chip{transform:scale(1.04)}
  td.day.empty:hover::after{
    content:"+";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#c2c0bc;font-size:18px;font-weight:300;
  }

  /* 오늘 표시: 일자 헤더 강조 */
  table.grid thead th.today-h{color:#0f0f0f;font-weight:800;background:#fff8e7}

  /* 본인 행 강조 — 좌측 검정 바 + 살짝 다른 BG */
  table.grid tr.row-self .col-name{box-shadow:inset 3px 0 0 #0f0f0f;background:#fbf9f3}
  table.grid tr.row-self td.day:not(.weekend){background:#fdfcf8}
  table.grid tr.row-self td.day:not(.weekend):hover{background:#f7f4ec}

  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .legend-item{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-soft)}

  /* 헤더 위젯 (오늘 부재 / 본인 사용량) */
  .stat-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .stat-chip{
    display:inline-flex;align-items:center;gap:8px;padding:8px 12px;
    background:#fff;border:1px solid var(--border);border-radius:9px;font-size:12.5px;
    color:var(--text);
  }
  .stat-chip .num{font-weight:700;font-size:14px;color:#0f0f0f}
  .stat-chip.muted{color:var(--text-soft)}
  .stat-chip .stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .stat-chip .stat-dot.dot-annual{background:#1d4ed8}
  .stat-chip .stat-dot.dot-half{background:#d49426}
  .stat-chip .stat-dot.dot-sick{background:#b91c1c}
  .stat-chip .stat-dot.dot-monthly{background:#175594}
  .stat-chip .stat-dot.dot-off{background:#5b5750}
  .out-today{
    background:#fffbf2;border-color:#f6e2b3;color:#7a4f00;
  }
  .out-today .num{color:#7a4f00}

  /* ───── 우측 슬라이드 드로어 (트렐로 카드 상세 + 노션 페이지 톤) ───── */
  .modal-bg{position:fixed;inset:0;background:rgba(15,15,15,.30);z-index:50;animation:fadeIn .15s ease-out}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
  .drawer{
    position:fixed;top:0;right:0;bottom:0;width:440px;max-width:96vw;background:#fff;
    box-shadow:-12px 0 40px rgba(15,15,15,.10),-1px 0 0 var(--border-soft);
    padding:0;display:flex;flex-direction:column;
    animation:slideR .22s cubic-bezier(.2,.7,.2,1);
  }
  .drawer-head{padding:20px 24px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border-soft)}
  .drawer-eyebrow{font-size:11px;color:var(--text-soft);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
  .drawer-title{font-size:18px;font-weight:700;letter-spacing:-0.01em;line-height:1.3}
  .drawer-close{background:transparent;border:none;color:var(--text-soft);font-size:18px;cursor:pointer;padding:6px;border-radius:6px;line-height:1}
  .drawer-close:hover{background:var(--hover);color:var(--text)}
  .drawer-body{padding:18px 24px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:16px}
  .drawer-prop{display:flex;align-items:flex-start;gap:10px;font-size:13px}
  .drawer-prop .key{flex:0 0 84px;color:var(--text-soft);font-weight:500;font-size:12.5px;padding-top:4px}
  .drawer-prop .val{flex:1}
  .drawer-foot{padding:14px 20px;border-top:1px solid var(--border-soft);display:flex;gap:8px;justify-content:flex-end;background:#fafaf8;border-radius:0}

  .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .type-btn{padding:9px 6px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12.5px;font-weight:600;text-align:center;color:var(--text-soft);transition:all .1s}
  .type-btn:hover{background:var(--hover)}
  .type-btn.on{border-color:#0f0f0f;background:#0f0f0f;color:#fff}

  .audit-box{
    padding:12px 14px;border-radius:9px;background:#fafaf8;
    font-size:12px;color:var(--text-soft);line-height:1.6;
    display:flex;flex-direction:column;gap:4px;
  }
  .audit-box .audit-line{display:flex;justify-content:space-between;gap:8px}
  .audit-box .audit-key{color:#9b9a97;font-weight:500}
  .audit-box .audit-val{color:var(--text);font-weight:500}
  .audit-box .audit-val.ok{color:#0f7b6c}
  .audit-box .audit-val.no{color:#b91c1c}

  /* 정통 모달 (반려 사유 등) */
  .modal{background:#fff;border-radius:12px;width:420px;max-width:92vw;padding:22px;box-shadow:0 20px 50px rgba(15,15,15,.18);border:1px solid rgba(15,15,15,.05);position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60}
  .modal h3{margin:0 0 4px;font-size:15px;font-weight:700;letter-spacing:-0.01em}
  .modal .modal-sub{font-size:12.5px;color:var(--text-soft);margin-bottom:14px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}

  .approval-list{display:flex;flex-direction:column;gap:8px}
  .approval-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .approval-info{display:flex;flex-direction:column;gap:2px}
  .approval-info .who{font-weight:700;font-size:14px}
  .approval-info .what{font-size:12.5px;color:var(--text-soft)}
  .approval-actions{display:flex;gap:6px}
  .empty{padding:40px;text-align:center;color:var(--text-soft);font-size:13px}

  /* ───── 직원 디렉토리 (메인 — 직원 중심) ───── */
  .people-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .search-box{flex:1;position:relative;max-width:480px}
  .search-box input{
    width:100%;padding:11px 12px 11px 38px;border:1px solid var(--border);border-radius:10px;
    background:#fff;font-size:14px;outline:none;transition:border-color .12s,box-shadow .12s;
  }
  .search-box input:focus{border-color:#0f0f0f;box-shadow:0 0 0 3px rgba(15,15,15,.06)}
  .search-box::before{
    content:"";position:absolute;left:13px;top:50%;width:14px;height:14px;
    transform:translateY(-50%);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239b9a97' stroke-width='2.2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>");
    background-size:contain;background-repeat:no-repeat;
  }
  .view-toggle{display:flex;gap:2px;background:#f1f1ef;padding:3px;border-radius:8px}
  .view-toggle button{padding:6px 12px;border:none;background:transparent;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--text-soft);cursor:pointer}
  .view-toggle button.on{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(15,15,15,.06)}

  .people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .person-card{
    padding:16px;border:1px solid var(--border);border-radius:12px;background:#fff;
    cursor:pointer;transition:transform .1s,box-shadow .1s,border-color .1s;
    display:flex;flex-direction:column;gap:10px;
  }
  .person-card:hover{transform:translateY(-2px);border-color:#d8d8d4;box-shadow:0 6px 16px rgba(15,15,15,.06)}
  .person-head{display:flex;align-items:center;gap:10px}
  .avatar{
    width:38px;height:38px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;color:#fff;letter-spacing:0.01em;
  }
  .person-name{font-weight:700;font-size:14.5px;letter-spacing:-0.005em}
  .person-meta{font-size:11.5px;color:var(--text-soft);margin-top:1px;display:flex;align-items:center;gap:6px}
  .person-meta .dot{width:6px;height:6px;border-radius:50%;background:var(--gray)}
  .person-meta .dot.on{background:#4caf50}
  .person-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:2px}
  .person-stat{padding:6px 8px;background:#fafaf8;border-radius:7px;text-align:center}
  .person-stat .lbl{font-size:10px;color:var(--text-soft);font-weight:500;letter-spacing:0.02em}
  .person-stat .val{font-size:14px;font-weight:700;color:var(--text);margin-top:1px}
  .person-today{font-size:11.5px;font-weight:600;padding:4px 8px;border-radius:5px;display:inline-flex;align-items:center;gap:5px;width:fit-content}
  .person-today.t-WORK{background:#f0f9f0;color:#0f7b6c}
  .person-today.t-OFF{background:#ebebe9;color:#5b5750}
  .person-today.t-MONTHLY{background:#d3e5ef;color:#0b6e99}
  .person-today.t-ANNUAL{background:#dbe5f8;color:#1d4ed8}
  .person-today.t-HALF_AM,.person-today.t-HALF_PM{background:#fde8c8;color:#a96400}
  .person-today.t-SICK{background:#ffe2dd;color:#b91c1c}

  /* ───── 직원 상세 (프로필 페이지) ───── */
  .person-detail{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:flex-start}
  .pd-side{position:sticky;top:14px}
  .pd-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px}
  .pd-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;color:#fff;margin-bottom:14px}
  .pd-name{font-size:20px;font-weight:700;letter-spacing:-0.01em}
  .pd-role{font-size:12.5px;color:var(--text-soft);margin-top:2px}
  .pd-props{margin-top:16px;border-top:1px solid var(--border-soft);padding-top:14px;display:flex;flex-direction:column;gap:10px}
  .pd-prop{display:flex;justify-content:space-between;font-size:12.5px}
  .pd-prop .k{color:var(--text-soft)}
  .pd-prop .v{font-weight:600}
  .pd-section{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
  .pd-section h3{margin:0 0 14px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;letter-spacing:-0.005em}
  .pd-stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .pd-stat{padding:14px;background:#fafaf8;border-radius:10px;text-align:center}
  .pd-stat .v{font-size:22px;font-weight:700;color:var(--text)}
  .pd-stat .l{font-size:11.5px;color:var(--text-soft);font-weight:500;margin-top:2px;letter-spacing:0.02em}
  .pd-mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

// 이름 → HSL 색상 (아바타 일관성)
function nameColor(name){
  let h=0; for(const ch of name) h=(h*31+ch.charCodeAt(0))%360;
  return `hsl(${h}, 38%, 52%)`;
}
function initial(name){ return (name||'?').slice(0,1); }

const $ = (sel,el=document)=>el.querySelector(sel);
const h = (tag,attrs,...children)=>{
  attrs = attrs || {};
  const el=document.createElement(tag);
  for(const k in attrs){
    if(k==='class') el.className=attrs[k];
    else if(k==='style') el.style.cssText=attrs[k];
    else if(k.startsWith('on')&&typeof attrs[k]==='function') el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(attrs[k]===false||attrs[k]==null) {}
    else el.setAttribute(k,attrs[k]);
  }
  for(const c of children.flat()){
    if(c==null||c===false) continue;
    el.append(c.nodeType?c:document.createTextNode(String(c)));
  }
  return el;
};
const fmtYm=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

};

const REQUESTABLE_T1=['OFF','UNAUTHORIZED'];
const REQUESTABLE_T2=['OFF','HALF_AM','HALF_PM','MONTHLY','ANNUAL','SICK'];
function requestableTypesFor(u){
  const t=Number(u?.tier);

// 종소리 알람 — Web Audio API로 짧은 종소리 합성 (외부 자원 불필요)
function playBell(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = new Ctx();
    const now = ctx.currentTime;
    // 메인 톤 + 하모닉 — 종소리 느낌
    [[880, 1.2], [1318, 0.6], [2637, 0.4]].forEach(([freq, dur])=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + dur);
    });
    // 약한 두 번째 비트
    setTimeout(()=>{
      try{
        const c2 = new Ctx();
        const t2 = c2.currentTime;
        [[700, 0.8], [1050, 0.5]].forEach(([f,d])=>{
          const o=c2.createOscillator(), g=c2.createGain();
          o.type='sine'; o.frequency.value=f;
          g.gain.setValueAtTime(0.14, t2); g.gain.exponentialRampToValueAtTime(0.0001, t2+d);
          o.connect(g); g.connect(c2.destination); o.start(t2); o.stop(t2+d);
        });
      }catch(_){}
    }, 320);
  }catch(_){}
}

function tomorrowYmdStr(){

  return fmtYmd(d.getFullYear(),d.getMonth()+1,d.getDate());

function tomorrowOffUsers(){
  const tmr=tomorrowYmdStr();
  const offTypes=new Set(['OFF','HALF_AM','HALF_PM','MONTHLY','ANNUAL','SICK','UNAUTHORIZED']);
  const map={};
  (State.records||[]).forEach(r=>{
    if(String(r.work_date).slice(0,10)===tmr && offTypes.has(r.type)){
      map[r.user_id]=r;
    }

  return (State.users||[]).filter(u=>map[u.id]).map(u=>({user:u,record:map[u.id]}));
}
function maybeRingBell(){

  const offs = tomorrowOffUsers();

async function api(path, opts){
  opts = opts || {};
  const r=await fetch(path,{
    method:opts.method||'GET',
    headers:opts.body?{'Content-Type':'application/json'}:{},
    body:opts.body?JSON.stringify(opts.body):undefined,
    credentials:'same-origin',
  });
  let data={};
  try{ data=await r.json(); }catch(_){}
  if(!r.ok) throw new Error(data.error||`HTTP ${r.status}`);
  return data;
}

async function bootstrap(){
  try{
    const ym=todayYm();
    // 백그라운드: Node 런타임 엔드포인트 1회 호출로 ensureSchema(스키마 마이그레이션) 보장
    // me/login은 Edge라 ensureSchema 호출 못 함 — signup 핸들러가 첫 줄에서 ensureSchema 실행
    fetch('/api/auth/signup',{method:'POST',headers:{'content-type':'application/json'},body:'{}'}).catch(()=>{});
    // 부트스트랩 1회 호출 = me + (로그인 시) att/list 동등 데이터까지 한 라운드트립에
    const me=await api(`/api/auth/me?bootstrap=1&ym=${ym}`);
    State.user=me.user;
    State.availableNames=me.availableNames||[];
    State.presetNames=me.presetNames||[];
    if(State.user){
      State.ym=ym;
      if(me.bootstrap){
        State.users=me.bootstrap.users||[];
        State.records=me.bootstrap.records||[];
        if(me.bootstrap.salesVendors){
          State.salesVendors=me.bootstrap.salesVendors;
          State.salesVendorsLoaded=true;
        }
        if(me.bootstrap.salesOrders){
          State.salesOrders=me.bootstrap.salesOrders;
          State.salesOrdersLoadedYm=ym;
          State.salesYm=ym;
        }
      }
      renderApp();   // 풀데이터 즉시 렌더
      loadMyTmToday().then(()=>{ if(State.user) renderApp(); }).catch(()=>{});
      // 내부 페이지 백그라운드 프리로드 — 클릭 시 로딩 표시 없이 즉시 표시
      preloadSalesPages();
    }else{
      renderAuth();
    }
  }catch(e){
    console.error(e);
    renderAuth();
  }
}

function loginForm(){
  const wrap=h('div');
  const nameI=h('input',{type:'text',autocomplete:'username',placeholder:'이름'});
  const pwI=h('input',{type:'password',autocomplete:'current-password',placeholder:'비밀번호'});
  const msg=h('div',{class:'auth-msg'});
  const btn=h('button',{class:'btn btn-primary btn-block'},'로그인');
  let busy=false;
  const submit=async()=>{
    if(busy) return;
    busy=true; btn.textContent='로그인 중…'; btn.style.opacity='.7'; btn.disabled=true;
    msg.textContent='';
    try{
      const ym=todayYm();
      const r=await api('/api/auth/login',{method:'POST',body:{name:nameI.value.trim(),password:pwI.value,ym}});
      State.user=r.user;
      State.ym=ym;
      if(r.bootstrap){
        State.users=r.bootstrap.users||[];
        State.records=r.bootstrap.records||[];
        if(r.bootstrap.salesVendors){
          State.salesVendors=r.bootstrap.salesVendors;
          State.salesVendorsLoaded=true;
        }
        if(r.bootstrap.salesOrders){
          State.salesOrders=r.bootstrap.salesOrders;
          State.salesOrdersLoadedYm=ym;
          State.salesYm=ym;
        }
      }
      renderApp();   // 풀데이터 즉시 렌더 (추가 라운드트립 없음)
      loadMyTmToday().then(()=>{ if(State.user) renderApp(); }).catch(()=>{});
      preloadSalesPages();
    }catch(e){
      msg.textContent=e.message;
      busy=false; btn.textContent='로그인'; btn.style.opacity='1'; btn.disabled=false;
    }
  };
  btn.addEventListener('click',submit);
  pwI.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  nameI.addEventListener('keydown',e=>{ if(e.key==='Enter') pwI.focus(); });
  wrap.append(
    h('div',{class:'field'},nameI),
    h('div',{class:'field'},pwI),
    msg,
    btn
  );
  setTimeout(()=>{ try{ nameI.focus(); }catch(_){}; },20);
  return wrap;
}

function signupForm(){
  const wrap=h('div');
  const tierSel=h('select',null,
    h('option',{value:''},'— 분류 선택 —'),
    h('option',{value:'1'},'1차직원'),
    h('option',{value:'2'},'2차직원'),
  );
  const nameI=h('input',{type:'text',autocomplete:'username',placeholder:'이름'});
  const pwI=h('input',{type:'password',autocomplete:'new-password',placeholder:'비밀번호 (4자 이상)'});
  const pw2I=h('input',{type:'password',autocomplete:'new-password',placeholder:'비밀번호 확인'});
  const msg=h('div',{class:'auth-msg'});
  const submit=async()=>{
    msg.textContent='';
    if(!tierSel.value){ msg.textContent='1차/2차 직원 분류를 선택하세요'; return; }
    const nm=nameI.value.trim();
    if(!nm){ msg.textContent='이름을 입력하세요'; return; }
    if(pwI.value.length<4){ msg.textContent='비밀번호 4자 이상'; return; }
    if(pwI.value!==pw2I.value){ msg.textContent='비밀번호 확인이 일치하지 않습니다'; return; }
    try{
      const r=await api('/api/auth/signup',{method:'POST',body:{name:nm,password:pwI.value,tier:Number(tierSel.value)}});
      // 즉시 로그인 안 됨 — 관리자 승인 대기
      msg.style.color='var(--green,#0f7b6c)';
      msg.textContent = r.message || '가입 신청 완료. 관리자 승인 후 로그인할 수 있습니다.';
      nameI.value=''; pwI.value=''; pw2I.value=''; tierSel.value='';
    }catch(e){
      msg.style.color='';
      msg.textContent=e.message;
    }
  };
  wrap.append(
    h('div',{class:'field'},tierSel),
    h('div',{class:'field'},nameI),
    h('div',{class:'field'},pwI),
    h('div',{class:'field'},pw2I),
    msg,
    h('button',{class:'btn btn-primary btn-block',onClick:submit},'가입 신청')
  );
  return wrap;
}

function renderMyHome(){
  const me=State.user;
  const isTier1 = Number(me.tier)===1;
  // self를 selectedPersonId로 설정해두고 person detail 재활용 (단, 좌측 프로필+뒤로가기 제거된 형태)
  const u={id:me.id,name:me.name,role:me.role,tier:me.tier,registered:true};
  const recs=State.records;  // API가 본인 것만 반환
  const cnt={ANNUAL:0,MONTHLY:0,HALF:0,SICK:0,OFF:0,UNAUTHORIZED:0};
  recs.forEach(r=>{
    if(r.status!=='APPROVED') return;
    if(r.type==='ANNUAL') cnt.ANNUAL++;
    else if(r.type==='MONTHLY') cnt.MONTHLY++;
    else if(r.type==='HALF_AM'||r.type==='HALF_PM') cnt.HALF++;
    else if(r.type==='SICK') cnt.SICK++;
    else if(r.type==='OFF') cnt.OFF++;
    else if(r.type==='UNAUTHORIZED') cnt.UNAUTHORIZED++;
  });
  const wait=recs.filter(r=>r.status==='REQUESTED').length;

  // 분류별 사용 현황 — 1차직원: 휴무/무단결근만, 2차직원: 연차/월차/반차/병가/휴무
  const statCells = isTier1
    ? [
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.OFF), h('div',{class:'l'},'휴무')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.UNAUTHORIZED), h('div',{class:'l'},'무단결근')),
      ]
    : [
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.ANNUAL), h('div',{class:'l'},'연차')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.MONTHLY), h('div',{class:'l'},'월차')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.HALF), h('div',{class:'l'},'반차')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.SICK), h('div',{class:'l'},'병가')),
        h('div',{class:'pd-stat'}, h('div',{class:'v'},cnt.OFF), h('div',{class:'l'},'휴무')),
      ];

  const stats=h('section',{class:'pd-section'},
    h('h3',null,'📊 ',`${State.ym} 사용 현황`,
      wait?h('span',{style:'margin-left:8px;font-size:11.5px;font-weight:600;color:#a96400;background:#fff5d9;padding:2px 8px;border-radius:5px'},`승인 대기 ${wait}건`):null),
    h('div',{class:'pd-stat-row'}, ...statCells)
  );

  // 큰 캘린더 (본인 단독)
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const firstDow=new Date(y,m-1,1).getDay();
  const recIdx={};
  recs.forEach(r=>{ recIdx[String(r.work_date).slice(0,10)]=r; });
  const todayYmd=fmtYmd(new Date().getFullYear(),new Date().getMonth()+1,new Date().getDate());
  const cal=h('div',{class:'pd-mini-cal',style:'gap:6px'});
  ['일','월','화','수','목','금','토'].forEach(d=>cal.append(h('div',{class:'pmh',style:'font-size:11.5px;padding:6px 0'},d)));
  for(let i=0;i<firstDow;i++) cal.append(h('div',{class:'pmd empty'}));
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ymd=fmtYmd(y,m,d);
    const rec=recIdx[ymd];
    const cls=['pmd'];
    if(dow===0||dow===6) cls.push('weekend');
    if(ymd===todayYmd) cls.push('today');
    let inner=[h('div',{style:'font-size:13px;font-weight:600'}, d)];
    if(rec){
      const cc=['chip',`chip-${rec.type}`];
      if(rec.status==='REQUESTED') cc.push('is-requested');
      if(rec.status==='REJECTED') cc.push('is-rejected');
      inner.push(h('span',{class:cc.join(' '),style:'font-size:10.5px;padding:2px 6px;margin-top:3px'}, TYPE_TINY[rec.type]||''));
    }
    cal.append(h('div',{class:cls.join(' '),style:'min-height:60px;padding:6px',
      onClick:(dow===0||dow===6)?null:()=>openCellDrawer(u,ymd,rec)
    }, ...inner));
  }

  const calSection=h('section',{class:'pd-section'},
    h('h3',null,'🗓 캘린더',h('span',{style:'color:var(--text-soft);font-weight:500;font-size:11.5px;margin-left:8px'},'· 빈 칸 클릭으로 신청')),
    cal
  );

  // 영업 마감 입력은 별도 탭(내 마감)에서. 여기는 근태(휴가)만.
  return h('div',null, stats, calSection);
}

    onChange:e=>{filter.type=e.target.value;paint();}}, ...typeOpts.map(([v,l])=>h('option',{value:v},l)));
  const statusOpts=[['ALL','전체상태'],['APPROVED','승인'],['REQUESTED','대기'],['REJECTED','반려']];
  const statusSel=h('select',{style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:e=>{filter.status=e.target.value;paint();}}, ...statusOpts.map(([v,l])=>h('option',{value:v},l)));
  const fromI=h('input',{type:'date',style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px',
    onChange:e=>{filter.from=e.target.value;paint();}});
  const toI=h('input',{type:'date',style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12.5px',

// ─── 직원 '내 마감' 페이지 (요청 2 — 일단위 입력 → 자동 월 누적) ───
async function loadMyClosing(force){
  const ym = State.salesYm || todayYm();
  State.salesYm = ym;
  if (!force && State.myClosingLoadedYm === ym) return;
  try{
    const cutoff = new Date().toISOString().slice(0,10);
    const [r1, r2] = await Promise.all([
      api(`/api/sales/tm-daily?ym=${ym}`),    // 본인 일별 행 (오늘 채우기/수정)
      api(`/api/sales/tm-summary?ym=${ym}&cutoff=${cutoff}`),  // 12명 + 본인 누적·휴무
    ]);
    State.myClosingRows = r1.rows || [];
    State.salesPeriod = r2.period;
    State.salesTmElapsed = r2.elapsedWorkdays || 0;
    State.salesTmRemaining = r2.remainingWorkdays || 0;
    State.salesTmTotal = r2.totalWorkdays || 0;
    const mySummary = (r2.rows||[]).find(r=>r.user_id===State.user.id) || { off_days:0, total_count:0, total_db:0 };
    State.myAutoOffDays = Number(mySummary.off_days||0);
    State.myMonthSum = { total_count: Number(mySummary.total_count||0), total_db: Number(mySummary.total_db||0) };
    State.myClosingLoadedYm = ym;
  }catch(e){ console.error(e); }
}

async function loadMyClosingRange(from, to){
  try{
    const r = await api(`/api/sales/tm-daily?from=${from}&to=${to}`);
    State.myClosingRowsRange = r.rows || [];
  }catch(e){
    State.myClosingRowsRange = [];
    showToast(e.message);
  }
}

function renderMyClosing(){
  const me = State.user;
  // 날짜 범위 — 빠른 선택
  const range = State.myClosingRange || 'thisMonth';
  const today = new Date();
  const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let from, to, rangeLabel;
  if (range==='today')       { from=fmt(today); to=fmt(today); rangeLabel='오늘'; }
  else if (range==='yesterday'){ const y=new Date(today); y.setDate(y.getDate()-1); from=fmt(y); to=fmt(y); rangeLabel='어제'; }
  else if (range==='thisMonth'){ from=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`; to=fmt(today); rangeLabel='당월'; }
  else if (range==='prevMonth'){ const pm=new Date(today.getFullYear(),today.getMonth()-1,1); const last=new Date(today.getFullYear(),today.getMonth(),0); from=fmt(pm); to=fmt(last); rangeLabel='전월'; }
  else if (range==='3months') { const tm=new Date(today); tm.setMonth(tm.getMonth()-3); from=fmt(tm); to=fmt(today); rangeLabel='최근 3개월'; }
  else                        { from='2020-01-01'; to=fmt(today); rangeLabel='전체'; }

  // 캐시 무효화 — 범위 바뀌면 다시 로드
  const cacheKey = `${from}~${to}`;
  if (State.myClosingRangeKey !== cacheKey){
    State.myClosingRangeKey = cacheKey;
    State.myClosingRowsRange = null;
    loadMyClosingRange(from,to).then(()=>renderApp());
    return h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'), h('div',null,'마감 결과 로딩 중…'));
  }
  const rows = State.myClosingRowsRange || [];

  // 본인 행만 (서버에서 이미 본인 것만 옴 — 직원 권한이라)
  const myRows = rows.filter(r=>r.user_id===me.id);

  // 통계
  let totalCount=0, totalDb=0, offDays=0;
  myRows.forEach(r=>{
    totalCount += Number(r.count||0);
    totalDb    += Number(r.db_count||0);
    if (r.is_off) offDays++;
  });
  const daysWithData = myRows.length;
  const workedDays = daysWithData - offDays;
  const dayAvg = workedDays>0 ? totalCount/workedDays : 0;
  const eff = totalDb>0 ? totalCount/totalDb : 0;

  // 빠른 범위 버튼
  function qBtn(label, key){
    const active = range===key;
    const btn = h('button',{class:'btn'+(active?' btn-primary':''), style:'padding:6px 12px;font-size:12px'}, label);
    btn.addEventListener('click', ()=>{
      State.myClosingRange = key;
      renderApp();
    });
    return btn;
  }
  const quickBar = h('div',{class:'sales-toolbar',style:'gap:6px;flex-wrap:wrap'},
    h('span',{class:'label'},'기간'),
    qBtn('오늘','today'),
    qBtn('어제','yesterday'),
    qBtn('당월','thisMonth'),
    qBtn('전월','prevMonth'),
    qBtn('3개월치','3months'),
    qBtn('전체','all'),
    h('span',{style:'margin-left:auto;color:var(--text-soft);font-size:12px'},
      `${rangeLabel} · ${from} ~ ${to}`)
  );

  // 통계 카드
  const fmtNum=(n,p=0)=>(Number(n||0)).toLocaleString('ko-KR',{maximumFractionDigits:p});
  const fmtPct=(n)=>((n||0)*100).toFixed(1)+'%';
  const statCard=(label,val,bg)=>h('div',{
    style:`padding:18px;background:${bg||'#fff'};border:1px solid var(--border);border-radius:11px;display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px`
  },
    h('div',{style:'font-size:11px;color:var(--text-soft);font-weight:700;letter-spacing:0.04em;text-transform:uppercase'}, label),
    h('div',{style:'font-size:26px;font-weight:800;font-variant-numeric:tabular-nums'}, val)
  );
  const statsRow = h('div',{style:'display:flex;gap:12px;padding:14px 24px 0;flex-wrap:wrap'},
    statCard('총 마감 (건)', fmtNum(totalCount), '#fffaf0'),
    statCard('총 디비 (건)', fmtNum(totalDb), '#fffaf0'),
    statCard('일평균 마감', fmtNum(dayAvg,1), '#eef2ff'),
    statCard('효율', totalDb>0?fmtPct(eff):'—', '#dcfce7'),
    statCard('근무 / 휴무', `${workedDays}일 / ${offDays}일`, '#fff'),
  );

  // 일별 표 (최신순)
  const tbody=h('tbody');
  if (!myRows.length){
    tbody.append(h('tr',null,
      h('td',{colspan:5,style:'padding:40px;text-align:center;color:var(--text-soft)'},
        '해당 기간 마감 기록이 없습니다 — 대표/관리자 입력 대기 중')));
  } else {
    myRows.slice().sort((a,b)=>String(b.work_date).localeCompare(String(a.work_date))).forEach(r=>{
      const d = String(r.work_date).slice(0,10);
      const dow = ['일','월','화','수','목','금','토'][new Date(d+'T00:00:00').getDay()];
      const rEff = r.db_count>0 ? r.count/r.db_count : 0;
      tbody.append(h('tr',null,
        h('td',{style:'padding:11px 14px;font-variant-numeric:tabular-nums'},`${d} (${dow})`),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700'}, fmtNum(r.count)),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700'}, fmtNum(r.db_count)),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums'}, r.db_count>0?fmtPct(rEff):'—'),
        h('td',{style:'padding:11px 14px;text-align:center;color:var(--text-soft);font-size:12px'}, r.is_off?'휴무':'—'),
      ));
    });
  }
  const table = h('table',{class:'tm-table',style:'width:100%'},
    h('thead',null, h('tr',null,
      h('th',{style:'text-align:left'},'일자'),
      h('th',{style:'text-align:right'},'마감 (건)'),
      h('th',{style:'text-align:right'},'디비 (건)'),
      h('th',{style:'text-align:right'},'효율'),
      h('th',null,'비고'),
    )),
    tbody
  );

  const note = h('div',{style:'padding:10px 24px 0;color:var(--text-soft);font-size:11.5px'},
    '※ 대표/관리자가 입력한 본인 마감 결과만 표시됩니다 — 본 페이지에서는 수정할 수 없습니다.');

  return h('div',null, quickBar, statsRow, note, h('div',{style:'padding:14px 24px 40px'}, table));
}

// (구) renderMyClosing 입력 패널 — 사용 안 함 (위 함수로 대체됨, 결과만 표시)

function __removed_legacy(){
  const me = State.user;
  if (false) {
  const ym = State.salesYm || todayYm();
  const period = State.salesPeriod || {};
  const elapsed = State.salesTmElapsed || 0;
  const total   = State.salesTmTotal   || 0;
  const remaining = State.salesTmRemaining || 0;
  const unitPrice = Number(period.unit_price || 0);

  // 일자 picker (기본 오늘) + 본인 그날 행
  const todayYmd = new Date().toISOString().slice(0,10);
  if (!State.myDay || String(State.myDay).slice(0,7) !== ym) State.myDay = todayYmd;
  const sel = State.myDay;
  const dayRow = (State.myClosingRows||[]).find(r=>String(r.work_date).slice(0,10)===sel)
    || { count:0, db_count:0, is_off:false };

  // 누적 (서버 SUM) — 본인 월 총갯수/총디비
  const monthSum = State.myMonthSum || { total_count:0, total_db:0 };
  const autoOffDays = Number(State.myAutoOffDays||0);

  // 낙관적 누적 미리보기 (선택일자 입력 변화량 반영)
  function previewSums(){
    const baseCount = monthSum.total_count - (dayRow.count||0);
    const baseDb    = monthSum.total_db    - (dayRow.db_count||0);
    return {
      total_count: baseCount + (Number(cntI.value)||0),
      total_db:    baseDb    + (Number(dbI.value)||0),
    };
  }

  // 함수식 (월 누적 기반 — 휴무는 attendance 자동)
  const compute = (totalCount, totalDb) => {
    const denom = Math.max(0.0001, elapsed - autoOffDays);
    const dayAvg = elapsed>0 ? totalCount/denom : 0;
    const dbAvg  = elapsed>0 ? totalDb/denom : 0;
    const eff    = totalDb>0 ? totalCount/totalDb : 0;
    const projected = dayAvg * Math.max(0, total - autoOffDays);
    return { dayAvg, dbAvg, eff, projected };
  };

  // 툴바: 월 + 일자 picker (일단위 입력)
  const ymI = h('input',{type:'month',value:ym});
  ymI.addEventListener('change', async()=>{
    State.salesYm = ymI.value || todayYm();
    State.myClosingLoadedYm = null; State.myDay = null;
    State.loadingPage='my-closing'; renderApp();
    await loadMyClosing(true);
    State.loadingPage=null; renderApp();
  });
  const dateI = h('input',{type:'date',value:sel,min:ym+'-01',max:todayYmd});
  dateI.addEventListener('change',()=>{ State.myDay = dateI.value; renderApp(); });
  const dowKr = ['일','월','화','수','목','금','토'][new Date(sel+'T00:00:00').getDay()];
  const isToday = (sel === todayYmd);

  const toolbar = h('div',{class:'sales-toolbar'},
    h('span',{class:'label'},'월'), ymI,
    h('span',{class:'label',style:'margin-left:14px'},'일자'), dateI,
    h('span',{style:'font-size:11.5px;color:var(--text-soft);margin-left:6px'}, '('+dowKr+')',
      isToday?h('span',{style:'margin-left:4px;color:#0f7b6c;font-weight:700'},'· 오늘'):null),
    h('div',{style:'margin-left:auto;color:var(--text-soft);font-size:12px'},
      `실 근무일 ${elapsed} · 남은 ${remaining} · 총 ${total}일`)
  );

  // 입력 = 선택된 일자(기본 오늘) 그날 마감/디비
  const cntI   = h('input',{type:'number',min:0,value:dayRow.count||0,
    style:'width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:10px;font-size:26px;font-weight:800;text-align:center;outline:none;font-variant-numeric:tabular-nums'});
  const dbI    = h('input',{type:'number',min:0,value:dayRow.db_count||0,
    style:'width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:10px;font-size:26px;font-weight:800;text-align:center;outline:none;font-variant-numeric:tabular-nums'});

  // 자동 계산 표시 영역 (입력 변할 때마다 갱신)
  const dayAvgEl   = h('div',{style:'font-size:24px;font-weight:800'},'');
  const projectedEl = h('div',{style:'font-size:24px;font-weight:800;color:#1d4ed8'},'');
  const dbAvgEl    = h('div',{style:'font-size:24px;font-weight:800'},'');
  const effEl      = h('div',{style:'font-size:28px;font-weight:800'},'');
  // 표 셀에 들어갈 총갯수/총디비 미러 (입력값 그대로 표시)
  const tcEl = h('div',null,'');
  const tdEl = h('div',null,'');

  const fmtNum=(n,d=0)=>(Number(n||0)).toLocaleString('ko-KR',{maximumFractionDigits:d});
  const fmtPct=(n)=>((n||0)*100).toFixed(1)+'%';

  // 누적값(서버 SUM 반영) + 입력 즉시 함수 갱신
  function repaint(){
    const s = previewSums();
    tcEl.textContent = fmtNum(s.total_count);
    tdEl.textContent = fmtNum(s.total_db);
    const c = compute(s.total_count, s.total_db);
    dayAvgEl.textContent    = s.total_count>0 ? c.dayAvg.toFixed(1) : '0.0';
    projectedEl.textContent = fmtNum(Math.round(c.projected));
    dbAvgEl.textContent     = fmtNum(Math.round(c.dbAvg));
    const e = c.eff;
    effEl.textContent = s.total_db>0 ? Math.round(e*100)+'%' : '—';
    effEl.style.color = e>=0.20?'#0f7b6c':e>=0.15?'#1d4ed8':e>=0.10?'#a96400':'#b91c1c';
  }
  repaint();

  // 저장 (디바운스 — 선택일자 행 sales_tm_daily upsert)
  let saveT;
  const flag = h('span',{style:'margin-left:8px;font-size:12px;color:#0f7b6c;opacity:0;transition:opacity .2s'},'✓ 저장됨');

    const newDb    = Number(dbI.value)||0;
    try{
      await api('/api/sales/tm-daily',{method:'POST',body:{
        user_id: me.id, work_date: sel,
        count: newCount, db_count: newDb,
      }});
      flag.style.opacity='1'; setTimeout(()=>{ flag.style.opacity='0'; }, 1200);
      // 캐시 행 갱신 + 누적 SUM 낙관적 갱신
      const idx = (State.myClosingRows||[]).findIndex(r=>String(r.work_date).slice(0,10)===sel);
      const obj = { user_id:me.id, work_date:sel, count:newCount, db_count:newDb, is_off:false };
      if (idx>=0) State.myClosingRows[idx] = obj; else (State.myClosingRows = State.myClosingRows||[]).push(obj);
      const newSums = previewSums();
      State.myMonthSum = newSums;
      dayRow.count = newCount; dayRow.db_count = newDb;
      // admin TM 마감 캐시 무효화 → 즉시 반영
      State.salesTmLoadedKey = null;
    }catch(e){ alert(e.message); }
  };
  function onChange(){
    repaint();
    clearTimeout(saveT);
    saveT = setTimeout(save, 400);

    h('div',{style:'font-size:11.5px;color:var(--text-soft)'}, '그날 마감/디비 입력 → 월 누적 자동 합산 → 함수/관리자 결과표 즉시 반영'),
