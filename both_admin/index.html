// 헤더 위젯 (오늘 부재 / 본인 사용량) ─────────────────
function renderStatChips(){
  const wrap=h('div',{class:'stat-row'});
  const today=new Date();
  const todayYmd=fmtYmd(today.getFullYear(),today.getMonth()+1,today.getDate());

  // 오늘 부재중 (APPROVED 인 OFF/MONTHLY/ANNUAL/SICK/HOLIDAY/HALF_AM/HALF_PM)
  const outToday=State.records.filter(r=>{
    const d=String(r.work_date).slice(0,10);
    return d===todayYmd && r.status==='APPROVED' && r.type!=='WORK';
  });
  const userMap={}; State.users.forEach(u=>userMap[u.id]=u);
  const outNames=outToday.map(r=>{
    const n=userMap[r.user_id]?.name||'?';
    return `${n}(${TYPE_LABELS[r.type]})`;
  }).join(', ');
  wrap.append(h('div',{
    class:'stat-chip out-today',
    title:outNames||'결근/휴가 없음',
  }, '오늘 부재 ', h('span',{class:'num'}, outToday.length), '명',
     outNames?h('span',{style:'color:#9a7600;margin-left:6px'},'· '+outNames):null));

  // 본인 이번달 사용량 (APPROVED만) — 1차직원: 휴무/무단결근, 2차직원: 연차/월차/반차/병가/휴무
  const me=State.user;
  if(me.role!=='admin'){
    const mine=State.records.filter(r=>r.user_id===me.id && r.status==='APPROVED');
    const cnt={ANNUAL:0,MONTHLY:0,HALF_AM:0,HALF_PM:0,SICK:0,OFF:0,UNAUTHORIZED:0};
    mine.forEach(r=>{ if(cnt[r.type]!=null) cnt[r.type]++; });
    if (Number(me.tier)===1){
      wrap.append(
        h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-off'}),' 휴무 ',h('span',{class:'num'},cnt.OFF)),
        h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-sick'}),' 무단결근 ',h('span',{class:'num'},cnt.UNAUTHORIZED)),
      );
    } else {
      const halfTotal=cnt.HALF_AM+cnt.HALF_PM;
      wrap.append(
        h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-annual'}),' 연차 ',h('span',{class:'num'},cnt.ANNUAL)),
        h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-monthly'}),' 월차 ',h('span',{class:'num'},cnt.MONTHLY)),
        h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-half'}),' 반차 ',h('span',{class:'num'},halfTotal)),
        h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-sick'}),' 병가 ',h('span',{class:'num'},cnt.SICK)),
        h('div',{class:'stat-chip'}, h('span',{class:'stat-dot dot-off'}),' 휴무 ',h('span',{class:'num'},cnt.OFF)),
      );
    }
  }

  // 승인 대기
  const isPriv=me.role==='admin'||me.role==='manager';
  const waiting=State.records.filter(r=>r.status==='REQUESTED');
  if(waiting.length){
    wrap.append(h('div',{
      class:'stat-chip',style:'background:#fff7ec;border-color:#f4d99c;color:#7a4f00;cursor:pointer',
      onClick:()=>{ if(isPriv){ State.page='approval'; renderApp(); }}
    },'승인 대기 ', h('span',{class:'num',style:'color:#7a4f00'}, waiting.length),'건',
       isPriv?h('span',{style:'margin-left:6px;font-size:11px'},'· 클릭'):null));
  }

  return wrap;
}

function renderGrid(){
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const today=new Date();
  const todayYmd=fmtYmd(today.getFullYear(),today.getMonth()+1,today.getDate());

  const recIdx={};
  for(const r of State.records){
    const dateStr=String(r.work_date).slice(0,10);
    recIdx[`${r.user_id}|${dateStr}`]=r;
  }

  const headRow=[h('th',{class:'col-name'},'이름')];
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ymd=fmtYmd(y,m,d);
    const cls=[];
    if(dow===0) cls.push('weekend');
    if(dow===6) cls.push('sat');
    if(ymd===todayYmd) cls.push('today-h');
    const labels=['일','월','화','수','목','금','토'];
    headRow.push(h('th',{class:cls.join(' ')},
      h('div',{style:'font-size:13px;font-weight:700;color:'+(ymd===todayYmd?'#0f0f0f':'inherit')}, d),
      h('div',{style:'font-size:9.5px;font-weight:500;opacity:.7'}, labels[dow])
    ));
  }

  const tbody=h('tbody');
  for(const u of State.users){
    const isSelf=u.id===State.user.id;
    const tr=h('tr',{class:isSelf?'row-self':''});
    tr.append(h('td',{class:'col-name'},
      h('div',{style:'display:flex;align-items:center;gap:8px;cursor:pointer',
        onClick:()=>{State.selectedPersonId=u.id; renderApp();}},
        h('span',{class:'avatar',style:`width:24px;height:24px;font-size:11px;background:${nameColor(u.name)}`}, initial(u.name)),
        h('span',{style:'font-weight:600'}, u.name),
        u.role==='manager'?h('span',{class:'role-badge role-manager',style:'margin-left:auto'},'차장'):null
      )
    ));
    for(let d=1;d<=dim;d++){
      const dow=new Date(y,m-1,d).getDay();
      const isWeekend=(dow===0||dow===6);
      const ymd=fmtYmd(y,m,d);
      const rec=recIdx[`${u.id}|${ymd}`];
      const cls=['day'];
      if(isWeekend) cls.push('weekend');
      if(ymd===todayYmd) cls.push('today');
      // 비어있는 날(주말 아님) = 정상출근 디폴트 표시
      let inner=null;
      if(rec){
        const chipCls=['chip', `chip-${rec.type}`];
        if(rec.status==='REQUESTED') chipCls.push('is-requested');
        if(rec.status==='REJECTED') chipCls.push('is-rejected');
        inner=h('span',{class:chipCls.join(' ')}, TYPE_TINY[rec.type]||'');
      } else if (!isWeekend) {
        // 신청 없음 + 평일 → 정상출근 디폴트
        inner=h('span',{class:'chip chip-WORK',style:'font-size:11px;opacity:.7'}, '정상');
      } else {
        cls.push('empty');
      }
      const td=h('td',{
        class:cls.join(' '),
        title:rec
          ? `${TYPE_LABELS[rec.type]} (${statusLabel(rec.status)})${rec.note?' · '+rec.note:''}`
          : (isWeekend?'':'정상출근 (기본)'),
        onClick:isWeekend?null:()=>openCellDrawer(u,ymd,rec),
      }, inner);
      tr.append(td);
    }
    tbody.append(tr);
  }

  const table=h('table',{class:'grid'},
    h('thead',null,h('tr',null,headRow)),
    tbody
  );
  const wrap=h('div',{class:'grid-wrap'},table);

  const legend=h('div',{class:'legend'},
    chipLegend('OFF','휴무'), chipLegend('MONTHLY','월차'), chipLegend('ANNUAL','연차'),
    chipLegend('HALF_AM','반차'), chipLegend('SICK','병가'), chipLegend('HOLIDAY','공가'),
    h('span',{class:'legend-item',style:'margin-left:auto'},'점선 = 승인대기 · 취소선 = 반려')
  );
  return h('div',null, renderStatChips(), wrap, legend);
}
function chipLegend(type,label){
  return h('span',{class:'legend-item'}, h('span',{class:`chip chip-${type}`}, label));
}
function statusLabel(s){return s==='APPROVED'?'승인':s==='REJECTED'?'반려':'요청'}

// 오늘 직원 상태 (근태 attendance_records 기반)
function getTodayStatus(userId, records){
  const today = new Date().toISOString().slice(0,10);
  const r = (records||[]).find(rec =>
    rec.user_id===userId && String(rec.work_date).slice(0,10)===today
  );
  if (!r) return { label:'근무', kind:'WORK' };
  if (r.status==='APPROVED') return { label: TYPE_LABELS[r.type]||'근무', kind:r.type };
  if (r.status==='REQUESTED') return { label: (TYPE_LABELS[r.type]||'')+' 대기', kind:r.type+'_REQ' };
  if (r.status==='REJECTED') return { label:'근무', kind:'WORK' };
  return { label:'근무', kind:'WORK' };
}
function statusBadge(s){
  const colors = {
    WORK:        ['#e7f6e9','#0f7b6c'],
    OFF:         ['#ebebe9','#5b5750'],
    HALF_AM:     ['#fde8c8','#a96400'],
    HALF_PM:     ['#fde8c8','#a96400'],
    MONTHLY:     ['#dbe5f8','#1d4ed8'],
    ANNUAL:      ['#dbe5f8','#1d4ed8'],
    SICK:        ['#ffe2dd','#b91c1c'],
    HOLIDAY:     ['#e8deee','#6940a5'],
  };
  const k = String(s.kind||'WORK').replace(/_REQ$/,'');
  const [bg,fg] = colors[k] || colors.WORK;
  return h('span',{
    style:`display:inline-block;padding:4px 10px;border-radius:5px;font-size:12px;font-weight:700;background:${bg};color:${fg};${s.kind && s.kind.endsWith('_REQ')?'border:1px dashed '+fg:''}`
  }, s.label);
}

function openCellDrawer(target,ymd,rec){
  const me=State.user;
  const isPriv=me.role==='admin'||me.role==='manager';
  const isSelf=target.id===me.id;
  if(!isSelf && !isPriv){
    if(rec) showToast(`${target.name} · ${ymd} · ${TYPE_LABELS[rec.type]} (${statusLabel(rec.status)})`);
    return;
  }
  let chosen=rec?rec.type:'OFF';

  let typeGrid;
  function repaint(){
    typeGrid.innerHTML='';
    requestableTypesFor(target).forEach(t=>typeGrid.append(typeBtn(t)));
  }
  function typeBtn(t){
    return h('button',{
      class:'type-btn '+(chosen===t?'on':''),
      onClick:()=>{chosen=t;repaint();}
    }, TYPE_LABELS[t]);
  }
  typeGrid=h('div',{class:'type-grid'});
  requestableTypesFor(target).forEach(t=>typeGrid.append(typeBtn(t)));

  const noteI=h('input',{type:'text',value:rec?rec.note||'':'',placeholder:'메모 (선택)',
    style:'width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;outline:none;font-size:13.5px'});
  const msg=h('div',{class:'auth-msg'});

  // 승인 이력 박스
  let auditBox=null;
  if(rec){
    const reqAt=rec.requested_at?new Date(rec.requested_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}):'';
    const apvAt=rec.approved_at?new Date(rec.approved_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}):'';
    const apvName=rec.approver_name||'';
    let statusLine;
    if(rec.status==='APPROVED'){
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'승인'),
        h('span',{class:'audit-val ok'}, apvName||'관리자',' · ',apvAt));
    } else if(rec.status==='REJECTED'){
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'반려'),
        h('span',{class:'audit-val no'}, apvName||'관리자',' · ',apvAt, rec.reject_reason?` — ${rec.reject_reason}`:''));
    } else {
      statusLine=h('div',{class:'audit-line'},
        h('span',{class:'audit-key'},'상태'),
        h('span',{class:'audit-val'},'승인 대기'));
    }
    auditBox=h('div',{class:'audit-box'},
      h('div',{class:'audit-line'},h('span',{class:'audit-key'},'요청'),h('span',{class:'audit-val'},reqAt)),
      statusLine
    );
  }

  const close=()=>{ const m=$('.modal-bg'); if(m) m.remove(); };
  const save=async()=>{
    msg.textContent='';
    try{
      await api('/api/att/request',{method:'POST',body:{
        user_id:target.id, work_date:ymd, type:chosen, note:noteI.value||null
      }});
      close();
      await loadMonth();
      renderApp();
      showToast(isSelf? (isPriv?'등록(자동승인) 완료':'요청 완료 — 승인 대기'): `${target.name} ${ymd} 등록 완료`);
    }catch(e){ msg.textContent=e.message; }
  };
  const cancel=async()=>{
    if(!rec) return;
    if(!confirm('이 일정을 삭제하시겠습니까?')) return;
    try{
      await api('/api/att/cancel',{method:'POST',body:{id:rec.id}});
      close();
      await loadMonth();
      renderApp();
      showToast('삭제됨');
    }catch(e){ alert(e.message); }
  };

  const dateLabel=new Date(ymd+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  const drawer=h('aside',{class:'drawer',onClick:e=>e.stopPropagation()},
    h('div',{class:'drawer-head'},
      h('div',null,
        h('div',{class:'drawer-eyebrow'}, isSelf?'내 일정':target.name),
        h('div',{class:'drawer-title'}, dateLabel)
      ),
      h('button',{class:'drawer-close',onClick:close,title:'Esc'},'✕')
    ),
    h('div',{class:'drawer-body'},
      auditBox,
      h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin-bottom:6px;letter-spacing:0.02em'},'유형'),
      typeGrid,
      h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin:6px 0 6px;letter-spacing:0.02em'},'메모'),
      noteI,
      msg,
      h('div',{style:'font-size:11.5px;color:var(--text-soft);line-height:1.5'}, isSelf
        ? (isPriv?'등록 즉시 자동 승인됩니다':'등록 시 차장/대표 승인 후 반영됩니다')
        : `${target.name} 일정을 직접 등록 (자동 승인)`)
    ),
    h('div',{class:'drawer-foot'},
      rec?h('button',{class:'btn btn-danger',onClick:cancel},'삭제'):null,
      h('button',{class:'btn',onClick:close},'취소'),
      h('button',{class:'btn btn-primary',onClick:save}, rec?'수정':'등록')
    )
  );
  const bg=h('div',{class:'modal-bg'}, drawer);
  bg.addEventListener('click',(e)=>{if(e.target===bg) close();});
  document.body.append(bg);
  setTimeout(()=>{ try{ noteI.focus(); }catch(_){}; },80);
}

// ─────────────── 직원 디렉토리 (메인 — 직원 중심) ───────────────
function renderPeople(){
  const wrap=h('div');
  const me=State.user;

  // 검색 + 날짜 범위 (날짜 설정 시 그 범위 내 기록 가진 직원만 + 카드 클릭 시 상세에 자동 반영)
  const searchI=h('input',{type:'text',placeholder:'직원 이름 검색  ( / )',value:State.search});
  searchI.addEventListener('input',()=>{ State.search=searchI.value; refresh(); });

  const fromI=h('input',{type:'date',value:State.dirDateFrom||'',
    style:'padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:#fff;font-size:13px;outline:none'});
  const toI=h('input',{type:'date',value:State.dirDateTo||'',
    style:'padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:#fff;font-size:13px;outline:none'});
  fromI.addEventListener('change',()=>{State.dirDateFrom=fromI.value;refresh();});
  toI.addEventListener('change',()=>{State.dirDateTo=toI.value;refresh();});

  // 빠른 칩
  const quickChip=(label,setter)=>h('button',{
    class:'btn',style:'padding:7px 11px;font-size:12px',
    onClick:()=>{setter();fromI.value=State.dirDateFrom||'';toI.value=State.dirDateTo||'';refresh();}
  },label);
  const ymdOf=(d)=>fmtYmd(d.getFullYear(),d.getMonth()+1,d.getDate());
  const today=new Date();
  const startOfWeek=new Date(today); startOfWeek.setDate(today.getDate()-today.getDay());
  const endOfWeek=new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate()+6);
  const startOfMonth=new Date(today.getFullYear(),today.getMonth(),1);
  const endOfMonth=new Date(today.getFullYear(),today.getMonth()+1,0);

  const toolbar=h('div',{style:'display:flex;flex-direction:column;gap:10px;margin-bottom:18px'},
    h('div',{class:'people-toolbar',style:'margin-bottom:0'},
      h('div',{class:'search-box'}, searchI),
      h('span',{style:'color:var(--text-soft);font-size:12px;font-weight:600'},'기간'),
      fromI, h('span',{style:'color:var(--text-soft)'},'~'), toI,
    ),
    h('div',{style:'display:flex;flex-wrap:wrap;gap:6px'},
      quickChip('오늘',()=>{State.dirDateFrom=ymdOf(today);State.dirDateTo=ymdOf(today);}),
      quickChip('이번 주',()=>{State.dirDateFrom=ymdOf(startOfWeek);State.dirDateTo=ymdOf(endOfWeek);}),
      quickChip('이번 달',()=>{State.dirDateFrom=ymdOf(startOfMonth);State.dirDateTo=ymdOf(endOfMonth);}),
      quickChip('초기화',()=>{State.dirDateFrom='';State.dirDateTo='';State.search='';searchI.value='';})
    )
  );
  wrap.append(renderStatChips(), toolbar);

  const grid=h('div',{class:'people-grid'});
  // 마감보고 기준 — 다음 영업일의 휴무자 표시
  const _tmr=new Date(); _tmr.setDate(_tmr.getDate()+1);
  const tomorrowYmd=fmtYmd(_tmr.getFullYear(),_tmr.getMonth()+1,_tmr.getDate());

  // 결과 요약 (날짜 범위 적용 시 그 범위 통계)
  const summary=h('div',{style:'font-size:12px;color:var(--text-soft);margin-bottom:10px'});

  function refresh(){
    grid.innerHTML=''; summary.innerHTML='';
    const q=(State.search||'').trim();
    const from=State.dirDateFrom, to=State.dirDateTo;

    function inRange(r){
      const d=String(r.work_date).slice(0,10);
      if(from && d<from) return false;
      if(to && d>to) return false;
      return true;
    }

    let people=State.users.filter(u=>!q||u.name.includes(q));

    // 날짜 범위 설정된 경우: 그 범위에 기록 있는 직원만
    let totalRecords=0;
    if(from || to){
      people=people.filter(u=>{
        const has=State.records.some(r=>r.user_id===u.id && inRange(r));
        return has;
      });
      totalRecords=State.records.filter(r=>inRange(r) && people.some(p=>p.id===r.user_id)).length;
      summary.append(`기간 ${from||'…'} ~ ${to||'…'} · ${people.length}명 · ${totalRecords}건의 기록`);
    } else if(q){
      summary.append(`'${q}' 검색 · ${people.length}명`);
    } else {
      summary.append(`전체 ${people.length}명`);
    }

    if(!people.length){
      grid.append(h('div',{class:'empty'},'조건에 맞는 직원이 없습니다'));
      return;
    }
    for(const u of people){
      const allMine=State.records.filter(r=>r.user_id===u.id);
      const inRangeMine=(from||to)?allMine.filter(inRange):allMine;
      const recs=inRangeMine.filter(r=>r.status==='APPROVED');
      const cnt={ANNUAL:0,MONTHLY:0,HALF:0,SICK:0};
      recs.forEach(r=>{
        if(r.type==='ANNUAL') cnt.ANNUAL++;
        else if(r.type==='MONTHLY') cnt.MONTHLY++;
        else if(r.type==='HALF_AM'||r.type==='HALF_PM') cnt.HALF++;
        else if(r.type==='SICK') cnt.SICK++;
      });
      // 익일 휴무/반차/연차 여부 (마감보고)
      const tmrRec=State.records.find(r=>r.user_id===u.id && String(r.work_date).slice(0,10)===tomorrowYmd);
      const tmrType=tmrRec?tmrRec.type:'WORK';
      const tmrIsOff=tmrRec && tmrRec.type!=='WORK';
      const tmrLabel=tmrRec?TYPE_LABELS[tmrRec.type]:'정상출근 예정';
      const wait=allMine.filter(r=>r.status==='REQUESTED').length;
      const rangeCnt=inRangeMine.length;

      const card=h('div',{class:'person-card',onClick:()=>{
        // 날짜 범위가 설정되어 있으면 상세 페이지에서 그 범위 자동 적용
        State.detailDateFrom=from||''; State.detailDateTo=to||'';
        State.selectedPersonId=u.id;
        renderApp();
      }},
        h('div',{class:'person-head'},
          h('span',{class:'avatar',style:`background:${nameColor(u.name)}`}, initial(u.name)),
          h('div',{style:'min-width:0;flex:1'},
            h('div',{class:'person-name'}, u.name),
            h('div',{class:'person-meta'},
              h('span',{class:'dot '+(u.registered?'on':'')}),
              u.role==='manager'?'차장':'직원',' · ',u.registered?'가입':'미가입',
              wait?h('span',{style:'margin-left:auto;color:#a96400;font-weight:700'},'대기 '+wait):null
            )
          )
        ),
        (from||to)
          ? h('div',{class:'person-today t-WORK'}, `기간 내 ${rangeCnt}건`)
          : h('div',{class:`person-today t-${tmrType}`}, tmrIsOff?'🔔 익일 · ':'익일 · ', tmrLabel),
        h('div',{class:'person-stats'},
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'연차'), h('div',{class:'val'}, cnt.ANNUAL)),
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'월차'), h('div',{class:'val'}, cnt.MONTHLY)),
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'반차'), h('div',{class:'val'}, cnt.HALF)),
          h('div',{class:'person-stat'}, h('div',{class:'lbl'},'병가'), h('div',{class:'val'}, cnt.SICK)),
        )
      );
      grid.append(card);
    }
  }
  refresh();
  // 익일 휴무자 배너 — 마감보고 기준
  const tmrOffs = tomorrowOffUsers();
  const tmrBanner = tmrOffs.length
    ? h('div',{style:'display:flex;align-items:center;gap:10px;padding:12px 16px;margin-bottom:14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;font-size:13.5px;color:#9a3412'},
        h('span',{style:'font-size:18px'},'🔔'),
        h('div',{style:'flex:1'},
          h('div',{style:'font-weight:700'}, `익일 휴무자 ${tmrOffs.length}명`),
          h('div',{style:'font-size:12px;color:#7c2d12;margin-top:2px'},
            tmrOffs.map(o=>`${o.user.name}(${TYPE_SHORT_FULL[o.record.type]||TYPE_LABELS[o.record.type]})`).join(' · ')
          )
        ),
        h('button',{class:'btn',style:'padding:5px 10px;font-size:11px',onClick:()=>playBell()},'🔔 다시 알람'))
    : null;
  if(tmrBanner) wrap.append(tmrBanner);
  wrap.append(summary, grid);
  setTimeout(()=>{ try{ searchI.focus(); searchI.setSelectionRange(searchI.value.length,searchI.value.length); }catch(_){}; },30);
  return wrap;
}

// ─────────────── 직원 상세 (BambooHR/Notion People 톤) ───────────────
function renderPersonDetail(){
  const u=State.users.find(x=>x.id===State.selectedPersonId);
  if(!u){
    State.selectedPersonId=null;
    return renderPeople();
  }
  const wrap=h('div');
  // 뒤로가기
  wrap.append(h('button',{class:'pd-back',style:'margin-bottom:14px',
    onClick:()=>{State.selectedPersonId=null;renderApp();}},'← 직원 목록'));

  const recs=State.records.filter(r=>r.user_id===u.id);
  const cntApproved={ANNUAL:0,MONTHLY:0,HALF:0,SICK:0,OFF:0};
  recs.forEach(r=>{
    if(r.status!=='APPROVED') return;
    if(r.type==='ANNUAL') cntApproved.ANNUAL++;
    else if(r.type==='MONTHLY') cntApproved.MONTHLY++;
    else if(r.type==='HALF_AM'||r.type==='HALF_PM') cntApproved.HALF++;
    else if(r.type==='SICK') cntApproved.SICK++;
    else if(r.type==='OFF') cntApproved.OFF++;
  });

  // ── 좌측 프로필 카드
  const sideCard=h('div',{class:'pd-card'},
    h('div',{class:'pd-avatar',style:`background:${nameColor(u.name)}`}, initial(u.name)),
    h('div',{class:'pd-name'}, u.name),
    h('div',{class:'pd-role'},
      u.role==='manager'?'차장 (월차 승인 권한)':u.role==='admin'?'대표':'직원'),
    h('div',{class:'pd-props'},
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'역할'), h('span',{class:'v'}, u.role==='manager'?'차장':u.role==='admin'?'대표':'직원')),
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'가입'), h('span',{class:'v'}, u.registered?'완료':'미가입')),
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'전체 신청'), h('span',{class:'v'}, recs.length+'건')),
      h('div',{class:'pd-prop'}, h('span',{class:'k'},'대기'), h('span',{class:'v'}, recs.filter(r=>r.status==='REQUESTED').length+'건')),
    )
  );

  // ── 우측 본문: 통계 / 미니 캘린더 / 이력
  // 1) 누적 통계 (이번 달 기준)
  const statSection=h('section',{class:'pd-section'},
    h('h3',null,'📊 ',`${State.ym} 사용 현황`),
    h('div',{class:'pd-stat-row'},
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.ANNUAL), h('div',{class:'l'},'연차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.MONTHLY), h('div',{class:'l'},'월차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.HALF), h('div',{class:'l'},'반차')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.SICK), h('div',{class:'l'},'병가')),
      h('div',{class:'pd-stat'}, h('div',{class:'v'},cntApproved.OFF), h('div',{class:'l'},'휴무')),
    )
  );

  // 2) 미니 캘린더
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const firstDow=new Date(y,m-1,1).getDay();
  const recIdx={};
  recs.forEach(r=>{ recIdx[String(r.work_date).slice(0,10)]=r; });
  const todayYmd=fmtYmd(new Date().getFullYear(),new Date().getMonth()+1,new Date().getDate());
  const cal=h('div',{class:'pd-mini-cal'});
  ['일','월','화','수','목','금','토'].forEach(d=>cal.append(h('div',{class:'pmh'},d)));
  for(let i=0;i<firstDow;i++) cal.append(h('div',{class:'pmd empty'}));
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ymd=fmtYmd(y,m,d);
    const rec=recIdx[ymd];
    const cls=['pmd'];
    if(dow===0||dow===6) cls.push('weekend');
    if(ymd===todayYmd) cls.push('today');
    let inner=[h('div',null,d)];
    if(rec){
      const cc=['chip',`chip-${rec.type}`];
      if(rec.status==='REQUESTED') cc.push('is-requested');
      if(rec.status==='REJECTED') cc.push('is-rejected');
      inner.push(h('span',{class:cc.join(' ')}, TYPE_TINY[rec.type]||''));
    }
    cal.append(h('div',{class:cls.join(' '),
      onClick:(dow===0||dow===6)?null:()=>openCellDrawer(u,ymd,rec)
    }, ...inner));
  }
  const calSection=h('section',{class:'pd-section'},
    h('h3',null,'🗓 미니 캘린더'),
    cal
  );

  // 3) 신청 이력 — 날짜 범위/타입/상태 필터 + 정렬
  // 디렉토리에서 날짜 범위를 가지고 들어왔다면 자동 반영
  const filter={
    sort:'desc',
    type:'ALL',
    status:'ALL',
    from:State.detailDateFrom||'',
    to:State.detailDateTo||'',
  };
  // 1회 적용 후 비움
  State.detailDateFrom=''; State.detailDateTo='';
  const histList=h('div',{class:'pd-history-list'});

  function paintHist(){
    histList.innerHTML='';
    let filtered=recs.slice();
    if(filter.type!=='ALL'){
      if(filter.type==='HALF') filtered=filtered.filter(r=>r.type==='HALF_AM'||r.type==='HALF_PM');
      else filtered=filtered.filter(r=>r.type===filter.type);
    }
    if(filter.status!=='ALL') filtered=filtered.filter(r=>r.status===filter.status);
    if(filter.from) filtered=filtered.filter(r=>String(r.work_date).slice(0,10)>=filter.from);
    if(filter.to) filtered=filtered.filter(r=>String(r.work_date).slice(0,10)<=filter.to);
    filtered.sort((a,b)=>{
      const c=String(a.work_date).localeCompare(String(b.work_date));
      return filter.sort==='desc'?-c:c;
    });
    if(!filtered.length){
      histList.append(h('div',{class:'empty',style:'padding:24px'},'조건에 맞는 이력이 없습니다'));
      return;
    }
    for(const r of filtered){
      const dateStr=String(r.work_date).slice(0,10);
      const dow=['일','월','화','수','목','금','토'][new Date(dateStr+'T00:00:00').getDay()];
      histList.append(h('div',{class:'pd-hist',
        style:'cursor:pointer',
        onClick:()=>openCellDrawer(u,dateStr,r)},
        h('div',{class:'hi-left'},
          h('span',{class:'hi-date'}, dateStr.slice(5)+' ('+dow+')'),
          h('span',{class:`chip chip-${r.type}`}, TYPE_LABELS[r.type]),
          r.note?h('span',{style:'color:var(--text-soft);font-size:11.5px'}, '· '+r.note):null,
        ),
        h('span',{class:`hi-status s-${r.status}`}, statusLabel(r.status))
      ));
    }
  }

  // 필터바
  const filterBar=h('div',{
    style:'display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px;font-size:12px'
  });
  // 타입 필터
  const typeOpts=[['ALL','전체'],['ANNUAL','연차'],['MONTHLY','월차'],['HALF','반차'],['SICK','병가'],['OFF','휴무'],['WORK','정상']];
  const typeSel=h('select',{
    style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none;cursor:pointer',
    onChange:(e)=>{filter.type=e.target.value;paintHist();}
  }, ...typeOpts.map(([v,l])=>h('option',{value:v},l)));
  // 상태 필터
  const statusOpts=[['ALL','전체상태'],['APPROVED','승인'],['REQUESTED','대기'],['REJECTED','반려']];
  const statusSel=h('select',{
    style:'padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none;cursor:pointer',
    onChange:(e)=>{filter.status=e.target.value;paintHist();}
  }, ...statusOpts.map(([v,l])=>h('option',{value:v},l)));
  // 날짜 from/to
  const fromI=h('input',{type:'date',value:filter.from,
    style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:(e)=>{filter.from=e.target.value;paintHist();}});
  const toI=h('input',{type:'date',value:filter.to,
    style:'padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12.5px;outline:none',
    onChange:(e)=>{filter.to=e.target.value;paintHist();}});
  // 정렬 토글
  const sortBtn=h('button',{
    class:'btn',
    style:'padding:7px 11px;font-size:12px',
    onClick:()=>{filter.sort=filter.sort==='desc'?'asc':'desc';sortBtn.textContent=filter.sort==='desc'?'최신순 ↓':'오래된순 ↑';paintHist();}
  }, '최신순 ↓');
  // 초기화
  const resetBtn=h('button',{
    class:'btn',
    style:'padding:7px 11px;font-size:12px',
    onClick:()=>{
      filter.sort='desc';filter.type='ALL';filter.status='ALL';filter.from='';filter.to='';
      typeSel.value='ALL';statusSel.value='ALL';fromI.value='';toI.value='';
      sortBtn.textContent='최신순 ↓';paintHist();
    }
  }, '초기화');

  // 빠른 기간 프리셋
  const fmtYmdQ=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  function applyDateRangePerson(fromV, toV){
    filter.from=fromV; filter.to=toV;
    fromI.value=fromV; toI.value=toV;
    paintHist();
  }
  const _tt=new Date();
  const _tToday=fmtYmdQ(_tt);
  const _tYd=new Date(_tt); _tYd.setDate(_tYd.getDate()-1); const _tYdYmd=fmtYmdQ(_tYd);
  const _tMonthStart=fmtYmdQ(new Date(_tt.getFullYear(),_tt.getMonth(),1));
  const _tPrevFirst=fmtYmdQ(new Date(_tt.getFullYear(),_tt.getMonth()-1,1));
  const _tPrevLast=fmtYmdQ(new Date(_tt.getFullYear(),_tt.getMonth(),0));
  const _t3m=new Date(_tt); _t3m.setMonth(_t3m.getMonth()-3); const _t3mYmd=fmtYmdQ(_t3m);
  const qBtnP=(label,fn)=>h('button',{class:'btn',style:'padding:6px 10px;font-size:11.5px',onClick:fn},label);

  filterBar.append(
    h('span',{style:'color:var(--text-soft);font-size:11.5px;margin-right:4px;font-weight:600'},'빠른 기간'),
    qBtnP('오늘',  ()=>applyDateRangePerson(_tToday,    _tToday)),
    qBtnP('어제',  ()=>applyDateRangePerson(_tYdYmd,    _tYdYmd)),
    qBtnP('당월',  ()=>applyDateRangePerson(_tMonthStart,_tToday)),
    qBtnP('전월',  ()=>applyDateRangePerson(_tPrevFirst, _tPrevLast)),
    qBtnP('3개월치',()=>applyDateRangePerson(_t3mYmd,    _tToday)),
    qBtnP('전체',  ()=>applyDateRangePerson('',          '')),
    h('span',{style:'flex-basis:100%;height:6px'}),
    typeSel, statusSel,
    h('span',{style:'color:var(--text-soft);font-size:11.5px;margin-left:4px'},'기간'),
    fromI, h('span',{style:'color:var(--text-soft)'}, '~'), toI,
    h('span',{style:'flex:1'}),
    sortBtn, resetBtn
  );

  paintHist();
  const histSection=h('section',{class:'pd-section'},
    h('h3',null,'🕘 신청 이력 ',h('span',{style:'color:var(--text-soft);font-weight:500;font-size:12px;margin-left:6px'},'· 총 '+recs.length+'건')),
    filterBar,
    histList
  );

  const detail=h('div',{class:'person-detail'},
    h('div',{class:'pd-side'}, sideCard),
    h('div',null, statSection, calSection, histSection)
  );
  wrap.append(detail);
  return wrap;
}

async function loadPerfRange(userId, from, to){
  try{
    const r = await api(`/api/sales/tm-daily?from=${from}&to=${to}`);
    State.perfRows = (r.rows||[]).filter(x => x.user_id === userId);
  }catch(e){
    State.perfRows = [];
    showToast(e.message);
  }
}

function renderPerformanceDetail(){
  const u = State.users.find(x=>x.id===State.perfPersonId);
  if (!u){ State.perfPersonId = null; return renderSalesTM(); }

  const wrap=h('div');
  // 뒤로가기
  wrap.append(h('button',{class:'pd-back',style:'margin-bottom:14px',
    onClick:()=>{State.perfPersonId=null; State.perfRangeKey=null; renderApp();}},'← TM 마감'));

  // 빠른 기간
  const range = State.perfRange || 'thisMonth';
  const today=new Date();
  const fmt=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let from, to, rangeLabel;
  if (range==='today')        { from=fmt(today); to=fmt(today); rangeLabel='오늘'; }
  else if (range==='yesterday'){ const y=new Date(today); y.setDate(y.getDate()-1); from=fmt(y); to=fmt(y); rangeLabel='어제'; }
  else if (range==='thisMonth'){ from=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`; to=fmt(today); rangeLabel='당월'; }
  else if (range==='prevMonth'){ const pm=new Date(today.getFullYear(),today.getMonth()-1,1); const last=new Date(today.getFullYear(),today.getMonth(),0); from=fmt(pm); to=fmt(last); rangeLabel='전월'; }
  else if (range==='3months') { const tm=new Date(today); tm.setMonth(tm.getMonth()-3); from=fmt(tm); to=fmt(today); rangeLabel='최근 3개월'; }
  else                        { from='2020-01-01'; to=fmt(today); rangeLabel='전체'; }

  // 캐시 키 (사용자+범위)
  const cacheKey = `${u.id}~${from}~${to}`;
  if (State.perfRangeKey !== cacheKey){
    State.perfRangeKey = cacheKey;
    State.perfRows = null;
    loadPerfRange(u.id, from, to).then(()=>renderApp());
  }

  function qBtn(label, key){
    const active = range===key;
    const btn = h('button',{class:'btn'+(active?' btn-primary':''), style:'padding:6px 12px;font-size:12px'}, label);
    btn.addEventListener('click', ()=>{ State.perfRange = key; renderApp(); });
    return btn;
  }
  const quickBar = h('div',{class:'sales-toolbar',style:'gap:6px;flex-wrap:wrap'},
    h('span',{class:'label'},'기간'),
    qBtn('오늘','today'),
    qBtn('어제','yesterday'),
    qBtn('당월','thisMonth'),
    qBtn('전월','prevMonth'),
    qBtn('3개월치','3months'),
    qBtn('전체','all'),
    h('span',{style:'margin-left:auto;color:var(--text-soft);font-size:12px'},
      `${rangeLabel} · ${from} ~ ${to}`)
  );

  // 헤더 (직원 카드)
  const header = h('div',{class:'pd-card',style:'display:flex;align-items:center;gap:14px;padding:18px 22px;margin-bottom:14px'},
    h('span',{class:'avatar',style:`width:48px;height:48px;font-size:18px;background:${nameColor(u.name)}`}, initial(u.name)),
    h('div',null,
      h('div',{style:'font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px'},
        u.name,
        Number(u.tier)===1?h('span',{class:'role-badge',style:'font-size:11px;background:#fdecc8;color:#cb912f'},'1차직원'):
        Number(u.tier)===2?h('span',{class:'role-badge',style:'font-size:11px;background:#d3e5ef;color:#0b6e99'},'2차직원'):null
      ),
      h('div',{style:'font-size:12px;color:var(--text-soft);margin-top:4px'}, u.role==='manager'?'차장':'직원')
    ),
    h('div',{style:'flex:1'}),
    h('div',{style:'font-size:12px;color:var(--text-soft)'},'📊 퍼포먼스 상세')
  );

  if (State.perfRows === null){
    wrap.append(header, quickBar, h('div',{class:'sales-empty',style:'padding:80px 20px'},
      h('div',{class:'ico'},'⏳'), h('div',null,'퍼포먼스 데이터 로딩 중…')));
    return wrap;
  }

  const rows = State.perfRows || [];
  let totalCount=0, totalDb=0, offDays=0;
  rows.forEach(r=>{ totalCount+=Number(r.count||0); totalDb+=Number(r.db_count||0); if(r.is_off) offDays++; });
  const dayCount = rows.length;
  const workedDays = dayCount - offDays;
  const dayAvg = workedDays>0 ? totalCount/workedDays : 0;
  const dbAvg  = workedDays>0 ? totalDb/workedDays : 0;
  const eff = totalDb>0 ? totalCount/totalDb : 0;

  const fmtNum=(n,p=0)=>(Number(n||0)).toLocaleString('ko-KR',{maximumFractionDigits:p});
  const fmtPct=(n)=>((n||0)*100).toFixed(1)+'%';
  const statCard=(label,val,bg)=>h('div',{
    style:`padding:18px;background:${bg||'#fff'};border:1px solid var(--border);border-radius:11px;display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px`
  },
    h('div',{style:'font-size:11px;color:var(--text-soft);font-weight:700;letter-spacing:0.04em;text-transform:uppercase'}, label),
    h('div',{style:'font-size:26px;font-weight:800;font-variant-numeric:tabular-nums'}, val)
  );
  const statsRow=h('div',{style:'display:flex;gap:12px;padding:0 0 14px;flex-wrap:wrap'},
    statCard('총 마감', fmtNum(totalCount), '#fffaf0'),
    statCard('총 디비', fmtNum(totalDb), '#fffaf0'),
    statCard('일평균 마감', fmtNum(dayAvg,1), '#eef2ff'),
    statCard('일평균 디비', fmtNum(dbAvg,1), '#eef2ff'),
    statCard('효율', totalDb>0?fmtPct(eff):'—', '#dcfce7'),
    statCard('근무 / 휴무', `${workedDays}일 / ${offDays}일`, '#fff'),
  );

  // 일별 표 (최신순)
  const tbody=h('tbody');
  if (!rows.length){
    tbody.append(h('tr',null,
      h('td',{colspan:5,style:'padding:40px;text-align:center;color:var(--text-soft)'},
        '해당 기간 마감 기록이 없습니다 — 대표/관리자 입력 대기')));
  } else {
    rows.slice().sort((a,b)=>String(b.work_date).localeCompare(String(a.work_date))).forEach(r=>{
      const d=String(r.work_date).slice(0,10);
      const dow=['일','월','화','수','목','금','토'][new Date(d+'T00:00:00').getDay()];
      const rEff = r.db_count>0 ? r.count/r.db_count : 0;
      tbody.append(h('tr',null,
        h('td',{style:'padding:11px 14px;font-variant-numeric:tabular-nums'}, `${d} (${dow})`),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700'}, fmtNum(r.count)),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700'}, fmtNum(r.db_count)),
        h('td',{style:'padding:11px 14px;text-align:right;font-variant-numeric:tabular-nums'}, r.db_count>0?fmtPct(rEff):'—'),
        h('td',{style:'padding:11px 14px;text-align:center;color:var(--text-soft);font-size:12px'}, r.is_off?'휴무':'—'),
      ));
    });
  }
  const table=h('table',{class:'tm-table',style:'width:100%'},
    h('thead',null,h('tr',null,
      h('th',{style:'text-align:left'},'일자'),
      h('th',{style:'text-align:right'},'마감 (건)'),
      h('th',{style:'text-align:right'},'디비 (건)'),
      h('th',{style:'text-align:right'},'효율'),
      h('th',null,'비고'),
    )),
    tbody
  );

  wrap.append(header, quickBar, statsRow, table);
  return wrap;
}

async function loadSignupPending(){
  try{
    const r=await api('/api/auth/pending');
    State.signupPending = r.pending || [];
  }catch(e){
    State.signupPending = [];
    showToast(e.message);
  }
}

async function loadEmployeeMgmt(){
  try{
    const r=await api('/api/auth/pending?scope=employees');
    State.employeeMgmt = r.employees || [];
  }catch(e){
    State.employeeMgmt = [];
    showToast(e.message);
  }
}

function renderEmployeeMgmt(){
  if(State.employeeMgmt===null){
    loadEmployeeMgmt().then(()=>{ if(State.user) renderApp(); });
    return h('div',{class:'empty'},'⏳ 직원 목록 불러오는 중…');
  }
  const list = State.employeeMgmt;
  if(!list.length) return h('div',{class:'empty'},'등록된 직원이 없습니다');

  const statusBadge=(s)=>{
    if(s==='suspended') return h('span',{style:'display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#fee2e2;color:#b91c1c'},'정지');
    if(s==='resigned')  return h('span',{style:'display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#e5e7eb;color:#4b5563'},'퇴사');
    return h('span',{style:'display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#dcfce7;color:#15803d'},'활성');
  };
  const tierBadge=(t)=>{
    const n=Number(t);
    const label=n===1?'1차':n===2?'2차':'-';
    const bg=n===1?'#fdecc8':n===2?'#d3e5ef':'#ebeced';
    const fg=n===1?'#cb912f':n===2?'#0b6e99':'#787774';
    return h('span',{style:`display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:${bg};color:${fg}`},label);
  };

  async function doAction(u, action, extra){
    try{
      const body = Object.assign({id:u.id, action}, extra||{});
      await api('/api/auth/pending',{method:'POST',body});
      State.employeeMgmt = null;
      renderApp();
      showToast('적용 완료');
    }catch(e){ showToast(e.message); }
  }

  function openIpModal(u){
    const cur=(u.allowed_ips||[]).join('\n');
    const overlay=h('div',{style:'position:fixed;inset:0;background:rgba(15,15,15,.4);z-index:9999;display:flex;align-items:center;justify-content:center',
      onClick:(e)=>{ if(e.target===overlay) overlay.remove(); }});
    const ta=h('textarea',{style:'width:100%;height:140px;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:monospace;font-size:13px',
      placeholder:'한 줄에 IP 하나 (예: 211.222.123.45)\n비우면 IP 제한 해제'},cur);

    // 최근 접속 IP 정보 + 자동 채움
    const lastIp = u.last_login_ip || '';
    const lastAt = u.last_login_at ? new Date(u.last_login_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}) : '';
    const lockNowBtn = lastIp
      ? h('button',{class:'btn btn-primary',style:'padding:6px 12px;font-size:12px'},`🔒 ${lastIp} 만 허용`)
      : null;
    if(lockNowBtn){
      lockNowBtn.addEventListener('click',()=>{ ta.value = lastIp; });
    }
    const lastInfo = lastIp
      ? h('div',{style:'display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;margin-bottom:10px;background:#f7f6f3;border-radius:8px;font-size:12px'},
          h('div',null,
            h('span',{style:'color:var(--text-soft)'},'최근 접속 IP: '),
            h('span',{style:'font-family:monospace;font-weight:700;color:var(--text)'}, lastIp),
            lastAt?h('span',{style:'color:var(--text-soft);margin-left:8px'},lastAt):null),
          lockNowBtn)
      : h('div',{style:'padding:10px 12px;margin-bottom:10px;background:#f7f6f3;border-radius:8px;font-size:12px;color:var(--text-soft)'},
          '아직 로그인 기록이 없어 최근 IP를 알 수 없습니다.');

    const save=h('button',{class:'btn btn-primary',style:'padding:8px 16px'},'저장');
    const cancel=h('button',{class:'btn',style:'padding:8px 16px'},'취소');
    const clear=h('button',{class:'btn btn-danger',style:'padding:8px 14px'},'제한 해제');
    save.addEventListener('click',async()=>{
      const ips = ta.value.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
      await doAction(u,'set_ips',{ips});
      overlay.remove();
    });
    clear.addEventListener('click',async()=>{
      if(!confirm(`${u.name} 의 IP 제한을 해제합니다`)) return;
      await doAction(u,'set_ips',{ips:[]});
      overlay.remove();
    });
    cancel.addEventListener('click',()=>overlay.remove());
    const card=h('div',{style:'background:#fff;border-radius:12px;padding:22px;width:520px;max-width:92vw'},
      h('div',{style:'font-weight:700;font-size:15px;margin-bottom:12px'}, `${u.name} · 허용 IP 설정`),
      lastInfo,
      h('div',{style:'font-size:12px;color:var(--text-soft);margin-bottom:8px'},
        '비어있으면 모든 IP에서 접속 가능. IP를 1개 이상 입력하면 그 IP에서만 로그인 허용.'),
      ta,
      h('div',{style:'display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:12px'},
        clear,
        h('div',{style:'display:flex;gap:8px'},cancel,save))
    );
    overlay.append(card);
    document.body.append(overlay);
  }

  const rows = list.map(u=>{
    const ipBtn=h('button',{class:'btn',style:'padding:5px 10px;font-size:11.5px'},
      (u.allowed_ips&&u.allowed_ips.length)?`IP ${u.allowed_ips.length}개`:'IP 제한');
    ipBtn.addEventListener('click',()=>openIpModal(u));

    const isSus = u.status==='suspended';
    const isRes = u.status==='resigned';
    const susBtn = h('button',{class:'btn '+(isSus?'btn-primary':''),style:'padding:5px 10px;font-size:11.5px'},
      isSus?'정지 해제':'정지');
    susBtn.addEventListener('click',()=>{
      if(!confirm(`${u.name} ${isSus?'정지를 해제합니다':'계정을 정지합니다 (로그인 차단)'}`)) return;
      doAction(u, isSus?'unsuspend':'suspend');
    });
    const resBtn = h('button',{class:'btn '+(isRes?'':'btn-danger'),style:'padding:5px 10px;font-size:11.5px'},
      isRes?'퇴사 복귀':'퇴사');
    resBtn.addEventListener('click',()=>{
      if(!confirm(`${u.name} ${isRes?'퇴사를 복귀시킵니다':'를 퇴사 처리합니다 (로그인 영구 차단)'}`)) return;
      doAction(u, isRes?'unresign':'resign');
    });

    const ipInfo = (u.allowed_ips&&u.allowed_ips.length)
      ? h('span',{style:'font-size:11px;color:#c2410c;font-family:monospace'},
          ' · 🔒 ', u.allowed_ips.slice(0,2).join(', '), u.allowed_ips.length>2?` … +${u.allowed_ips.length-2}`:'')
      : null;
    const lastIpInfo = u.last_login_ip
      ? h('span',{style:'font-size:11px;color:var(--text-soft);font-family:monospace'},
          ' · 최근 ', u.last_login_ip)
      : null;

    return h('div',{class:'card',style:'display:flex;align-items:center;justify-content:space-between;padding:14px 18px;margin-bottom:8px;background:#fff;border:1px solid var(--border);border-radius:10px'},
      h('div',{style:'display:flex;align-items:center;gap:12px;flex:1;min-width:0'},
        h('span',{class:'avatar',style:`width:34px;height:34px;font-size:13px;background:${nameColor(u.name)}`}, initial(u.name)),
        h('div',{style:'min-width:0;flex:1'},
          h('div',{style:'font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap'},
            u.name, tierBadge(u.tier), statusBadge(u.status||'active')
          ),
          h('div',{style:'font-size:11.5px;color:var(--text-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'},
            u.role==='manager'?'차장':'직원', ipInfo, lastIpInfo
          )
        )
      ),
      h('div',{style:'display:flex;gap:6px;flex-shrink:0'}, ipBtn, susBtn, resBtn)
    );
  });

  return h('div',{style:'padding:20px;max-width:880px'},
    h('h2',{style:'margin:0 0 6px;font-size:20px;font-weight:700'},'직원 관리'),
    h('div',{style:'font-size:12px;color:var(--text-soft);margin-bottom:16px'},
      '계정 정지 · 퇴사 처리 · 허용 IP 설정 — 대표 전용'),
    h('div',null,...rows)
  );
}

function renderSignupApproval(){
  if(State.signupPending===null){
    loadSignupPending().then(()=>{ if(State.user) renderApp(); });
    return h('div',{class:'empty'},'⏳ 가입 신청 불러오는 중…');
  }
  const list=State.signupPending;
  if(!list.length) return h('div',{class:'empty'},'가입 승인 대기 중인 신청이 없습니다');

  const tierBadge=(t)=>{
    const n=Number(t);
    const label=n===1?'1차직원':n===2?'2차직원':'미지정';
    const bg=n===1?'#fdecc8':n===2?'#d3e5ef':'#ebeced';
    const fg=n===1?'#cb912f':n===2?'#0b6e99':'#787774';
    return h('span',{style:`display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:${bg};color:${fg}`},label);
  };

  const items=list.map(u=>{
    const when=u.created_at?new Date(u.created_at).toLocaleString('ko-KR',{dateStyle:'medium',timeStyle:'short'}):'';
    const approveBtn=h('button',{class:'btn btn-primary',style:'padding:6px 14px'},'승인');
    const rejectBtn=h('button',{class:'btn btn-danger',style:'padding:6px 14px'},'거부');
    approveBtn.addEventListener('click',async()=>{
      if(!confirm(`${u.name} (${Number(u.tier)===1?'1차직원':'2차직원'}) 를 승인합니다`)) return;
      try{
        await api('/api/auth/pending',{method:'POST',body:{id:u.id,action:'approve'}});
        State.signupPending=null;
        renderApp();
        showToast('승인 완료');
      }catch(e){ showToast(e.message); }
    });
    rejectBtn.addEventListener('click',async()=>{
      if(!confirm(`${u.name} 의 가입 신청을 거부합니다`)) return;
      try{
        await api('/api/auth/pending',{method:'POST',body:{id:u.id,action:'reject'}});
        State.signupPending=null;
        renderApp();
        showToast('거부 완료');
      }catch(e){ showToast(e.message); }
    });
    return h('div',{class:'card',style:'display:flex;align-items:center;justify-content:space-between;padding:14px 18px;margin-bottom:8px;background:#fff;border:1px solid var(--border);border-radius:10px'},
      h('div',{style:'display:flex;align-items:center;gap:12px'},
        h('span',{class:'avatar',style:`width:32px;height:32px;font-size:13px;background:${nameColor(u.name)}`}, initial(u.name)),
        h('div',null,
          h('div',{style:'font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px'},u.name,tierBadge(u.tier)),
          h('div',{style:'font-size:11.5px;color:var(--text-soft);margin-top:2px'},'신청 ',when)
        )
      ),
      h('div',{style:'display:flex;gap:6px'},approveBtn,rejectBtn)
    );
  });

  return h('div',{style:'padding:20px;max-width:720px'},
    h('h2',{style:'margin:0 0 16px;font-size:20px;font-weight:700'},`가입 승인 대기 (${list.length})`),
    h('div',null,...items)
  );
}

function renderApproval(){
  const userMap={}; State.users.forEach(u=>userMap[u.id]=u);
  const pending=State.records.filter(r=>r.status==='REQUESTED');
  if(!pending.length) return h('div',{class:'empty'},'승인 대기 중인 요청이 없습니다');
  const list=h('div',{class:'approval-list'});
  async function doApprove(id){
    try{
      await api('/api/att/approve',{method:'POST',body:{id,action:'approve'}});
      await loadMonth(); renderApp(); showToast('승인됨');
    }catch(e){ alert(e.message); }
  }
  function openRejectModal(id, who){
    const reasonI=h('input',{type:'text',placeholder:'반려 사유 (필수)'});
    const msg=h('div',{class:'auth-msg'});
    const close=()=>{ const m=$('.modal-bg'); if(m) m.remove(); };
    const submit=async()=>{
      const reason=reasonI.value.trim();
      if(!reason){ msg.textContent='사유를 입력해주세요'; return; }
      try{
        await api('/api/att/approve',{method:'POST',body:{id,action:'reject',reject_reason:reason}});
        close(); await loadMonth(); renderApp(); showToast('반려됨');
      }catch(e){ msg.textContent=e.message; }
    };
    reasonI.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
    const modal=h('div',{class:'modal'},
      h('h3',null,'반려'),
      h('div',{class:'modal-sub'}, who?`${who}님의 신청을 반려합니다`:''),
      h('div',{class:'field'},reasonI),
      msg,
      h('div',{class:'modal-actions'},
        h('button',{class:'btn',onClick:close},'취소'),
        h('button',{class:'btn btn-danger',onClick:submit},'반려 확정')
      )
    );
    const bg=h('div',{class:'modal-bg'},modal);
    bg.addEventListener('click',e=>{ if(e.target===bg) close(); });
    document.body.append(bg);
    setTimeout(()=>reasonI.focus(),20);
  }
  for(const r of pending){
    const u=userMap[r.user_id]||{name:'?'};
    const dateStr=String(r.work_date).slice(0,10);
    const card=h('div',{class:'approval-card'},
      h('div',{class:'approval-info'},
        h('div',{class:'who'}, u.name,' · ',dateStr,' · ',TYPE_LABELS[r.type]),
        h('div',{class:'what'}, r.note||'(메모 없음)',' · 요청: ',new Date(r.requested_at).toLocaleString('ko-KR'))
      ),
      h('div',{class:'approval-actions'},
        h('button',{class:'btn btn-danger',onClick:()=>openRejectModal(r.id, u.name)},'반려'),
        h('button',{class:'btn btn-primary',onClick:()=>doApprove(r.id)},'승인'),
      )
    );
    list.append(card);
  }
  return list;
}

async function logout(){
