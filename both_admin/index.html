  });
  const codeI = h('input',{type:'text',placeholder:'예: A-A, KT-1, 타미통신',
    style:'width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:13.5px;background:#fcfcfb;outline:none'});
  const labelI = h('input',{type:'text',placeholder:'예: 타미통신디비',
    style:'width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:13.5px;background:#fcfcfb;outline:none'});
  const parentI = h('input',{type:'text',placeholder:'예: 타미통신디비 (선택)',
    style:'width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:13.5px;background:#fcfcfb;outline:none'});
  let pickedColor = PRESET_COLORS[0];
  const colorRow = h('div',{style:'display:flex;flex-wrap:wrap;gap:6px'});
  function paintColors(){
    colorRow.innerHTML='';
    for (const c of PRESET_COLORS){
      const sel = c===pickedColor;
      const sw = h('button',{
        style:`width:30px;height:30px;border-radius:50%;background:${c};border:${sel?'3px solid #0f0f0f':'2px solid transparent'};cursor:pointer;transition:transform .08s;${sel?'transform:scale(1.1)':''}`,
        title: c,
        onClick:(e)=>{ e.preventDefault(); pickedColor = c; paintColors(); }
      });
      colorRow.append(sw);
    }
  }
  paintColors();

  const cancelBtn = h('button',{class:'btn',style:'padding:8px 16px;font-size:13px'},'취소');
  const saveBtn = h('button',{class:'btn btn-primary',style:'padding:8px 16px;font-size:13px;font-weight:700'},'추가');
  cancelBtn.addEventListener('click',()=>overlay.remove());
  saveBtn.addEventListener('click',async()=>{
    const code = codeI.value.trim();
    const label = labelI.value.trim() || code;
    if (!code) { codeI.focus(); return alert('업체 코드 필수'); }
    saveBtn.disabled=true; saveBtn.textContent='추가 중…';
    try{
      const sortOrder = (State.salesVendors||[]).reduce((m,v)=>Math.max(m, Number(v.sort_order||0)), 0) + 10;
      await api('/api/sales/vendors',{method:'POST',body:{
        code, label, parent_label: parentI.value.trim()||null,
        color: pickedColor, sort_order: sortOrder, active: true
      }});
      State.salesVendorsLoaded=false; State.salesVendorLoadedDate=null;
      await loadSalesContext('sales-vendor');
      renderApp(); showToast('업체 추가됨');
      overlay.remove();
    }catch(e){
      saveBtn.disabled=false; saveBtn.textContent='추가';
      alert(e.message);
    }
  });

  const card = h('div',{style:'background:#fff;border-radius:12px;padding:22px;width:480px;max-width:92vw;max-height:90vh;overflow:auto'},
    h('div',{style:'font-weight:800;font-size:17px;margin-bottom:4px'},'＋ 새 업체 추가'),
    h('div',{style:'font-size:11.5px;color:var(--text-soft);margin-bottom:18px'},'유입분석 카드로 노출됩니다 (코드/라벨/카테고리/색상)'),

    h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin-bottom:5px'},'코드 *'), codeI,
    h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin:14px 0 5px'},'라벨'), labelI,
    h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin:14px 0 5px'},'카테고리 (선택)'), parentI,
    h('div',{style:'font-size:11.5px;font-weight:600;color:var(--text-soft);margin:14px 0 8px'},'헤더 색상'), colorRow,

    h('div',{style:'display:flex;gap:8px;justify-content:flex-end;margin-top:22px'}, cancelBtn, saveBtn)
  );
  overlay.append(card);
  document.body.append(overlay);
  // 키보드: Esc 닫기, 외부 클릭 보호
  setTimeout(()=>codeI.focus(),50);
  const onKey=(e)=>{ if(e.key==='Escape'){ overlay.remove(); document.removeEventListener('keydown',onKey); } };
  document.addEventListener('keydown',onKey);
}

// === 일/월 TM 시트(.sheet-input): Excel-style 키보드 + Shift+화살표 범위 + 마우스 드래그 + Delete 일괄 0 ===
const _shNav = { timer: null, initial: null, dir: null };
const _shSel = { anchor: null, head: null };  // {r, c}
const _shDrag = { dragging: false, lastTarget: null };
function _shCellAt(r, c){ return document.querySelector(`.sheet-input[data-r="${r}"][data-c="${c}"]`); }
function _shStopNav(){
  if(_shNav.initial){ clearTimeout(_shNav.initial); _shNav.initial=null; }
  if(_shNav.timer){ clearInterval(_shNav.timer); _shNav.timer=null; }
  _shNav.dir = null;
}
function _shClearRange(){
  document.querySelectorAll('.tm-table .sheet-cell.in-range').forEach(td=>td.classList.remove('in-range'));
  _shSel.anchor = null; _shSel.head = null;
}
function _shApplyRange(){
  document.querySelectorAll('.tm-table .sheet-cell.in-range').forEach(td=>td.classList.remove('in-range'));
  if(!_shSel.anchor || !_shSel.head) return;
  const r1 = Math.min(_shSel.anchor.r, _shSel.head.r), r2 = Math.max(_shSel.anchor.r, _shSel.head.r);
  const c1 = Math.min(_shSel.anchor.c, _shSel.head.c), c2 = Math.max(_shSel.anchor.c, _shSel.head.c);
  for(let r=r1; r<=r2; r++) for(let c=c1; c<=c2; c++){
    const inp = _shCellAt(r, c);
    if(inp && inp.parentElement) inp.parentElement.classList.add('in-range');
  }
}
function _shRangeInputs(){
  if(!_shSel.anchor || !_shSel.head) return [];
  const r1 = Math.min(_shSel.anchor.r, _shSel.head.r), r2 = Math.max(_shSel.anchor.r, _shSel.head.r);
  const c1 = Math.min(_shSel.anchor.c, _shSel.head.c), c2 = Math.max(_shSel.anchor.c, _shSel.head.c);
  const out = [];
  for(let r=r1; r<=r2; r++) for(let c=c1; c<=c2; c++){
    const inp = _shCellAt(r, c);
    if(inp) out.push(inp);
  }
  return out;
}
function _shMoveOnce(curInput, dir, doSelect){
  const r = Number(curInput.dataset.r), c = Number(curInput.dataset.c);
  let dr=0, dc=0;
  if(dir==='up') dr=-1; else if(dir==='down') dr=1;
  else if(dir==='left') dc=-1; else if(dir==='right') dc=1;
  const next = _shCellAt(r+dr, c+dc);
  if(!next) return null;
  next.focus();
  if(doSelect !== false) try{ next.select(); }catch(_){}
  return next;
}
// 전역 핸들러 한 번만 바인딩 — keydown/mouse 위임
if(!window._shBound){
  window._shBound = true;
  // keyup — 화살표/Shift 떼면 autorepeat 정지
  document.addEventListener('keyup', e=>{
    if(e.key && (e.key.indexOf('Arrow')===0 || e.key==='Shift')) _shStopNav();
  }, true);
  // keydown 위임
  document.addEventListener('keydown', e=>{
    const t = e.target;
    if(!t || !t.classList || !t.classList.contains('sheet-input')) return;
    const input = t;
    // Delete/Backspace — 단일도 0 처리, 범위면 일괄 0 (직렬 저장)
    if(e.key==='Delete' || e.key==='Backspace'){
      const rng = _shRangeInputs();
      const targets = rng.length >= 2 ? rng.map(inp=>({r:inp.dataset.r, c:inp.dataset.c}))
                                       : [{r: input.dataset.r, c: input.dataset.c}];
      e.preventDefault();
      const focusPos = { r: input.dataset.r, c: input.dataset.c };
      (async ()=>{
        for(const p of targets){
          const cur = _shCellAt(p.r, p.c);
          if(!cur || cur.value === '0') continue;
          cur.value = '0';
          if(typeof cur._sheetSave === 'function'){
            try { await cur._sheetSave(); } catch(_){}
          }
        }
        _shClearRange();
        const back = _shCellAt(focusPos.r, focusPos.c);
        if(back){ back.focus(); try{back.select();}catch(_){} }
      })();
      return;
    }
    // Ctrl+C / Ctrl+V 는 표준 copy/paste 이벤트 핸들러에서 처리 (clipboardData 사용 — 권한 불필요)
    if(e.key==='Escape'){
      _shStopNav(); _shClearRange();
      if(input.dataset.orig !== undefined) input.value = input.dataset.orig;
      input.blur();
      return;
    }
    if(e.key==='Enter'){
      _shStopNav(); _shClearRange();
      e.preventDefault();
      const moved = _shMoveOnce(input, 'down');
      if(!moved) input.blur();
      return;
    }
    if(e.key==='Tab'){
      _shStopNav(); _shClearRange();
      const moved = _shMoveOnce(input, e.shiftKey?'left':'right');
      if(moved) e.preventDefault();
      return;
    }
    const dir = e.key==='ArrowUp'?'up':e.key==='ArrowDown'?'down':e.key==='ArrowLeft'?'left':e.key==='ArrowRight'?'right':null;
    if(!dir) return;
    e.preventDefault();
    // Shift+화살표 = 범위 확장
    if(e.shiftKey){
      _shStopNav();
      if(!_shSel.anchor){
        const r=Number(input.dataset.r), c=Number(input.dataset.c);
        _shSel.anchor = {r, c}; _shSel.head = {r, c};
      }
      let dr=0, dc=0;
      if(dir==='up') dr=-1; else if(dir==='down') dr=1;
      else if(dir==='left') dc=-1; else if(dir==='right') dc=1;
      const nr = _shSel.head.r + dr, nc = _shSel.head.c + dc;
      const cell = _shCellAt(nr, nc);
      if(cell){ _shSel.head = {r:nr, c:nc}; _shApplyRange(); cell.focus(); }
      return;
    }
    // 일반 화살표 = 범위 해제 + 자유 이동 (좌우 즉시, 커서 위치 무관)
    _shClearRange();
    if(e.repeat) return;
    const moved = _shMoveOnce(input, dir);
    if(!moved) return;
    _shStopNav();
    _shNav.dir = dir;
    _shNav.initial = setTimeout(()=>{
      _shNav.timer = setInterval(()=>{
        const cur = document.activeElement;
        if(!cur || !cur.classList || !cur.classList.contains('sheet-input')){ _shStopNav(); return; }
        const ok = _shMoveOnce(cur, _shNav.dir);
        if(!ok) _shStopNav();
      }, 25);
    }, 100);
  }, true);
  // 마우스 드래그 — sheet-cell 위를 드래그하면 범위 선택
  document.addEventListener('mousedown', e=>{
    if(e.button !== 0) return; // 좌클릭만
    const cell = e.target.closest && e.target.closest('.tm-table .sheet-cell');
    if(!cell){
      // 표 밖 클릭 → 범위 해제
      if(!e.target.closest || !e.target.closest('.tm-table')) _shClearRange();
      return;
    }
    const inp = cell.querySelector('.sheet-input');
    if(!inp) return;
    const r = Number(inp.dataset.r), c = Number(inp.dataset.c);
    if(e.shiftKey && _shSel.anchor){
      _shSel.head = {r, c};
      _shApplyRange();
      e.preventDefault();
      inp.focus();
    } else {
      _shClearRange();
      _shSel.anchor = {r, c};
      _shSel.head = {r, c};
    }
    _shDrag.dragging = true;
    _shDrag.lastTarget = inp;
  }, true);
  document.addEventListener('mouseover', e=>{
    if(!_shDrag.dragging) return;
    const cell = e.target.closest && e.target.closest('.tm-table .sheet-cell');
    if(!cell) return;
    const inp = cell.querySelector('.sheet-input');
    if(!inp || inp === _shDrag.lastTarget) return;
    // 셀 경계를 넘은 순간 input 텍스트 드래그-선택 끊고 셀 범위 모드로 전환
    try { window.getSelection().removeAllRanges(); } catch(_){}
    if (document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('sheet-input')) {
      document.activeElement.blur();
    }
    _shDrag.lastTarget = inp;
    const r = Number(inp.dataset.r), c = Number(inp.dataset.c);
    if(!_shSel.anchor){ _shSel.anchor = {r, c}; }
    _shSel.head = {r, c};
    _shApplyRange();
  }, true);
  // 드래그 중 mousemove 도 같이 추적 (mouseover 만으로는 빠른 드래그 시 누락 가능)
  document.addEventListener('mousemove', e=>{
    if(!_shDrag.dragging) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if(!el) return;
    const cell = el.closest && el.closest('.tm-table .sheet-cell');
    if(!cell) return;
    const inp = cell.querySelector('.sheet-input');
    if(!inp || inp === _shDrag.lastTarget) return;
    try { window.getSelection().removeAllRanges(); } catch(_){}
    if (document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('sheet-input')) {
      document.activeElement.blur();
    }
    _shDrag.lastTarget = inp;
    const r = Number(inp.dataset.r), c = Number(inp.dataset.c);
    if(!_shSel.anchor){ _shSel.anchor = {r, c}; }
    _shSel.head = {r, c};
    _shApplyRange();
    // 드래그 중엔 텍스트 선택 자체 차단 (셀 범위만)
    e.preventDefault();
  }, true);
  document.addEventListener('mouseup', ()=>{
    if(_shDrag.dragging){
      _shDrag.dragging = false;
      if(_shSel.anchor && _shSel.head && _shSel.anchor.r===_shSel.head.r && _shSel.anchor.c===_shSel.head.c){
        // 단일 클릭(드래그 X) — 범위 해제
        _shClearRange();
      } else if(_shSel.anchor){
        // 드래그 완료 — anchor 셀에 포커스 (Ctrl+C/V/Del 동작용)
        const a = _shCellAt(_shSel.anchor.r, _shSel.anchor.c);
        if(a) a.focus();
      }
    }
  }, true);
  // === copy 이벤트 — clipboardData 직접 set, 권한 불필요 ===
  document.addEventListener('copy', e=>{
    const t = document.activeElement;
    if(!t || !t.classList || !t.classList.contains('sheet-input')) return;
    const rng = _shRangeInputs();
    if(rng.length < 2) return; // 단일 셀은 브라우저 기본
    const r1 = Math.min(_shSel.anchor.r,_shSel.head.r), r2 = Math.max(_shSel.anchor.r,_shSel.head.r);
    const c1 = Math.min(_shSel.anchor.c,_shSel.head.c), c2 = Math.max(_shSel.anchor.c,_shSel.head.c);
    const lines = [];
    for(let r=r1; r<=r2; r++){
      const row = [];
      for(let c=c1; c<=c2; c++){
        const inp = _shCellAt(r, c);
        row.push(inp ? inp.value : '');
      }
      lines.push(row.join('\t'));
    }
    if(e.clipboardData){
      e.clipboardData.setData('text/plain', lines.join('\n'));
      e.preventDefault();
    }
  }, true);
  // === paste 이벤트 — TSV 파싱해 현재 셀 기준 우/하로 채움 ===
  document.addEventListener('paste', e=>{
    const t = document.activeElement;
    if(!t || !t.classList || !t.classList.contains('sheet-input')) return;
    const text = e.clipboardData ? e.clipboardData.getData('text/plain') : '';
    if(!text) return;
    e.preventDefault();
    const rows = text.replace(/\r/g,'').replace(/\n$/,'').split('\n').map(r=>r.split('\t'));
    const r0 = Number(t.dataset.r), c0 = Number(t.dataset.c);
    (async ()=>{
      for(let i=0; i<rows.length; i++){
        for(let j=0; j<rows[i].length; j++){
          const cur = _shCellAt(r0+i, c0+j);
          if(!cur) continue;
          const raw = String(rows[i][j]||'').replace(/[^0-9-]/g,'');
          const nv = String(Number(raw)||0);
          if(cur.value === nv) continue;
          cur.value = nv;
          if(typeof cur._sheetSave === 'function'){
            try { await cur._sheetSave(); } catch(_){}
          }
        }
      }
      _shClearRange();
      const back = _shCellAt(r0, c0);
      if(back){ back.focus(); try{back.select();}catch(_){} }
    })();
  }, true);
}

// === 유입분석 셀: Excel-style 키보드 (autorepeat + 범위 선택 + 일괄 삭제) ===
const _vcNav = { timer: null, initial: null, dir: null };
const _vcSel = { anchor: null, head: null };  // input 요소 참조
function _vcStopNav(){
  if(_vcNav.initial){ clearTimeout(_vcNav.initial); _vcNav.initial=null; }
  if(_vcNav.timer){ clearInterval(_vcNav.timer); _vcNav.timer=null; }
  _vcNav.dir=null;
}
function _vcAllInputs(){ return Array.from(document.querySelectorAll('.vendor-grid .vc-input')); }
function _vcClearRange(){
  document.querySelectorAll('.vendor-card .vc-cell.in-range').forEach(el=>el.classList.remove('in-range'));
  _vcSel.anchor = null; _vcSel.head = null;
}
function _vcApplyRange(){
  const arr = _vcAllInputs();
  const a = arr.indexOf(_vcSel.anchor);
  const h = arr.indexOf(_vcSel.head);
  if(a<0 || h<0){ _vcClearRange(); return; }
  const lo = Math.min(a,h), hi = Math.max(a,h);
  arr.forEach((el,i)=>{
    const c = el.closest('.vc-cell');
    if(!c) return;
    if(i>=lo && i<=hi) c.classList.add('in-range'); else c.classList.remove('in-range');
  });
}
function _vcRangeInputs(){
  if(!_vcSel.anchor || !_vcSel.head) return [];
  const arr = _vcAllInputs();
  const a = arr.indexOf(_vcSel.anchor), h = arr.indexOf(_vcSel.head);
  if(a<0 || h<0) return [];
  const lo = Math.min(a,h), hi = Math.max(a,h);
  return arr.slice(lo, hi+1);
}
// 한 칸 이동 — focus+select 까지. select=false 면 head 갱신만 (범위 확장용)
function _vcMoveOnce(curInput, dir, doSelect){
  const arr = _vcAllInputs();
  const idx = arr.indexOf(curInput);
  if(idx<0) return null;
  let target = -1;
  if(dir==='up')        target = idx - 2;
  else if(dir==='down') target = idx + 2;
  else if(dir==='left') target = idx - 1;
  else if(dir==='right')target = idx + 1;
  if(target<0 || target>=arr.length) return null;
  const next = arr[target];
  next.focus();
  if(doSelect !== false) next.select();
  return next;
}
// 전역 keyup + 마우스 드래그 (한 번만 바인딩)
const _vcDrag = { dragging: false, lastInput: null };
if(!window._vcKeyupBound){
  window._vcKeyupBound = true;
  document.addEventListener('keyup', e=>{
    if(e.key && (e.key.indexOf('Arrow')===0 || e.key==='Shift')) _vcStopNav();
  }, true);
  // 마우스다운 — vendor 셀이면 드래그 시작, 그 외는 범위 해제
  document.addEventListener('mousedown', e=>{
    _vcStopNav();
    if(e.button !== 0) return;
    const inp = (e.target && e.target.classList && e.target.classList.contains('vc-input')) ? e.target
              : (e.target && e.target.closest && e.target.closest('.vc-cell') ? e.target.closest('.vc-cell').querySelector('.vc-input') : null);
    if(!inp){
      // .vendor-grid 밖이면 범위 해제
      if(!e.target.closest || !e.target.closest('.vendor-grid')) _vcClearRange();
      return;
    }
    if(e.shiftKey && _vcSel.anchor){
      _vcSel.head = inp;
      _vcApplyRange();
      e.preventDefault();
      inp.focus();
    } else {
      _vcClearRange();
      _vcSel.anchor = inp;
      _vcSel.head = inp;
    }
    _vcDrag.dragging = true;
    _vcDrag.lastInput = inp;
  }, true);
  document.addEventListener('mouseover', e=>{
    if(!_vcDrag.dragging) return;
    const t = e.target;
    let inp = null;
    if(t && t.classList && t.classList.contains('vc-input')) inp = t;
    else if(t && t.closest){ const c = t.closest('.vc-cell'); if(c) inp = c.querySelector('.vc-input'); }
    if(!inp || inp === _vcDrag.lastInput) return;
    _vcDrag.lastInput = inp;
    if(!_vcSel.anchor){ _vcSel.anchor = inp; }
    _vcSel.head = inp;
    _vcApplyRange();
  }, true);
  document.addEventListener('mouseup', ()=>{
    if(_vcDrag.dragging){
      _vcDrag.dragging = false;
      if(_vcSel.anchor && _vcSel.head && _vcSel.anchor === _vcSel.head){
        _vcClearRange();
      } else if(_vcSel.anchor){
        _vcSel.anchor.focus();  // 드래그 완료 — anchor 포커스
      }
    }
  }, true);
  // === copy 이벤트 (vendor) ===
  document.addEventListener('copy', e=>{
    const t = document.activeElement;
    if(!t || !t.classList || !t.classList.contains('vc-input')) return;
    const rng = _vcRangeInputs();
    if(rng.length < 2) return;
    const tsv = rng.map(inp=>inp.value).join('\t');
    if(e.clipboardData){
      e.clipboardData.setData('text/plain', tsv);
      e.preventDefault();
    }
  }, true);
  // === paste 이벤트 (vendor) — TSV → 현재 input 부터 우측으로 채움 ===
  document.addEventListener('paste', e=>{
    const t = document.activeElement;
    if(!t || !t.classList || !t.classList.contains('vc-input')) return;
    const text = e.clipboardData ? e.clipboardData.getData('text/plain') : '';
    if(!text) return;
    e.preventDefault();
    const flat = text.replace(/\r/g,'').replace(/\n$/,'').split(/[\t\n]/);
    const all = _vcAllInputs();
    const start = all.indexOf(t);
    if(start < 0) return;
    for(let i=0; i<flat.length; i++){
      const cur = all[start + i];
      if(!cur) break;
      const raw = String(flat[i]||'').replace(/[^0-9-]/g,'');
      const nv = String(Number(raw)||0);
      if(cur.value === nv) continue;
      cur.value = nv;
      cur.dispatchEvent(new Event('blur'));
    }
    _vcClearRange();
    t.focus();
  }, true);
}

// 엑셀식 — 항상 input 노출, 스피너 없음, blur 자동 저장 (일 TM 마감과 동일 패턴)
function vendorCell(v, key, label, isPriv){
  if (!isPriv) {
    return h('div',{class:'vc-cell'},
      h('div',{class:'lbl'}, label),
      h('div',{class:'val'}, v[key]||0)
    );
  }
  const input = h('input',{
    class:'vc-input', type:'text', inputmode:'numeric', value:String(v[key]||0),
    style:'cursor:text'
  });
  const cell = h('div',{class:'vc-cell'},
    h('div',{class:'lbl'}, label),
    input
  );
  input.addEventListener('focus',()=>{
    cell.classList.add('is-focus');
    // 클릭 시 '0' 자동 비우기 — 새 숫자 바로 덮어쓰기
    if (input.value === '0') input.value = '';
  });
  input.addEventListener('blur',async()=>{
    cell.classList.remove('is-focus');
    // 빈값이면 0 으로 복원
    if (input.value.trim() === '') input.value = '0';
    const raw = input.value.replace(/[^0-9-]/g,'');
    const newVal = Number(raw)||0;
    input.value = String(newVal);
    if (newVal === Number(v[key]||0)) return;
    const prev = Number(v[key]||0);
    v[key] = newVal;  // 낙관적 로컬 갱신
    // 해당 카드만 inline 업데이트 (renderApp 호출 안 함 — 키보드 이동 끊김 방지)
    try {
      const card = cell.closest('.vendor-card');
      if (card) {
        const dbN = Number(v.db_count||0), delN = Number(v.deleted_count||0);
        const recvN = Number(v.received_count||0), cmpN = Number(v.completed_count||0);
        const denom = dbN - delN;
        const eff = denom > 0 ? cmpN/denom : 0;
        const acc = denom > 0 ? recvN/denom : 0;
        const headBadge = card.querySelector('.vc-head > div:nth-child(2)');
        if (headBadge) headBadge.textContent = cmpN + '건';
        const effEl = card.querySelector('.vc-stat.eff .v');
        if (effEl) effEl.textContent = (eff*100).toFixed(1) + '%';
        const accEl = card.querySelector('.vc-stat.acc .v');
        if (accEl) accEl.textContent = (acc*100).toFixed(1) + '%';
      }
    } catch(_){}
    // 저장은 백그라운드로 (await 안 함 → 다음 키 입력 안 막힘)
    api('/api/sales/vendor-daily',{method:'POST',body:{
      vendor_id:v.vendor_id, work_date:State.salesDate,
      db_count:v.db_count, deleted_count:v.deleted_count,
      received_count:v.received_count, remaining_count:v.remaining_count,
      completed_count:v.completed_count
    }}).catch(e=>{
      v[key] = prev;
      input.value = String(prev);
      alert(e.message);
      renderApp();
    });
  });
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ _vcStopNav(); _vcClearRange(); e.preventDefault(); input.blur(); return; }
    if(e.key==='Escape'){ _vcStopNav(); _vcClearRange(); input.value = String(v[key]||0); input.blur(); return; }
    // Delete/Backspace — 범위 2칸 이상이면 일괄 0
    if((e.key==='Delete' || e.key==='Backspace')){
      const rng = _vcRangeInputs();
      if(rng.length >= 2){
        e.preventDefault();
        rng.forEach(inp=>{
          if(inp.value === '0') return;
          inp.value = '0';
          inp.dispatchEvent(new Event('blur'));
        });
        _vcClearRange();
        input.focus();
        return;
      }
    }
    // Ctrl+C / Ctrl+V 는 표준 copy/paste 이벤트 핸들러에서 처리
    const dir = e.key==='ArrowUp'?'up':e.key==='ArrowDown'?'down':e.key==='ArrowLeft'?'left':e.key==='ArrowRight'?'right':null;
    if(!dir) return;
    e.preventDefault();
    // ── Shift+화살표 = 범위 확장 (autorepeat 없음)
    if(e.shiftKey){
      _vcStopNav();
      if(!_vcSel.anchor){ _vcSel.anchor = input; _vcSel.head = input; }
      const cur = _vcSel.head || input;
      const moved = _vcMoveOnce(cur, dir, /*select*/ false);
      if(moved){ _vcSel.head = moved; _vcApplyRange(); }
      return;
    }
    // ── 일반 화살표 = 범위 해제 + 셀 이동 (좌우 즉시, 커서 위치 무관)
    _vcClearRange();
    if(e.repeat) return; // OS 반복 무시 — 자체 timer
    const moved = _vcMoveOnce(input, dir);
    if(!moved) return;
    // 자체 autorepeat — 100ms 후 시작, 25ms 간격 (40/sec)
    _vcStopNav();
    _vcNav.dir = dir;
    _vcNav.initial = setTimeout(()=>{
      _vcNav.timer = setInterval(()=>{
        const cur = document.activeElement;
        if(!cur || !cur.classList || !cur.classList.contains('vc-input')){ _vcStopNav(); return; }
        const ok = _vcMoveOnce(cur, _vcNav.dir);
        if(!ok) _vcStopNav();
      }, 25);
    }, 100);
  });
  return cell;
}

// ───────── CSV 내보내기 ─────────
function exportCsv(){
  const [y,m]=State.ym.split('-').map(Number);
  const dim=daysInMonth(y,m);
  const recIdx={};
  for(const r of State.records){
    if(r.status!=='APPROVED') continue;
    const dateStr=String(r.work_date).slice(0,10);
    recIdx[`${r.user_id}|${dateStr}`]=r;
  }
  const rows=[];
  const head=['이름','역할'];
  for(let d=1;d<=dim;d++) head.push(`${m}/${d}`);
  rows.push(head);
  for(const u of State.users){
    if(u.name==='2' || u.name==='3') continue; // viewer 계정 비노출 (CSV 도)
    const row=[u.name, u.role==='manager'?'차장':'직원'];
    for(let d=1;d<=dim;d++){
      const ymd=fmtYmd(y,m,d);
      const r=recIdx[`${u.id}|${ymd}`];
      row.push(r?TYPE_LABELS[r.type]||'':'');
    }
    rows.push(row);
  }
  const csv=rows.map(r=>r.map(c=>{
    const s=String(c||'');
    return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;
  }).join(',')).join('\n');
  // BOM 추가 — 엑셀 한글 깨짐 방지
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`근태_${State.ym}.csv`;
  document.body.append(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),500);
  showToast('CSV 다운로드');
}

// ───────── 단축키 ─────────
document.addEventListener('keydown',(e)=>{
  if(!State.user) return;
  const tag=(e.target&&e.target.tagName)||'';
  // Esc — 드로어/모달 닫기 (입력 필드에서도 동작)
  if(e.key==='Escape'){
    const m=$('.modal-bg'); if(m){ m.remove(); e.preventDefault(); }
    return;
  }
  // / — 검색창 포커스 (직원 페이지에서)
  if(e.key==='/'&&State.page==='people'&&!State.selectedPersonId&&tag!=='INPUT'&&tag!=='TEXTAREA'){
    const i=document.querySelector('.search-box input');
    if(i){ i.focus(); e.preventDefault(); }
    return;
  }
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  // ←/→ — 월 이동 (팀 캘린더 / 직원 상세)
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    if(State.page!=='grid'&&!State.selectedPersonId) return;
    const [y,m]=State.ym.split('-').map(Number);
    const d=new Date(y, m-1+(e.key==='ArrowLeft'?-1:1), 1);
    State.ym=fmtYm(d);
    loadMonth().then(renderApp);
    e.preventDefault();
  }
});

bootstrap();
